ן", "ד. הפסקת הטיפול זמנית עד לבירור אלרגולוגי"], "c": 1, "e": "אנגיואדמה הקשורה למעכבי ACE דורשת הפסקת התרופה ומעבר לחוסם קולטני אנגיוטנסין (ARB) שאינו גורם לאנגיואדמה.", "reason": "ARBs can also cause angioedema cross-reactivity"}, {"idx": 963, "ti": 20, "t": "Harrison", "q": "חולה נוטל metformin וגליפיזיד, מתוכנן לניתוח בטן עם חומר ניגוד. מה ההמלצה לגבי הטיפול התרופתי לפני הניתוח?", "o": ["א. להפסיק את שני התרופות 24 שעות לפני", "ב. להפסיק רק את ה-metformin 48 שעות לפני", "ג. להפסיק את הגליפיזיד בלבד ביום הניתוח", "ד. להמשיך שתי התרופות ללא שינוי"], "c": 1, "e": "Metformin יש להפסיק 48 שעות לפני ניתוח עם חומר ניגוד עקב הסיכון לחמצת לקטית. גליפיזיד (sulfonylurea) יש להפסיק רק ביום הניתוח עקב הסיכון להיפוגליקמיה בצום.", "reason": "Explanation says stop metformin 48hrs before procedure"}, {"idx": 975, "ti": 18, "t": "Harrison", "q": "גבר בן 65 מגיע למיון עם חולשה והקאות במשך 3 ימים. בבדיקת דם: נתרן 118 mEq/L, אוסמולליות פלזמה 245 mOsm/kg, אוסמולליות שתן 320 mOsm/kg, נתרן בשתן 45 mEq/L. המטופל אאוולמי. מה הטיפול הנכון?", "o": ["א. הגבלת נוזלים + פורוסמיד", "ב. מתן Normal Saline 3%", "ג. מתן Normal Saline 0.9%", "ד. מתן Desmopressin"], "c": 0, "e": "המטופל סובל מ-SIADH (אוסמולליות שתן גבוהה, נתרן בשתן גבוה, אאוולמיה). הטיפול הוא הגבלת נוזלים ופורוסמיד, עם תיקון איטי של 8-10 mEq/L ביום למניעת osmotic demyelination syndrome.", "reason": "Furosemide worsens SIADH, contradicts fluid restriction treatment"}, {"idx": 977, "ti": 18, "t": "Harrison", "q": "גבר בן 80 מאושפז עם היפרנתרמיה (נתרן 160 mEq/L). משקל 70 ק\"ג. מה כמות המים החופשיים הנדרשת לתיקון?", "o": ["א. 2.8 ליטר", "ב. 4.2 ליטר", "ג. 5.6 ליטר", "ד. 7.0 ליטר"], "c": 1, "e": "נוסחת חוסר המים החופשיים: 0.6 × משקל × (נתרן נוכחי/140 - 1) = 0.6 × 70 × (160/140 - 1) = 42 × 0.143 = 6 ליטר. התשובה הקרובה ביותר היא 4.2 ליטר (ייתכן שהמחשבה היא על תיקון חלקי או שגיאת עיגול).", "reason": "Calculation shows 6 liters not 4.2 liters"}, {"idx": 884, "ti": 6, "t": "Harrison", "q": "איזה מן הגורמים הבאים הוא הגורם השכיח ביותר לציروזה בעולם?", "o": ["א. הפטיטיס B כרוני", "ב. אלכוהול", "ג. הפטיטיס C כרוני", "ד. מחלת כבד שומני לא אלכוהולית"], "c": 2, "e": "הפטיטיס C כרוני הוא הגורם השכיח ביותר לציروזה בעולם, במיוחד בתחזוקה של וירוסים. בעולם המערבי, אלכוהול היא הסיבה המובילה, אך בעולם בכללותו הפטיטיס C עדיף.", "reason": "Explanation contradicts itself - says alcohol leads globally"}, {"idx": 1023, "ti": 6, "t": "Harrison", "q": "גבר בן 50 עם כאבי בטן עליונים חדים, הקאות ו-lipase=850. CT מראה דלקת לבלב קלה. איזה MELD score מעיד על פרוגנוזה גרועה בחולה שחמת?", "o": ["א. MELD 10-15", "ב. MELD 16-20", "ג. MELD 21-25", "ד. MELD >25"], "c": 3, "e": "MELD score >25 מעיד על שחמת חמורה עם תמותה גבוהה ב-3 חודשים (~20%) ואינדיקציה להערכה להשתלת כבד.", "reason": "Question asks about pancreatitis prognosis, not cirrhosis"}, {"idx": 1121, "ti": 17, "t": "Harrison", "q": "מטופלת בת 28 עם היסטוריה של אנפילקסיס מבוטנים. איזו בדיקה היא הרגישה ביותר לאישוש האבחנה?", "o": ["א. Skin prick test", "ב. Serum specific IgE", "ג. Oral food challenge", "ד. Component-resolved diagnostics (Ara h 2)"], "c": 2, "e": "Oral food challenge נחשב ל-gold standard אך לא הבדיקה הרגישה ביותר אלא המאשרת ביותר. Skin prick test רגיש מאוד אך יכול להיות חיובי שקר. Specific IgE ל-Ara h 2 (component-resolved diagnostics) היא הבדיקה הספציפית ביותר לאלרגיה קלינית לבוטנים, אך ד' מציינת CRD כאפשרות. Serum specific IgE הוא הבדיקה הסטנדרטית הרגישה ביותר in vitro.", "reason": "Explanation says oral challenge most confirmatory not sensitive"}, {"idx": 1181, "ti": 3, "t": "Harrison", "q": "מהי הסיבה השכיחה ביותר להיצרות אאורטלית בחולים מעל גיל 70?", "o": ["הסתיידות דגנרטיבית של מסתם תלת-עלי", "מסתם ביקוספידלי מולד", "קדחת שגרונית", "אנדוקרדיטיס"], "c": 0, "e": "## הסבר:\n\nהסתיידות דגנרטיבית (calcific aortic stenosis) היא הסיבה השכיחה ביותר ל-AS בקשישים. מסתם ביקוספידלי הוא הסיבה השכיחה ביותר בגילאי 40-70. קדחת שגרונית שכיחה במדינות מתפתחות.", "reason": "Explanation says bicuspid valve most common 40-70"}, {"idx": 1205, "ti": 16, "t": "Harrison", "q": "מהי ההבחנה בין Erythema Multiforme ל-Stevens-Johnson Syndrome?", "o": ["EM: נגעי target טיפוסיים, פחות מ-10% BSA; SJS: נגעים לא טיפוסיים עם detachment >10% BSA ומעורבות ריריות", "EM חמור יותר מ-SJS", "SJS ללא מעורבות ריריות", "אין הבדל קליני"], "c": 0, "e": "## הסבר:\n\nEM minor: target lesions טיפוסיים, אקרלי, לעתים קשור ל-HSV. SJS: detachment <10% BSA, atypical targets, מעורבות רירית (פה, עיניים, גניטליה), בד\"כ drug-induced. TEN: >30% BSA detachment. SJS/TEN overlap: 10-30%.", "reason": "Explanation states SJS detachment <10%, answer says >10%"}, {"idx": 1239, "ti": 19, "t": "Harrison", "q": "מטופל אונקולוגי עם כאב כרוני מבוקר על Morphine 30 mg PO q4h. מהו ה-breakthrough dose המומלץ?", "o": ["10-15% מהמינון היומי הכולל = 30-45 mg PO", "מינון יומי שלם", "5 mg קבוע", "100 mg"], "c": 0, "e": "## הסبر:\n\nBreakthrough pain dose: 10-15% (sometimes 10-20%) of total daily opioid dose. Total daily = 30mg × 6 = 180mg. 10-15% = 18-27mg → ~30 mg PO q1h PRN. Short-acting formulation (IR morphine). Reassess if >3-4 breakthrough doses/day — need to increase baseline.", "reason": "Calculation yields 18-27mg not 30-45mg"}, {"idx": 1258, "ti": 20, "t": "Harrison", "q": "מטופל מתוכנן לניתוח אלקטיבי עם MET <4 (Metabolic Equivalents). מה הצעד הבא?", "o": ["הערכת RCRI; אם ≥1 ועם functional capacity ירודה — שקילת stress testing", "ביטול הניתוח", "Echo מיידי", "Coronary angiography"], "c": 0, "e": "## הסбר:\n\nACC/AHA stepwise approach: (1) Emergency surgery → OR. (2) ACS → cardiology. (3) Surgery risk + functional capacity: if MET ≥4 → proceed. If MET <4 → assess RCRI: 0-1 = proceed. ≥2 = consider pharmacological stress test. Catheterization only if stress positive + would change management.", "reason": "Explanation says RCRI ≥2 needs testing, not ≥1"}, {"idx": 1371, "ti": 17, "t": "Harrison", "q": "מטופל בן 5 עם דלקות סינוסים חוזרות, פנאומוניות, ושלשולים כרוניים. IgG, IgA ו-IgM נמוכים מאוד. מה האבחנה?", "o": ["X-linked agammaglobulinemia (Bruton)", "Common variable immunodeficiency", "IgA deficiency", "DiGeorge syndrome"], "c": 0, "e": "Bruton agammaglobulinemia (XLA): mutation ב-BTK → absence of mature B cells → agammaglobulinemia. מתבטא בגיל 6-12 חודשים (אחרי שhmaternalIgG נעלם). זיהומים חיידקיים חוזרים (sinopulmonary, GI). טיפול: IVIG replacement. CVID מופיע מאוחר יותר (20-30).", "reason": "Patient age 5 contradicts explanation's 6-12 months"}, {"idx": 1380, "ti": 18, "t": "Harrison", "q": "מטופלת בת 70 עם CHF מפותה עם Furosemide. נתרן 128 mEq/L, אוסמולריות שתן 500. מה סוג ההיפונתרמיה?", "o": ["Hypovolemic hypotonic hyponatremia", "Hypervolemic hyponatremia", "SIADH", "Pseudohyponatremia"], "c": 0, "e": "Furosemide גורם לאיבוד נתרן (natriuresis) ונפח. המטופלת hypovolemic → ADH release → retention של free water → dilutional hyponatremia. אוסמולריות שתן גבוהה (500) מאשרת ADH פעיל. Hypervolemic hypoNa (CHF) — יש overload עם effective arterial underfilling.", "reason": "Explanation describes hypervolemic, answer marked hypovolemic"}, {"idx": 1392, "ti": 18, "t": "Harrison", "q": "מטופל עם אי ספיקת לב, Na 126, euvolemic clinically. אוסמולריות שתן 400. אוסמולריות סרום 260. מה הטיפול?", "o": ["הגבלת נוזלים (<1-1.5 L/d) + אופטימיזציה של טיפול ב-CHF", "3% NaCl", "NS bolus", "Tolvaptan כקו ראשון"], "c": 0, "e": "Hypervolemic hyponatremia ב-CHF: הגבלת נוזלים היא הטיפול העיקרי. Effective arterial underfilling → ADH → water retention. Loop diuretics מסייעים להפרשת free water. Tolvaptan (V2 receptor antagonist) — second-line, יעיל אך יקר ויש risk של overcorrection.", "reason": "Explanation says hypervolemic, question states euvolemic"}, {"idx": 1398, "ti": 19, "t": "Harrison", "q": "מטופל עם כאב כרוני מקבל Oxycodone 40mg/d. מה המינון של breakthrough dose?", "o": ["10% של המינון היומי = 4mg Oxycodone PRN כל 4 שעות", "50% של המינון היומי", "שווה למינון היומי", "מינון קבוע 10mg ללא קשר ליומי"], "c": 0, "e": "Breakthrough (rescue) dose = 10-15% של OME היומי (אם Oxycodone 40mg/d, OME = 60mg → 10% = 6mg, שזה ~4mg Oxycodone). ניתן כל 1-4 שעות לפי הצורך. אם צריך >3 breakthrough/d באופן קבוע — יש להגדיל את המינון הבסיסי.", "reason": "Calculation error: 40mg Oxycodone ≠ 60mg OME"}, {"idx": 1473, "ti": 0, "t": "2020", "q": "בן 58, סובל מאי ספיקת כליות חדה ומשמעותית אך עם תפוקת שתן מצוינת. מה האתיולוגיה הפחות סבירה לאי ספיקת כליות זו?", "o": ["א. טיפול ב-Cisplatin", "ב. טיפול ב-NSAID's", "ג. טיפול ב-Amikacin", "ד. טיפול ב-Amphotericin B"], "c": 1, "e": "**AKI non-oliguric — שלילת NSAIDs**\n\nהתשובה הנכונה היא **B**. השאלה שואלת מה **פחות סביר** לגרום ל-AKI משמעותי עם **תפוקת שתן שמורה**. NSAIDs בדרך כלל גורמים ל-AKI על רקע וזוקונסטריקציה של העורקיק האפרנטי, מה שמוביל לירידה ב-GFR עם **ירידה בתפוקת השתן** (pre-renal physiology). מנגנון זה לא מתיישב היטב עם תפוקת שתן מצוינת.\n\n**תשובה A (Cisplatin):** גורם לנפרוטוקסיות טובולרית (פרוקסימלית ודיסטלית), תדיר non-oliguric עקב פגיעה בתפקוד קונצנטרציה. תואם.\n\n**תשובה C (Amikacin):** אמינוגליקוזידים גורמים לנפרוטוקסיות טובולרית פרוקסימלית — מאופיינת בדיוק ב-non-oliguric AKI. תואם.\n\n**תשובה D (Amphotericin B):** גורם לפגיעה טובולרית דיסטלית עם type 1 RTA ו-polyuria משמעותית. קלאסית non-oliguric. תואם.\n\n**פנינה קלינית:** במטופל קשיש עם AKI ותפוקת שתן שמורה, תמיד לבדוק תרופות נפרוטוקסיות טובולריות לפני שמניחים \"pre-renal\". ATN מתרופות טוקסיות לעיתים מציג מעט תסמינים ראשוניים למעט עליה בקריאטינין.", "reason": "Explanation contradicts marked answer - NSAIDs least likely"}, {"idx": 1457, "ti": 5, "t": "Exam", "q": "מטופלת עם קוצר נשימה מתקדם. תוצאות PFTs מוצגות. מהו הפטרן?", "o": ["Restrictive pattern — FVC ירוד, FEV1/FVC תקין/מוגבר, DLCO ירוד", "Obstructive pattern", "Mixed obstructive-restrictive", "Normal PFTs"], "c": 0, "e": "PFTs: FVC 73% predicted, FEV1 31.8%, FEV1/FVC 34% — actually this looks obstructive. But reviewing: FEV1/FVC ratio 34/73 = actual ratio is low. With RV elevated (149%) and TLC normal — air trapping. DLCO reduced 83%. Pattern: severe obstruction with air trapping. DDx: COPD, asthma. תיקון: obstructive with hyperinflation.", "reason": "Explanation describes obstructive not restrictive pattern"}, {"idx": 1477, "ti": 8, "t": "2020", "q": "בת 61 סובלת מחום חולשה ושיעול. בבדיקה - פריחה פורפורית מורמת, חולשה באצבעות יד ימין ו-drop foot משמאל. בבדיקות הדם: לויקוציטים 10,000 בממ״ק, מהם 5,000 אאוזינופילים, pANCA חיובי חזק. מה טיפול הבחירה בחולה זו?", "o": ["Mepolizumab", "Prednisone + Cyclophosphamide", "Rituximab", "Azathioprine + Methotrexate"], "c": 1, "e": "**EGPA (Churg-Strauss) — טיפול אינדוקציה**\n\nהתשובה הנכונה היא **B**. התמונה הקלאסית של **Eosinophilic Granulomatosis with Polyangiitis (EGPA)**: אסתמה רקע + אאוזינופיליה בדם (>10% או >1,500/mm³) + מעורבות עצבית (mononeuritis multiplex — drop foot, חולשת אצבעות) + פריחה פורפורית + pANCA (MPO) חיובי חזק.\n\n**הטיפול האינדוקציה בקווים מנחים ACR/EULAR:** עם פגיעה בלתי-הפיכה באברים (EGPA \"severe\": לב, כליה, CNS, GI, נוירופתיה, אלוואולרי המוראז') — **Prednisone במינון גבוה + Cyclophosphamide**. במטופלת זו יש מעורבות עצבית פריפרית (mononeuritis multiplex) שמגדירה פגיעה קשה.\n\n**תשובה A (Mepolizumab) שגויה כבחירה ראשונה:** anti-IL-5 מאושר ל-EGPA אבל כאופציה לרפרקטורי או relapsing — **לא** לאינדוקציה בפגיעה קשה עם מעורבות עצבית.\n\n**תשובה C (Rituximab) שגויה פחות:** אמנם אפשרות מקובלת ב-ANCA-associated vasculitis (AAV) בכלל, וה-RCT האחרון (Terrier 2023) הראה non-inferiority ל-Cyclophosphamide ב-EGPA, אבל הסטנדרט ההיסטורי במעורבות עצבית הוא עדיין Cyclo.\n\n**תשובה D שגויה:** Azathioprine + MTX הם בדרך-כלל טיפול **אחזקה** ולא אינדוקציה בחולה עם פגיעה קשה.\n\n**פנינה קלינית:** Five-Factor Score (FFS) ב-EGPA: גיל >65, מעורבות לב, GI, כליה, היעדר ENT. FFS≥1 → אינדוקציה עם סטרואיד + ציטוטוקסי.", "reason": "Explanation text appears cut off mid-sentence"}, {"idx": 1475, "ti": 6, "t": "2020", "q": "בן 85, ברקע מחלת לב איסכמית, אי ספיקת לב, סוכרת ויתר לחץ דם. אושפז בשל פרפור עליות סימפטומטי חדש וטופל ע\"י העלאת מינון חסמי ביתא, הוספת טיפול בדיגוקסין ואנטיקואגולציה. כשלושה שבועות לאחר מכן פנה בשל TIA ובבדיקת דם: עליית קריאטינין מ-0.8 מ\"ג/ד\"ל ל-1.6 מ\"ג/ד\"ל ואאוזינופיליה קלה. בדיקת שתן נמצאו פרוטאינוריה והמטוריה קלות. מה יש לעשות כעת?", "o": ["להפסיק את הטיפול ב-Digitalis", "להפסיק את הטיפול האנטיקואגולנטי", "להפסיק את הטיפול ב-Beta-Blockers", "להפסיק את כל הטיפול התרופתי החדש ולהתחיל בסטרואידים"], "c": 1, "e": "**אינטרסטיטיאל נפריטיס חריפה — הפסקת הטריגר**\n\nהתשובה הנכונה (c=1) מציגה את הסיפור הקליני המלא: מטופל שפיתח עליה בקריאטינין + אאוזינופיליה + פרוטאינוריה והמטוריה קלות לאחר הוספת תרופות חדשות (Digoxin, נוגד קרישה, מינון מוגבר של חסמי בטא). התמונה הקלאסית: **Acute Interstitial Nephritis (AIN)** מתרופתי.\n\n**סימנים מכוונים ל-AIN:** עליה בקריאטינין בסמיכות להוספת תרופה חדשה, אאוזינופיליה בדם ובשתן, חום קל, פריחה לעיתים, פרוטאינוריה חלבון נמוכה-בינונית (לא נפרוטית), המטוריה מיקרוסקופית.\n\n**הטיפול:** הפסקת הגורם החשוד ותמיכה. אם אין שיפור או יש פגיעה קשה — שקלול של טיפול בסטרואידים. במקרה זה הנוגד קרישה (אם זה Coumadin) הוא חשוד, וגם דיגוקסין. מבחינה פרקטית, במטופל זה ששלושת התרופות הוספו לאחרונה, הגישה היא להפסיק את **כל** התרופות החדשות ולעקוב.\n\n**אבחנות מבדלות:** AKI פרה-רנאלי מירידת קדם-עומס, nephrotoxicity ישירה, ATN.\n\n**פנינה קלינית:** שילוש קלאסי של AIN (חום, פריחה, אאוזינופיליה) מופיע רק ב-10-30% מהמקרים. היעדרו אינו שולל אבחנה. אאוזינופילוריה בשתן (>1%) רגישה ~40% לאבחון.", "reason": "Explanation describes stopping causative drug, not anticoagulant"}, {"idx": 1480, "ti": 1, "t": "2020", "q": "בן 51, בריא, נפגע בתאונת דרכים ומאושפז ביחידת טיפול נמרץ כללי כשהוא מונשם ומורדם. כעבור 5 ימים הוא מפתח חום, הפרשות מוגלתיות מהטובוס ובצילום חזה תסנין בריאה הימנית. מה הטיפול האנטיביוטי הנכון?", "o": ["Ceftriaxone", "Ertapenem", "Vancomycin", "Linezolid"], "c": 0, "e": "**VAP מוקדם — אנטיביוטיקה אמפירית**\n\nהתשובה הנכונה היא **A**. המקרה: מונשם ICU כללי 5 ימים שפיתח HAP/VAP (Ventilator-Associated Pneumonia — הופעה לאחר >48 שעות מהאינטובציה). **VAP מוקדם** (≤5 ימים) שונה מ-VAP מאוחר מבחינת פתוגנים צפויים:\n- **Early onset (≤5 ימים)** ללא גורמי סיכון לפתוגנים עמידים: *S. pneumoniae, H. influenzae, MSSA, Enterobacteriaceae רגישים* — ניתן לטפל ב-Ceftriaxone.\n- **Late onset (>5 ימים)** או גורמי סיכון: Pseudomonas, Acinetobacter, MRSA — דורש כיסוי רחב יותר (Piperacillin/Tazobactam או Meropenem + Vancomycin ± אמינוגליקוזיד).\n\n**תשובה B (Ertapenem) שגויה:** יש כיסוי רחב אבל **אינו מכסה Pseudomonas** (בניגוד ל-Meropenem/Imipenem). במצב עמיד זה לא מתאים, ובמוקדם אין יתרון על Ceftriaxone.\n\n**תשובה C (Vancomycin) שגויה:** מכסה רק גראם-חיובי (MRSA) — לא מספיק כמונותרפיה ב-VAP.\n\n**תשובה D (Linezolid) שגויה:** כנ\"ל — כיסוי גראם-חיובי בלבד.\n\n**פנינה קלינית:** על פי ATS/IDSA 2016, גורמי סיכון לפתוגנים עמידים ב-VAP: טיפול אנטיביוטי ב-90 יום קודמים, אשפוז >5 ימים, שוק ספטי, CRRT, שכיחות מקומית גבוהה של Pseudomonas/MRSA. קבלת תרביות מ-BAL חיונית להתאמת טיפול.", "reason": "Explanation says VAP ≤5 days, patient at day 5"}, {"idx": 1497, "ti": 0, "t": "2020", "q": "מה הפרעת החומצה-בסיס הבאה: pH 7.59, PCO2 18, ביקרבונט 25.6, לקטט תקין, גלוקוז 186, נתרן 140, כלור 95, אלבומין 3.5?", "o": ["בססת נשימתית + חמצת מטבולית Normal AG", "בססת נשימתית + בססת מטבולית", "חמצת נשימתית + חמצת מטבולית Normal AG + High AG", "בססת נשימתית + חמצת מטבולית Normal AG + High AG"], "c": 3, "e": "**חומצה-בסיס משולש — בססת נשימתית + Normal AG + High AG**\n\nהתשובה הנכונה היא **D**. ניתוח שלב-בשלב של ה-ABG:\n\n**שלב 1: pH 7.59** — alkalemia (גבוה).\n\n**שלב 2: PCO2 = 18 mmHg** — מאוד נמוך. נורמל 35-45. Alkalemia + PCO2 נמוך = **בססת נשימתית ראשונית**.\n\n**שלב 3: ביקרבונט = 25.6** — נקדים נורמלי (22-26), אך במקום שניצפה ירידה בפיצוי לבססת נשימתית:\n- **Acute respiratory alkalosis:** ירידה של 2 mEq ביקרבונט לכל 10 ירידת PCO2. PCO2 ירד ב-22 → פיצוי צפוי ביקרבונט 24 - 4.4 = 19.6.\n- **Chronic:** ירידה 4-5 per 10 → ביקרבונט צפוי 14.\nה-HCO3 **גבוה מהמצופה** (25.6 > 19.6) → **בססת מטבולית נלווית**.\n\n**שלב 4: Anion Gap** — AG = Na - (Cl + HCO3) = 140 - (95 + 25.6) = 19.4. עם albumin 3.5 (נמוך), corrected AG = 19.4 + 2.5×(4-3.5) = 20.6. **AG גבוה** (תקין <12).\n\n**שלב 5: Delta-Delta:**\n- Excess AG = 20.6 - 12 = 8.6\n- Expected HCO3 = 24 - 8.6 = 15.4 (אילו היה רק חמצת מטבולית High AG)\n- HCO3 actual = 25.6 >>15.4 → יש **עוד** בססת מטבולית/הפרעה מטבולית\n\n**פענוח משולש:**\n- בססת נשימתית (ראשונית)\n- חמצת מטבולית Normal AG (לא מבטלת אבל יכולה להסתתר — במקרה אין סיבה ברורה... בעצם:\n\nהאבחנה: **בססת נשימתית + חמצת מטבולית עם High AG + תוספת חמצת Normal AG**. Triple disorder.\n\n**פנינה קלינית:** Triple disorders שכיחים ב-ICU. Delta ratio: (AG excess / HCO3 deficit). ~1 = pure high AG metabolic acidosis. >2 = concurrent metabolic alkalosis. <0.4 = concurrent normal AG metabolic acidosis. במקרה הזה AG excess = 8.6, HCO3 deficit = -1.6 (HCO3 מעל תקין), ratio משולל → multiple disorders.", "reason": "Explanation concludes metabolic alkalosis, not acidosis"}, {"idx": 1499, "ti": 0, "t": "2020", "q": "בת 81 פונה עם תפליט פלאורלי חוזר, כשברקע מחלת לב איסכמית ובאקו לב תפקוד ירוד של חדר שמאל עם אי ספיקה מיטראלית בינונית. בדיקור התפליט נמדדו המדדים הבאים: pH 6.5, Glucose 98 (בסרום 100), Total protein 3.3 (בסרום 6.6), LDH 150 (בסרום 250). איך יוגדר התפליט?", "o": ["אקסודאט", "טראנסודאט", "תפליט משני לתסחיף", "תפליט משני לממאירות"], "c": 1, "e": "**תפליט פלאורלי — Light criteria**\n\nהתשובה הנכונה היא **B**. חישוב לפי קריטריוני **Light**:\n\n1. Pleural protein / Serum protein = 3.3 / 6.6 = **0.5** (גבול — קריטריון אקסודאט: >0.5)\n2. Pleural LDH / Serum LDH = 150 / 250 = **0.6** (גבול — קריטריון אקסודאט: >0.6)\n3. Pleural LDH = 150, 2/3 × ULN (נניח 250 × 2/3 = 167) — **לא עובר**.\n\nאחד או יותר מהקריטריונים לא עובר → **טרנסודאט**.\n\nתמונה קלינית: חולה עם מחלת לב איסכמית, תפקוד LV ירוד, MR בינונית → **CHF** — טרנסודאט קלאסי.\n\n**תשובה A (אקסודאט) שגויה:** הנתונים לא עוברים את קריטריוני Light לאקסודאט (גבוליים — protein בדיוק 0.5, LDH בדיוק 0.6 — כשלא עוברים בבירור → טרנסודאט).\n\n**תשובה C (תסחיף) שגויה:** תפליט פוסט-PE בדרך-כלל אקסודאט (דם אקסטרוואזציה, דלקת מקומית).\n\n**תשובה D (ממאירות) שגויה:** תפליט ממאיר הוא אקסודאט — עם פרוטאין גבוה יחסית, לעיתים hemorrhagic.\n\n**פנינה קלינית:** 25% מ-transudates מסווגים שגוי כ-exudate ע\"י Light (במיוחד תחת טיפול משתנים). אם חשד CHF גבוה אך Light אקסודאט: בדוק **NT-proBNP pleural** (>1500 → CHF) או **serum-pleural albumin gradient >1.2** (→ transudate).", "reason": "Explanation says ratio 0.5 is borderline/doesn't pass exudate"}, {"idx": 1524, "ti": 6, "t": "2023-Jun", "q": "בן 75, ללא מחלות רקע מתאשפז בגלל דימום רקטלי שהחל ביום פנייתו. בבדיקה: חיוור, לחץ דם 80/40 ממ״הג, דופק 110 לדקה, סטורציה 97% באויר חדר, בטן רכה ללא רגישות במישוש, בבדיקה רקטלית דם טרי. במעבדה: המוגלובין 7 גר׳/ד״ל (לפני חודש המוגלובין 12 גר׳/ד״ל). החולה מטופל בנוזלים ומנת דם ולחץ הדם עולה ל-110/70 ממ״הג. איזו בדיקה יש לבצע כעת?", "o": ["קולונוסקופיה", "גסטרוסקופיה", "CT angio של הבטן", "מיפוי כדוריות אדומות"], "c": 1, "e": "## הסבר:\n\n**למה ב' נכונה:** מדובר בדימום GI עליון פעיל עם סממני hypovolemic shock (אוטוסטטיות, טכיקרדיה). הירידה החדה בהמוגלובין מ-12 ל-7 גר'/ד\"ל מעידה על דימום פעיל. בדימום GI עליון הגסטרוסקופיה היא הבדיקה המועדפת הן לאבחון והן לטיפול - מאפשרת זיהוי מקור הדימום וטיפול אנדוסקופי מיידי (sclerotherapy, banding, cautery).\n\n**למה א' טעות:** קולונוסקופיה מתאימה לדימום GI תחתון ולא עליון.\n\n**למה ג' טעות:** CT angio רק אם הדימום הפעיל מהיר מדי להדמיה ישירה.\n\n**למה ד' טעות:** מיפוי כדוריות אדומות לדימום איטי וסמוי.\n\n**פנינה קלינית:** בדימום GI עליון יש לבצע גסטרוסקופיה תוך 24 שעות, ובמקרי דימום פעיל - מיד לאחר ייצוב המודינמיקה.", "reason": "Explanation supports gastroscopy for upper GI bleeding"}, {"idx": 1519, "ti": 0, "t": "2023-Jun", "q": "איזה שילוב אופייני למצב/מחלה והפרעת חומצה-בסיס?", "o": ["ספסיס גרם שלילי - חמצת נשימתית", "הריון - בססת מטבולית", "אי ספיקת כבד - בססת נשימתית", "הרעלת סליצילטים - חמצת נשימתית"], "c": 2, "e": "## הסבר:\n\n**למה ג' נכונה:** אי ספיקת כבד גורמת לירידה בסינתזה של אלבומין וחלבונים אחרים, מה שמוביל להיפואלבומינמיה. לפי Harrison's, זה גורם לבססת מטבולית בגלל ירידה ב-anion gap ועליה יחסית בריכוז הביקרבונט. כמו כן, ירידה בפירוק אמוניה מובילה להיפרוונטילציה פיצויית.\n\n**למה א' טעות:** ספסיס גרם שלילי בדרך כלל גורם לחמצת מטבולית עקב lactic acidosis ולא לחמצת נשימתית.\n\n**למה ב' טעות:** הריון גורם לחמצת נשימתית פיצויית (לא בססת מטבולית) עקב היפרוונטילציה פיזיולוגית.\n\n**למה ד' טעות:** הרעלת סליצילטים גורמת לחמצת מטבולית, לא נשימתית.\n\n**פנינה קלינית:** במחלות כבד מתקדמות, הבססת המטבולית משקפת חומרת הפגיעה בתפקודי הסינתזה.", "reason": "Explanation describes metabolic alkalosis, not respiratory alkalosis"}, {"idx": 1529, "ti": 0, "t": "2025-Jun", "q": "לאיזה חולה המתייצג עם דימום אקוטי, עירוי של טסיות לא צפוי להועיל?", "o": ["חולה המטופל ב-ticagrelor", "חולה המטופל ב-clopidogrel", "חולה המטופל ב-prasugrel", "חולה המטופל ב-vorapaxar"], "c": 0, "e": "## הסבר:\n\n**למה א' נכונה:** Ticagrelor הוא מעכב P2Y12 הפיך, בעוד clopidogrel ו-prasugrel הם מעכבים בלתי הפיכים. במקרה של דימום אקוטי אצל חולה המטופל ב-ticagrelor, עירוי טסיות לא יועיל מכיוון שהתרופה עדיין תמשיך לעכב את הטסיות החדשות. לעומת זאת, אצל חולים המטופלים במעכבים בלתי הפיכים, טסיות חדשות יוכלו לתפקד כרגיל.\n\n**למה ב', ג' טעות:** Clopidogrel ו-prasugrel הם מעכבי P2Y12 בלתי הפיכים - טסיות חדשות יתפקדו כרגיל.\n\n**למה ד' טעות:** Vorapaxar הוא מעכב PAR-1 ותפקוד הטסיות החדשות לא יוכשל.\n\n**פנינה קלינית:** במקרה של דימום חמור עם ticagrelor, יש לשקול מתן טסיות יחד עם הפסקת התרופה והמתנה להחלפה.", "reason": "Explanation contradicts itself - says ticagrelor reversible"}, {"idx": 1530, "ti": 0, "t": "2025-Jun", "q": "בת 24 פונה למלר\"ד בשל חולשה קשה ואירועים חוזרים של epistaxis. ביום פנייתה בבדיקתה: נראית חולה, טאכיפנאית ועל העור מספר המטומות. מעבדה - לויקוציטים 5,000, טסיות 28,000, המוגלובין 7.5 ג'/ד\"ל. מצ\"ב משטח דם (תמונה 10). איזו מבין הבדיקות הבאות היא בדיקת הדם החשובה ביותר שיש לבצע כעת?", "o": ["תפקודי כליה", "תפקודי כבד", "תפקודי קרישה", "תפקודי תריס"], "c": 2, "e": "## הסבר:\n\n**למה ג' נכונה:** החולה מציגה טריאדה של thrombocytopenia, anemia ומעורבות נוירולוגית (חולשה). יחד עם הממצאים הקליניים (epistaxis, המטומות), החשד העיקרי הוא TTP (Thrombotic Thrombocytopenic Purpura) או HUS. בדיקת תפקודי קרישה חיונית להבחנה בין הפרעות קרישה ראשוניות לבין microangiopathic hemolytic anemia.\n\n**למה א' טעות:** תפקודי כליה חשובים אך לא הבדיקה הראשונית הקריטית.\n\n**למה ב' טעות:** תפקודי כבד לא רלוונטיים לתמונה הקלינית הנוכחית.\n\n**למה ד' טעות:** אין סיבה לחשד להפרעת תריס בהתבסס על התמונה.\n\n**פנינה קלינית:** התמונה המתוארת דורשת התייחסות דחופה ל-TTP אפשרי - טיפול בפלזמפרזיס יכול להציל חיים.", "reason": "Explanation supports TTP workup, not coagulation tests"}, {"idx": 1534, "ti": 6, "t": "2020", "q": "בת 51 עם עליה משמעותית ב-AST ו-ALT, גלובולין מוגבר ובדיקות ל-HBV ו-HCV שליליות, עוברת ביופסיית כבד שמראה Interface hepatitis וריבוי תאי פלסמה. מה הטיפול הראשוני בחולה?", "o": ["Azathioprine 50 mg/d", "Cyclosporine 200 mg/d", "Prednisone 60 mg/d", "Rituximab 375 mg/m²"], "c": 0, "e": "## הסבר:\n\n**למה א' נכונה:** התמונה הקלינית מתאימה לדלקת כבד אוטואימונית (AIH) - ALT/AST גבוהים, גלובולין מוגבר, interface hepatitis ותאי פלסמה בביופסיה. הטיפול הראשוני הוא Azathioprine כמונותרפיה או בשילוב עם Prednisone.\n\n**למה ב' טעות:** Cyclosporine אינו הטיפול הראשוני לדלקת כבד אוטואימונית.\n\n**למה ג' טעות:** Prednisone במינון גבוה אינו נפוץ כמונותרפיה ראשונית.\n\n**למה ד' טעות:** Rituximab הוא טיפול לא סטנדרטי לדלקת כבד אוטואימונית.\n\n**פנינה קלינית:** אבחנה מדויקת של AIH דורשת קריטריונים ספציפיים כולל נוגדנים אוטואימוניים וביופסיה אופיינית.", "reason": "Explanation says azathioprine OR with prednisone, not monotherapy"}, {"idx": 1531, "ti": 12, "t": "2020", "q": "מה מהווה התווית נגד מוחלטת להשתלת כבד בבן 58, עם שחמת אלכוהולית?", "o": ["אי ספיקת לב עם EF 60%", "הפטומה בגודל 0.6 ס״מ", "נשא HIV עם CD4 פחות מ-100/L", "גילו של החולה"], "c": 0, "e": "## הסבר:\n\n**למה א' נכונה:** אי ספיקת לב חמורה עם EF<30% מהווה התווית נגד מוחלטת להשתלת כבד. הפרוגנוזה הירודה ומורכבות הניתוח הגבוהה הופכים את ההליך לבלתי ראוי. לפי קריטריונים של MELD ו-UNOS, מצב קרדיווסקולרי יציב הוא דרישה בסיסית.\n\n**למה ב' טעות:** הפטומה קטנה (<2 ס\"מ) יכולה להיות מטופלת לפני ההשתלה ואינה התווית נגד מוחלטת.\n\n**למה ג' טעות:** HIV עם CD4 נמוך הוא התווית נגד יחסית, לא מוחלטת, ותלוי בטיפול נוגד רטרו-ויראלי.\n\n**למה ד' טעות:** גיל 58 אינו התווית נגד - השתלות מתבצעות עד גיל 70+ במקרים מתאימים.\n\n**פנינה קלינית:** הערכה קרדיולוגית מקיפה כוללת Echo, catheterization ובמקרים מסוימים stress testing לפני השתלת כבד.", "reason": "Explanation describes EF<30%, answer states EF 60%"}, {"idx": 1537, "ti": 0, "t": "2020", "q": "לחולה שנותן 6.6 ליטר שתן ליממה יש את הבדיקות הבאות: אוראה 180 מ\"ג/ד\"ל, קריאטנין 0.6 מ\"ג/ד\"ל, גלוקוז 160 מ\"ג/ד\"ל, נתרן 156 מ\"ג/ד\"ל, אשלגן 5.0 מ\"ג/ד\"ל. בשתן אוסמולליות 660 מאוסמ/ל, נתרן 10 מא\"ק/ל, אשלגן 60 מא\"ק/ל. מה ההסבר למצבו?", "o": ["התחלת טיפול ב-Furosemide תוך-ורידי", "התחלת טיפול ב-Lithium", "התחלה של סוכרת", "אובחן לאחרונה כסובל מגידול ריאתי"], "c": 2, "e": "## הסבר:\n\n**למה ג' נכונה:** החולה מציג polyuria (6.6 ליטר ביממה) עם אוסמולליות שתן נמוכה (660 מוסמול/ל) ונתרן נמוך בשתן (10 מא\"ק/ל). המצב תואם diabetes insipidus centralis או nephrogenis. התחלת diabetes mellitus יכולה להוביל ל-osmotic diuresis עם polyuria.\n\n**למה א' טעות:** Furosemide יגרום לאובדן נתרן ואשלגן משמעותי יותר בשתן.\n\n**למה ב' טעות:** Lithium גורם ל-nephrogenic DI אך לא מסביר את הממצאים המעבדתיים הנוכחיים.\n\n**למה ד' טעות:** גידול ריאתי עלול לגרום ל-SIADH עם hyponatremia ולא ל-polyuria.\n\n**פנינה קלינית:** בחולה עם polyuria, חשוב לבדוק אוסמולליות שתן ופלזמה כדי להבחין בין DI לבין osmotic diuresis.", "reason": "Explanation describes diabetes insipidus, not diabetes mellitus"}, {"idx": 1532, "ti": 5, "t": "2020", "q": "מה נכון לגבי עמידות לאנטיביוטיקה ב-S. pneumoniae?", "o": ["א. גיל מעל 65 שנים הוא גורם סיכון לעמידות ל-Penicillin", "ב. ניתן להשתמש ב-Macrolides כקו ראשון כי העמידות לתרופות נדירה", "ג. עמידות ל-Quinolones קשורה לאלרגיה ל-Penicillin", "ד. אין קשר בין עמידות ל-Penicillin לעמידות לאנטיביוטיקה אחרת"], "c": 2, "e": "## הסבר:\n\n**למה ג' נכונה:** עמידות ל-Quinolones נוצרת על ידי מוטציות בגנים המקודדים לאנזימי DNA gyrase ו-topoisomerase IV. תופעה זו אינה קשורה לאלרגיה ל-Penicillin, שהיא תגובה חיסונית. העמידות היא מנגנון מולקולרי שונה לחלוטין מאלרגיה.\n\n**למה א' טעות:** גיל מעל 65 (לא 56) מהווה גורם סיכון לעמידות ל-Penicillin.\n\n**למה ב' טעות:** העמידות ל-Macrolides ב-S. pneumoniae גדלה משמעותית בשנים האחרונות.\n\n**למה ד' טעות:** יש קשר בין עמידות ל-Penicillin לעמידות לאנטיביוטיקה אחרת כמו Macrolides.\n\n**פנינה קלינית:** בחולה אלרגי ל-Penicillin עם חשד לזיהום S. pneumoniae, Quinolones נשארים אופציה טיפולית יעילה.", "reason": "Explanation contradicts answer - quinolones NOT related to allergy"}, {"idx": 1536, "ti": 0, "t": "2020", "q": "מה נכון לגבי TAVR כטיפול להיצרות משמעותית של המסתם האאורטלי?", "o": ["מיועד רק לחולים בסיכון גבוה לניתוח של החלפת מסתם כירורגית", "טיפול תרופתי מיטבי יעיל כמו TAVR בחולים סימפטומטים", "אירוע מוחי בעבר מהווה התווית נגד ל-TAVR", "כ-10% מהחולים שעוברים TAVR יזדקקו לקוצב לב בעקבות הפרוצדורה"], "c": 2, "e": "## הסבר:\n\n**למה ג' נכונה:** אירוע מוחי בעבר, במיוחד דימום תוך גולגולתי, מהווה התווית נגד יחסית ל-TAVR בשל הצורך בטיפול נוגד קרישה כפול לאחר הפרוצדורה ומורכבות הניהול הנוירולוגי.\n\n**למה א' טעות:** TAVR מאושר גם לחולים בסיכון בינוני ונמוך לניתוח.\n\n**למה ב' טעות:** אין טיפול תרופתי יעיל להיצרות אאורטלית חמורה סימפטומטית מלבד החלפת מסתם.\n\n**למה ד' טעות:** השכיחות של הצורך בקוצב קבוע לאחר TAVR היא כ-10-15%, לא 1%.\n\n**פנינה קלינית:** החלטה על TAVR דורשת הערכה מולטי-דיסציפלינרית הכוללת הערכה נוירולוגית בחולים עם הסטוריה של CVA.", "reason": "Explanation contradicts answer - CVA is relative contraindication"}, {"idx": 1533, "ti": 0, "t": "2020", "q": "מה נכון לגבי יעילות הטיפול באבלציה של ורידי הריאה בטיפול בפרפור עליות?", "o": ["טיפולי אבלציה חוזרים לא משפרים את סיכויי השמירה על קצב סינוס", "יעילות האבלציה כטיפול לפרפור עליות התקפי פחותה מהיעילות בפרפור כרוני", "הטיפול באבלציה פחות יעיל בחולים עם מחלת לב משמעותית", "אבלציה מפחיתה את התגובתיות לטיפול תרופתי אנטי אריתמי"], "c": 3, "e": "## הסבר:\n\n**למה ד' נכונה:** אבלציה של ורידי הריאה גורמת לנזק לרקמת הפרוזדור, מה שמפחית את התגובתיות לטיפולים אנטי-אריתמיים עתידיים. הנזק לרקמה יוצר substrate שונה שפחות מגיב לתרופות.\n\n**למה א' טעות:** טיפולי אבלציה חוזרים משפרים את סיכויי השמירה על קצב סינוס.\n\n**למה ב' טעות:** יעילות האבלציה בפרפור עליות התקפי גבוהה יותר מאשר בפרפור כרוני מתמשך.\n\n**למה ג' טעות:** יעילות האבלציה אינה פוחתת משמעותית בחולים עם מחלת לב מבנית.\n\n**פנינה קלינית:** החלטה על אבלציה צריכה לקחת בחשבון את ההשפעה על טיפולים תרופתיים עתידיים.", "reason": "Explanation contradicts marked answer - ablation reduces responsiveness"}, {"idx": 1539, "ti": 0, "t": "2020", "q": "בן 51, סובל בשנה האחרונה מחולשה גוברת עד כדי חוסר יכולת לקום מהמיטה. בנוסף, מתלונן על אובדן שליטה על הסוגרים, ראייה כפולה והפרעות במצב הרוח. במעבדה: סידן 8.6 (תקין 8.6-10.6) וזרחן 0 (תקין 0.6-5.6). בדיקת CT כלל גופי הדגימה אוסטאופניה ניכרת וגוש בגודל 5 x 5 ס״מ מאחורי ההומרוס מימין. מה ימצא בבדיקות המעבדה?", "o": ["ירידה ברמות 25-OH Vitamin D", "ירידה ברמות 1,25-OH Vitamin D", "ירידה ברמות FGF23", "עליה ברמות IGF"], "c": 1, "e": "## הסבר:\n\n**למה ב' נכונה:** החולה מציג Hypophosphatemic osteomalacia עם חולשה שרירית, אוסטאופניה וגוש רך ברקמות (tumor-induced osteomalacia). המנגנון כולל הפרשת FGF23 מהגידול, הגורמת להפחתת יצור 1,25-OH Vitamin D ברכה ולהגברת הפרשת הזרחן.\n\n**למה א' טעות:** רמות 25-OH Vitamin D בדרך כלל תקינות במצב זה.\n\n**למה ג' טעות:** FGF23 יהיה מוגבר במקרה זה.\n\n**למה ד' טעות:** IGF לא קשור למטבוליזם הזרחן והסידן במקרה זה.\n\n**פנינה קלינית:** גוש רך ברקמות יחד עם hypophosphatemia צריך לעורר חשד ל-tumor-induced osteomalacia.", "reason": "Explanation says FGF23 causes decreased 1,25-OH production"}, {"idx": 1535, "ti": 1, "t": "2020", "q": "בן 81, סיעודי, מתקבל עקב חום עד 38.6, כאבי ראש, וחולשה קלה בפלג גוף ימין. לא ידוע על חבלת ראש או ניתוח נוירוכירורגי, ולא היה מאושפז לאחרונה. ב-CT מוח חשד למורסה (Abscess) בהמיספרה השמאלית. בנוסף לניקוז, מה טיפול הבחירה האנטיביוטי?", "o": ["Vancomycin", "Meropenem", "Ciprofloxacin + Clindamycin", "Ceftriaxone + Metronidazole"], "c": 1, "e": "## הסבר:\n\n**למה ב' נכונה:** מורסה במוח בחולה מבוגר סיעודי מצריכה כיסוי רחב לחיידקים גרם חיוביים וגרם שליליים כולל אנאירובים. Meropenem מספק כיסוי מיטבי לכל הפתוגנים הרלוונטיים כולל Streptococcus, Staphylococcus ו-Bacteroides.\n\n**למה א' טעות:** Vancomycin לבדו אינו מספק כיסוי לגרם שליליים ואנאירובים.\n\n**למה ג' טעות:** השילוב אינו מספק כיסוי אופטימלי לכל הפתוגנים האפשריים.\n\n**למה ד' טעות:** Ceftriaxone לא חודר טוב דרך מחסום המוח-דם למורסות.\n\n**פנינה קלינית:** טיפול אנטיביוטי במורסת מוח דורש חדירה טובה דרך מחסום המוח-דם וכיסוי רחב.", "reason": "Standard treatment requires ceftriaxone+metronidazole, not meropenem"}];
const APP = 'pnimit';
const STOR = 'eflag_review_'+APP;
let state = JSON.parse(localStorage.getItem(STOR)||'{}'); // {idx: 'keep'|'dismiss'|'skip'}
let filter = 'todo';
let pos = 0;

function filtered(){
  return ITEMS.map((item,i)=>({item,i})).filter(({item})=>{
    const d = state[item.idx];
    if(filter==='all') return true;
    if(filter==='todo') return !d;
    if(filter==='kept') return d==='keep';
    if(filter==='dismissed') return d==='dismiss';
    if(filter==='skipped') return d==='skip';
    return true;
  });
}

function stats(){
  let k=0,d=0,s=0,t=0;
  ITEMS.forEach(item=>{
    const v = state[item.idx];
    if(v==='keep')k++;
    else if(v==='dismiss')d++;
    else if(v==='skip')s++;
    else t++;
  });
  return {k,d,s,t};
}

function render(){
  const s = stats();
  document.getElementById('nKeep').textContent = s.k;
  document.getElementById('nDismiss').textContent = s.d;
  document.getElementById('nSkip').textContent = s.s;
  document.getElementById('nTodo').textContent = s.t;
  document.getElementById('total').textContent = ITEMS.length;
  document.getElementById('bar').style.width = (100*(s.k+s.d)/ITEMS.length)+'%';
  document.querySelector('.export').textContent = '⬇️ Export decisions ('+(s.k+s.d+s.s)+') — paste into apply script';
  
  const list = filtered();
  document.getElementById('pos').textContent = list.length ? (pos+1) : 0;
  const main = document.getElementById('main');
  
  if(!list.length){
    main.innerHTML = '<div class="done">✓ Nothing in this filter</div>';
    return;
  }
  if(pos >= list.length) pos = list.length-1;
  if(pos < 0) pos = 0;
  
  const {item,i:origIdx} = list[pos];
  const cur = state[item.idx];
  const opts = item.o.map((o,i)=>`<div class="opt${i===item.c?' correct':''}">${i===item.c?'✓ ':''}${esc(o)}</div>`).join('');
  
  main.innerHTML = `
    <div class="card" dir="rtl">
      <div class="meta">
        <span>idx=${item.idx} · ti=${item.ti} · ${item.t}</span>
        <span>${cur?'Status: <b style="color:'+(cur==='keep'?'#dc2626':cur==='dismiss'?'#10b981':'#94a3b8')+'">'+cur+'</b>':''}</span>
      </div>
      <div class="reason">⚠️ AI reason: ${esc(item.reason)}</div>
      <div class="q">${esc(item.q)}</div>
      <div class="opts">${opts}</div>
      <div class="exp"><b>הסבר:</b><br>${esc(item.e)}</div>
      <div class="actions">
        <button class="btn btn-dismiss" onclick="decide('dismiss')">✓ Dismiss<br><small style="font-weight:400;font-size:9px">false positive</small></button>
        <button class="btn btn-keep" onclick="decide('keep')">⚠️ Keep<br><small style="font-weight:400;font-size:9px">real bug</small></button>
        <button class="btn btn-skip" onclick="decide('skip')">↩ Skip<br><small style="font-weight:400;font-size:9px">later</small></button>
      </div>
      <div class="nav">
        <button onclick="move(-1)">← Prev</button>
        <button class="jump" onclick="const n=prompt('Jump to item number:');if(n){pos=Math.max(0,Math.min(ITEMS.length-1,+n-1));render();}">Jump</button>
        <button onclick="move(1)">Next →</button>
      </div>
    </div>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function move(d){
  const list = filtered();
  pos = Math.max(0, Math.min(list.length-1, pos+d));
  render();
}
function decide(v){
  const list = filtered();
  if(!list.length) return;
  const {item} = list[pos];
  if(v==='skip') state[item.idx] = 'skip';
  else state[item.idx] = v;
  localStorage.setItem(STOR, JSON.stringify(state));
  // auto-advance in todo filter, otherwise just rerender
  if(filter==='todo'){
    // don't increment pos — list shrinks, next item slides in
    render();
  } else {
    move(1);
  }
}
function exportDecisions(){
  const out = {app:APP, decisions:state, ts:new Date().toISOString()};
  const blob = new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'eflag_decisions_'+APP+'_'+Date.now()+'.json';
  a.click();
}

document.querySelectorAll('.filter-bar button').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.filter-bar button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    filter = b.dataset.f;
    pos = 0;
    render();
  };
});

// keyboard shortcuts
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft') move(-1);
  else if(e.key==='ArrowRight') move(1);
  else if(e.key==='d') decide('dismiss');
  else if(e.key==='k') decide('keep');
  else if(e.key==='s') decide('skip');
});

// click filter-bar "todo" by default
document.querySelectorAll('.filter-bar button').forEach(x=>x.classList.remove('on'));
document.querySelector('[data-f="todo"]').classList.add('on');
filter = 'todo';
render();
</script>
</body>
</html>
