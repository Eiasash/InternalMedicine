<style>
*{box-sizing:border-box}
body{margin:0;font-family:Heebo,system-ui,sans-serif;background:#0f172a;color:#e2e8f0;padding:8px;padding-bottom:100px}
.header{position:sticky;top:0;background:#0f172a;padding:8px 0;border-bottom:1px solid #334155;z-index:10;margin-bottom:10px}
.stats{display:flex;gap:12px;font-size:11px;color:#94a3b8;flex-wrap:wrap}
.stats b{color:#e2e8f0;font-size:13px}
.progress{height:4px;background:#1e293b;border-radius:2px;margin-top:6px;overflow:hidden}
.bar{height:100%;background:linear-gradient(90deg,#dc2626,#f59e0b,#10b981);transition:width .2s}
.card{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #334155}
.meta{font-size:10px;color:#94a3b8;margin-bottom:8px;display:flex;justify-content:space-between}
.reason{background:#7f1d1d;padding:8px 10px;border-radius:8px;font-size:11px;margin-bottom:10px;color:#fecaca}
.q{font-size:14px;line-height:1.6;font-weight:700;margin-bottom:12px;text-align:right}
.opts{margin-bottom:10px}
.opt{padding:6px 10px;margin-bottom:4px;font-size:12px;background:#334155;border-radius:6px;text-align:right}
.opt.correct{background:#065f46;border-right:3px solid #10b981}
.exp{background:#1e3a8a;padding:10px;border-radius:8px;font-size:12px;line-height:1.6;color:#dbeafe;margin-bottom:10px;text-align:right;unicode-bidi:plaintext;white-space:pre-wrap}
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.btn{padding:10px 8px;font-size:11px;font-weight:700;border:none;border-radius:8px;cursor:pointer;min-height:44px}
.btn-keep{background:#dc2626;color:#fff}
.btn-dismiss{background:#059669;color:#fff}
.btn-skip{background:#475569;color:#e2e8f0}
.nav{display:flex;gap:6px;margin-top:10px}
.nav button{flex:1;padding:8px;font-size:12px;background:#334155;color:#e2e8f0;border:1px solid #475569;border-radius:8px;cursor:pointer}
.export{position:fixed;bottom:8px;left:8px;right:8px;background:#8b5cf6;color:#fff;padding:12px;font-size:13px;font-weight:700;border:none;border-radius:12px;cursor:pointer;z-index:20}
.jump{font-size:11px;padding:4px 8px;background:#334155;border:none;color:#e2e8f0;border-radius:6px}
.filter-bar{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap}
.filter-bar button{padding:4px 10px;font-size:10px;background:#334155;color:#94a3b8;border:1px solid #475569;border-radius:12px;cursor:pointer}
.filter-bar button.on{background:#8b5cf6;color:#fff;border-color:#8b5cf6}
.done{color:#10b981;font-size:48px;text-align:center;padding:40px}
.empty{text-align:center;padding:40px;color:#94a3b8}
</style>

<script>
const ITEMS = [{"idx": 9, "ti": 13, "t": "2020", "q": "איזה מנגנון פעולה של תרופה יעיל יותר לטיפול ב-Rheumatoid arthritis?", "o": ["עיכוב IL-6", "עיכוב הרצפטור ל-IL-6", "עיכוב IL-2", "עיכוב הרצפטור ל-IL-5"], "c": 3, "e": "## הסבר:\n\n**למה ג' נכונה – עיכוב IL-2:**\nIL-2 הוא ציטוקין מרכזי להפעלה והתרבות של לימפוציטים T, שהם שחקן מפתח בפתוגנזה של דלקת מפרקים שגרונית (RA). עיכובו מפחית את התגובה האוטואימונית הכוללת. תרופות כמו **Basiliximab** (נוגדן לרצפטור IL-2) משמשות לעיכוב תגובות חיסוניות.\n\n**למה האחרות שגויות:**\n- **א' ו-ב' – IL-6 ורצפטורו:** למרות ש-IL-6 אכן מעורב ב-RA ויש תרופות כמו Tocilizumab (עיכוב רצפטור IL-6) שמשמשות ב-RA, בהשוואה לעיכוב IL-2 – IL-2 נחשב מרכזי יותר להפעלת התגובה האוטואימונית הראשונית.\n- **ד' – עיכו", "reason": "Explanation supports IL-2 inhibition, not IL-5"}, {"idx": 14, "ti": 6, "t": "2020", "q": "בן 50, בריא בד״כ, ללא מחלות רקע כלשהן, שבבדיקת CT בטן שבוצע בחשד לאבני כליה, מודגם באדרנל בשמאלי גוש בקוטר 5 ס״מ בעל צפיפות 2 HU (Hounsfield Units). בירור הכולל כימיה, אלקטרוליטים, איסוף שתן לקורטיזול ולמטאנפרינים - נמצא תקין. מה יש להמליץ בשלב זה?", "o": ["בדיקת רמת רנין ואלדוסטרון", "העמסת Saline 0.9%", "בדיקת רמת DHEAS", "אין צורך בבירור נוסף"], "c": 3, "e": "## הסבר:\n\n**למה ד נכונה:**\nגוש אדרנל עם צפיפות **≤10 HU** ב-CT נחשב לאדנומה שומנית שפירה (lipid-rich adenoma) – ממצא זה לבדו מספיק לאבחנה. בנוסף, כל הבירור ההורמונלי שנעשה (כולל איסוף שתן לקורטיזול, כימיה ואלקטרוליטים) **תקין**, כלומר הגוש הוא **non-functioning incidentaloma** שפיר. במצב זה ההנחיות אינן מחייבות בירור נוסף, רק מעקב הדמיה.\n\n**למה האחרות שגויות:**\n\n- **א (רנין/אלדוסטרון)** – נבדק כאשר יש **יתר לחץ דם או היפוקלמיה**. המטופל בריא וללא ממצאים אלה, אין אינדיקציה.\n\n- **ב (העמסת סליין)** – זוהי בדיקת אישור להיפראלדוסט", "reason": "Explanation mentions follow-up imaging is needed"}, {"idx": 18, "ti": 13, "t": "2020", "q": "מה נכון לגבי הטיפול ב-Tocilizumab?", "o": ["תחליף לסטרואידים כקו ראשון ב-Giant cell arteritis", "לא גורם לאקטיבציה של שחפת", "דורש מעקב אחר רמות סוכר", "עלול לגרום לפרפורציה במערכת העיכול"], "c": 0, "e": "## Tocilizumab - הסבר\n\n**א. נכון** - Tocilizumab (נוגדן anti-IL-6R) אושר כטיפול קו ראשון ב-Giant Cell Arteritis, ומשמש כ**תחליף לסטרואידים** (או בשילוב עמם להפחתת מינון הסטרואידים - steroid sparing effect). זהו אחד השימושים המרכזיים והמאושרים של התרופה.\n\n**ב. טעות** - Tocilizumab **כן עלול לגרום לאקטיבציה של שחפת סמויה** (latent TB), בדומה לביולוגיים אחרים. לכן נדרש סקירה ל-latent TB לפני תחילת הטיפול.\n\n**ג. טעות** - מעקב אחר רמות סוכר אינו המעקב האופייני ל-Tocilizumab (זה יותר רלוונטי לסטרואידים). המעקב הנדרש כולל תפקודי כבד, ספירת דם וליפידים.\n\n**ד. טעות** - פרפורצי", "reason": "Explanation says addition/substitute, not pure first-line replacement"}, {"idx": 29, "ti": 5, "t": "2020", "q": "בת 80 מתלוננת על קוצר נשימה במאמץ שגובר בשנה האחרונה. היא אינה מעשנת וללא גורמי סיכון למחלת לב איסכמית. בבדיקת תפקודי הנשימה נתקבלו התוצאות הבאות: FEV1/FVC=0.8, FEV1=89%, FVC=95%, TLC=92%, RV=80%, DLCO=38% (המספרים באחוזים הם percent predicted יחסית לאשה בגילה ובגובה של המטופלת). מה הצעד הבא שיש לעשות כעת כדי להתקדם באיבחון?", "o": ["בדיקות סרולוגיות להפטיטיס", "בדיקת HCG בשתן", "ביצוע צנתור כלילי", "ביצוע אקו לב"], "c": 3, "e": "## הסבר לתשובה ד - ביצוע אקו לב\n\n**רקע קליני:**\nהמטופלת בת 80 עם קוצר נשימה במאמץ מחמיר, ללא עישון וללא גורמי סיכון איסכמיים - תבנית זו מכוונת למחלה **לא-חסימתית** של מערכת הנשימה או הלב.\n\n**למה אקו לב?**\nתפקודי נשימה עם דפוס **רסטריקטיבי** (FVC ירד, FEV1/FVC תקין או גבוה) בגיל מבוגר ללא סיבה ריאתית ברורה - מעלה חשד ל**אי ספיקת לב דיאסטולית (HFpEF)**, שכיחה מאוד בנשים מבוגרות, וגורמת לדפוס רסטריקטיבי בתפקודי הנשימה ע", "reason": "Explanation describes restrictive pattern, tests show normal"}, {"idx": 36, "ti": 6, "t": "2020", "q": "איזו תרופה תעלה את יחסAldosterone ל : Renin ?", "o": ["-Blocker", "-Blocker", "ACE-inhibitor", "Angiotensin Receptor Blocker"], "c": 0, "e": "## הסבר:\n\n**α-Blocker** חוסם את הרצפטורים האדרנרגיים מסוג α, מה שגורם לירידה בלחץ דם (וזודילטציה).\n\nהירידה בלחץ דם מפעילה את ה-**RAAS** דרך הכליה, כך שה-**Renin עולה** → עולה אנגיוטנסין II → עולה אלדוסטרון.\n\nמכיוון שה-α-Blocker **לא חוסם את ציר ה-RAAS עצמו**, האלדוסטרון עולה **באופן פרופורציונלי יותר מה-Renin** (הציר שלם ופעיל), ולכן **היחס Aldosterone/Renin עולה**.\n\n---\n\n**למה האחרים לא נכונים:**\n- **β-Blocker** → מוריד Renin (חוסם את שחרורו מהכליה) → היחס **עולה", "reason": "Explanation contradicts itself about beta-blocker effect"}, {"idx": 46, "ti": 2, "t": "2020", "q": "בן 50, מתלונן על שיעול מזה כמה חודשים. בבדיקה: אקספיריום מאורך וחירחורים אינספירטורים גסים מפוזרים. צילום החזה בתמונה 11. באיזו צורה תתבטא השפעת מחלתו על תרשים האק\"ג?", "o": ["QT מוארך", "AV block", "עליות ST בחיבורי החזה", "Q1S3T3"], "c": 1, "e": "## הסבר:\n\n**האבחנה:** המטופל סובל מ**COPD** (מחלת ריאות חסימתית כרונית) - שיעול כרוני + אקספיריום מאורך + חירחורים גסים מפוזרים.\n\n**למה ב' נכון - AV Block:**\n\nב-COPD כרוני מתפתח **Cor Pulmonale** - לב ימני כרוני עקב יתר לחץ דם ריאתי. בצילום החזה (תמונה 11) רואים ככל הנראה **היפר-אינפלציה** עם לב בצורת טיפה ודיאפרגמה שטוחה. ה**היפראינפלציה** גורמת ללב לנוע כלפי מטה ולהסתובב, מה שמביא ל**עיוות מכני של מערכת ההולכה** - בפרט ה-AV node סובל מהלחץ המ", "reason": "Explanation describes COPD/Cor Pulmonale, not AV block"}, {"idx": 44, "ti": 6, "t": "2020", "q": "מתי יש לבצע בדיקת סקר אנדוסקופית לסרטן המעי הגס בחולים עם מחלות מעי דלקתיות? מתי לבצע את בדיקת הסקר איבחון המחלה הבסיסית מחלה בסיסית א כל 5-8 שנים לפני 8 שנים Crohn's disease ב כל 5-8 שנים לפני 8 שנים Ulcerative pancolitis ג כל 8 שנים לפני 8 שנים Crohn's colitis ד כל 8-10 שנים לפני 60 שנים Left-sided Ulcerative colitis. בת 61 עם קוצב לב מתקבלת עקב חום וצמרמורת. בתרביות הדם צמיחה של Methicillin Resistant Staphylococcus Aureus (MRSA) במספר בקבוקים. בהנחה שאין מקור ברור לבקטרמיה, מה הגישה הטיפולית המועדפת בחולה?", "o": ["יש להוציא את הקוצב והאלקטרודות בהקדם ולטפל כמומלץ באנדוקרדיטיס", "יש להוציא את הקוצב והאלקטרודות בהקדם ולטפל אנטיביוטית עוד שבועיים", "יש לתת טיפול אנטיביוטי מתאים למשך 50 יום", "יש לטפל אנטיביוטית ולהוציא את הקוצב והאלקטרודות כשתרביות הדם שליליות"], "c": 0, "e": "# הסבר: למה תשובה א נכונה\n\n## הקשר השאלה\nהשאלה עוסקת בזיהום של **קוצב לב** (Pacemaker infection) - מצב רפואי חמור.\n\n## למה א נכונה\n\n**1. זיהום קוצב לב = אינדיקציה מוחלטת להוצאה מיידית**\nזיהום של קוצב לב ואלקטרודות הוא **biofilm infection** - החיידקים יוצרים שכבת הגנה על הגוף הזר, ואנטיביוטיקה לבדה **לא מסוגלת** לעקר את הזיהום ללא הוצאת הגוף הזר.\n\n**2. הוצאה + טיפול אנטיביוטי = הטיפול הסטנדרטי המלא**\nעל פי הנחיות (AHA/ESC), הטיפול המקובל כולל הוצאת **כל", "reason": "Explanation discusses pacemaker infection, not colonoscopy screening"}, {"idx": 52, "ti": 5, "t": "2020", "q": "בן 58 ללא רקע של עישון בכלל, מתלונן על קוצר נשימה בשנה האחרונה, שמופיע במאמץ ובשעות הערב והלילה, ולעתים מעיר משינה. בהאזנה לריאות צפצופים. בספירומטריה: יחס FEV1/FVC = 0.69, FEV1 = 1.0 ליטר (66%), FVC = 3.55 ליטר (96%). לאחר מתן מרחיבי סמפונות יחס FEV1/FVC = 0.85, FEV1 = 2.09 ליטר (88%), FVC = 3.58 ליטר (101%) - האחוזים בסוגריים הם אחוז מהצפוי percent predicted. מה האבחנה הסבירה?", "o": ["Bronchial asthma", "COPD", "Cardiac asthma", "Idiopathic Pulmonary Fibrosis"], "c": 0, "e": "# למה התשובה היא ב' - COPD\n\n## רגע - יש כאן בעיה!\n\nלפני שאסביר, חשוב לציין: **COPD בגבר ללא עישון היא תשובה מפתיעה**, אך הנה ההסבר הסביר:\n\n---\n\n## 3 משפטים להסבר:\n\n1. **גיל 58 + קוצר נשימה מתקדם במאמץ** מתאים לדפוס של COPD, שמתפתח בהדרגה לאורך שנים ומתבטא תחילה רק במאמץ - בדיוק כפי שמתואר בשאלה (\"קוצר נשימה שמופיע במאמץ\").\n\n2. **לא כל COPD קשור לעישון** - כ-25-30% מחולי COPD הם לא מעשנים; גורמי סיכון נ", "reason": "Explanation supports COPD not Bronchial asthma"}, {"idx": 41, "ti": 22, "t": "2020", "q": "בת 80, בריאה בד\"כ, מעשנת כ-20 סיגריות ליום ונוטלת גלולות למניעת הריון, פונה למיון עקב קוצר נשימה וכאבים בחזה ימין שהחלו בטיסה חזרה מלוס אנג'לס. בבדיקתה: חום 36, דופק 100 סדיר, לחץ דם 85/115 ממ\"כ, נשימות לדקה סטורציה 90% עם חמצן במסיכה. צילום החזה בתמונה. מה הצעד הבא?", "o": ["מתן tPA מ\"ג במשך שעתיים", "בדיקת טיפול בפוסיד. בבדיקה: היפרוולמי", "בת 56, עם ממאירות ריאה וכימוטרפיה. בבדיקה: במצב טוב, אאוולמית", "בת 36, היפותירואידית לא מטופלת, מעורפלת הכרה, בצקות בשוקיים"], "c": 0, "e": "## הסבר מדוע א נכון:\n\n**1. מנגנון: היפונתרמיה מחוסר נתרן (Hypovolemic Hyponatremia)**\nאישה בת 90 המתגוררת לבד, ללא תרופות, סביר מאוד שסובלת מ**תת-תזונה ודה-הידרציה** (אכילה ושתייה לקויות) → ירידה בנפח הדם → הגוף מגיב בשימור נתרן מרבי בכליות.\n\n**2. תגובת הכליות: שימור נתרן = נתרן נמוך בשתן**\nכאשר יש היפוvolemia, מופעל ציר **RAAS (אלדוסטרון)** → הכליות סופגות נתרן בחזרה בצורה אגרסיבית → **Na בשתן < 20 mEq/L", "reason": "Explanation describes LOW urine sodium, question asks HIGH"}, {"idx": 135, "ti": 22, "t": "2021-Jun", "q": "כמה \"מים חופשיים\" יש בתמיסה של חצי סליין שאליה הוספתם 20 מ\"ל של תמיסת KCL בריכוז של 2 מא\"ק אשלגן בכל מ\"ל?", "o": ["כ-245 מ\"ל", "כ-460 מ\"ל", "כ-500 מ\"ל", "כ-510 מ\"ל"], "c": 0, "e": "## הסבר מדוע א נכון:\n\n### עיקרון \"מים חופשיים\"\n**מים חופשיים** הם המים שאינם נושאים אלקטרוליטים ביחס לפלזמה (אוסמולריות ~308 mOsm/L). חצי סליין (0.45% NaCl) הוא תמיסה **היפוטונית** — כל ליטר מכיל כ-154 mOsm, כלומר **חצי** מהנדרש. לכן מחצית מנפח חצי הסליין = \"מים חופשיים.\"\n\n### חישוב תרומת KCL\nתמיסת KCl בריכוז **2 מאק\"א אשלגן/מ\"ל** = 2,000 mOsm/L — זוהי תמיסה **היפרטונית מאוד**. כאשר מוסיפים 20 ", "reason": "Explanation incomplete, calculation not finished or verified"}, {"idx": 147, "ti": 7, "t": "2021-Jun", "q": "למה מהבאים גורם FGF23 באופן ישיר?", "o": ["הפחתת הפרשת סידן בכליה", "הגברת הפרשת PTH", "הגברת יצור 1,25 Vitamin D", "הפחתת הפרשת זרחן בכליה"], "c": 1, "e": "## הסבר לתשובה ב':\n\n**FGF23 גורם להגברת הפרשת PTH באופן ישיר.**\n\n1. **FGF23 פועל ישירות על בלוטות הפאראתירואיד** דרך קולטנים (FGFR) הנמצאים עליהן, וגורם לעלייה בשחרור PTH מהבלוטה.\n\n2. **בנוסף, FGF23 גורם להיפופוספטמיה והיפוקלצמיה** (על ידי הפחתת ספיגת זרחן וויטמין D בכליה), ומצבים אלו כשלעצמם מהווים גירוי נוסף לשחרור PTH.\n\n3. **שאר התשובות שגויות** כי FGF23 דווקא **מגביר** הפרשת זרחן בכליה (לא מפח", "reason": "Explanation contradicts itself - states FGF23 increases PTH"}, {"idx": 145, "ti": 7, "t": "2021-Jun", "q": "חולהFMF מתאשפז בשל כאב במותן ובבדיקתCT נמצא דימום בכלייה. מה האבחנה הסבירה ביותר?", "o": ["Microscopic polyangiitis", "Granulomatosis with polyangiitis", "חסר פקטורי קרישה", "Polyarteritis nodosa"], "c": 2, "e": "## הסבר מדוע ג' נכון:\n\n**1. קולכיצין וחסר פקטורי קרישה:**\nחולי FMF מטופלים בקולכיצין לטווח ארוך, ותרופה זו עלולה לגרום לירידה בספיגת ויטמין B12 ופולאט, אך החשוב יותר - קולכיצין מעכב את הכבד מלייצר פקטורי קרישה תלויי ויטמין K, ובכך עלול לגרום לדיאתזה דימומית המתבטאת בדימום ספונטני בכליה.\n\n**2. דימום פריכלייתי/תוך-כלייתי ספונטני:**\nדימום ספונטני בכליה (Spontaneous renal hematoma) ללא טראומה הוא ביטוי קלאסי לחסר פקטורי", "reason": "Colchicine doesn't cause vitamin K-dependent clotting deficiency"}, {"idx": 170, "ti": 13, "t": "2021-Jun", "q": "מה תופעת הלוואי השכיחה ביותר של הטיפול בחולה עם משטח הליחה שבתמונה ?", "o": ["Acute Kidney Injury", "Hepatotoxicity", "Vasculitis", "Diarrhea"], "c": 1, "e": "## הסבר:\n\n**זיהוי המצב:** משטח ליחה המראה **Actinomyces** (גרגירי גופרית צהובים - \"sulfur granules\") → הטיפול הוא **פניצילין במינון גבוה** לתקופה ארוכה, או לחלופין **Amoxicillin-Clavulanate**.\n\nאך אם מדובר בעמידות או אלרגיה, הטיפול החלופי הוא **Doxycycline** - אולם התשובה מכוונת ל**Rifampin** בשילוב, או יותר סביר - מדובר ב**Isoniazid/Rifampin** כלומר מצב של **TB** (גרנולומות בכיח) → טיפול **RIPE** → תופעת הלוואי השכיחה ביותר היא **Hepatotoxicity** (בעיקר מ-Isoniaz", "reason": "Explanation contradicts itself: describes Actinomyces then TB"}, {"idx": 179, "ti": 10, "t": "2021-Jun", "q": "בן 52, שמזה 10 ימים סובל ממחלת חום. בבדיקתו נמוש טחול 2 ס\"מ מתחת לקשת. במעבדה: המוגלובין 8 גר'/ד\"ל עם MCV גבוה, לויקוציטים 2,400 בממ\"ק מתוכם 700 נויטרופילים, וטסיות 45,000 בממ\"ק. LDH 3,000, פריטין 1,500 וטריגליצרידים 300 מ\"ג/ד\"ל. מה בדיקת הבחירה לאבחנה?", "o": ["בדיקת JAK2", "IL-2 receptor (CD25)", "רמת ויטמין B12", "PET-CT"], "c": 1, "e": "## התשובה הנכונה: ב. IL-2 receptor (CD25)\n\n### הסבר:\n\n**1. האבחנה המבדלת המרכזית:**\nהתמונה הקלינית – חום ממושך (10 ימים), **ספלנומגליה**, ואנמיה עם **MCV גבוה (מקרוציטית)** – מכוונת ל**לימפומה** (בפרט Hodgkin או NHL), שבה IL-2 receptor מסיס (sCD25) משמש כסמן פעילות מחלה אמין ומבוסס, ומהווה חלק מקריטריוני HScore לאבחון HLH שגם הוא באבחנה המבדלת.\n\n**2. למה לא האחרות:**\n- **JAK2** – רלוונטי למחלות מיאלופ", "reason": "Explanation describes lymphoma; CD25 indicates HLH"}, {"idx": 202, "ti": 2, "t": "2021-Jun", "q": "בן 72 פונה למלר״ד בשל סחרחורת ועייפות. ברקע מחלת לב איסכמית ואי ספיקת הלב. בבדיקה ל״ד 110/60 ממ״כ, דופק 140 לדקה. תרשים אק״ג מצורף בתמונה. מה מהבאים יתמוך בהגדרת הפרעת הקצב כנובעת ממקור חדרי?", "o": ["העדר גלי P בתרשים ה-ECG", "מצבו ההמודינמי היציב של החולה", "ממצא של Cannon waves בבדיקת JVP", "תבנית של CRBBB בתרשים ה-ECG"], "c": 2, "e": "## הסבר מדוע ג' נכון\n\n**Cannon A-waves** ב-JVP נגרמות כאשר הפרעה קצב עם **דיסוציאציה אטריו-ונטריקולרית (AV dissociation)** — כלומר, הפרוזדור מתכווץ כנגד שסתום טריקוספידלי סגור (כי הפרוזדור והחדר פועלים באופן עצמאי ולא מסונכרן.\n\nבמקרה זה, **העדר גלי P בא-ריתמיה + רקע של מחלת לב + תסמינים** — הממצא של Cannon waves מכוון לאבחנה של **Complete AV Block (חסם AV מלא)**, שבו הפרוזדורים מתכווצים באופן עצמאי", "reason": "Explanation describes AV block, not ventricular origin"}, {"idx": 205, "ti": 19, "t": "2021-Jun", "q": "מה מ בין הבאים לא נחשב ( כטיפול מרפאCurative) ב- HCC ?", "o": ["Liver Transplantation", "Chemoembolization", "Partial Liver Resection", "Radio Frequency Ablation"], "c": 1, "e": "## התשובה הנכונה היא **ב. Chemoembolization (TACE)**\n\n### הסבר בשני משפטים:\n\n1. **Chemoembolization (TACE)** היא טכניקת **חסימת כלי הדם** המזינים את הגידול תוך הזרקת כימותרפיה מקומית, אך היא **אינה מוציאה את הגידול לחלוטין** מהגוף ולכן נחשבת לטיפול **פליאטיבי / גישרי** (Palliative/Bridge therapy) ולא מרפא.\n\n2. שלוש האפשרויות האחרות — השתלת כבד, כריתה חלקית של הכבד, ו-RFA — כולן מטרתן **הוצאה מוחלטת או השמדה מוחלטת**", "reason": "Explanation says TACE is NOT curative treatment"}, {"idx": 217, "ti": 12, "t": "2021-Jun", "q": "מה נכון לגבי הטיפול עםDexamethasone ב- Bacterial meningitis ?", "o": ["יש לתת את הטיפול כ- דקות לפני מתן האנטיביוטיקה", "ניתן בצורה חד פעמית בסמוך למתן האנטיביוטיקה", "הטיפול מעלה את חדירות ה- BBB ל- Vancomycin", "יש להכפיל את המינון אם החולה כבר מטופל בסטרואידים"], "c": 0, "e": "## למה א' נכון: Dexamethasone ב-Bacterial Meningitis\n\n### התשובה הנכונה: א - יש לתת את הטיפול **15-20 דקות לפני** מתן האנטיביוטיקה\n\n---\n\n### הסבר בשני משפטים:\n\n1. **מנגנון הפעולה תלוי עיתוי:** Dexamethasone מפחית את התגובה הדלקתית הנגרמת משחרור רכיבי דופן החיידק בעת **ליזיס** מהאנטיביוטיקה - לכן חייבים לתת אותו *לפני* שהאנטיביוטיקה מתחילה להרוג את החיידקים ומשחררת ציטוקינים (TNF, IL-1) שגורמים לנזק.", "reason": "Explanation says 15-20 minutes, answer incomplete"}, {"idx": 225, "ti": 1, "t": "2021-Jun", "q": "בן 76, מתאשפז בשל קוצר נשימה. לאחרונה נמצא בבירור בשל נוירופתיה ובצקות היקפיות ברגליים. באקו לב שבוצע בקהילה נמצא תפקוד סיסטולי תקין של חדר שמאל עם היפרטרופיה ניכרת. תרשים אק״ג בתמונה 22. מה נכון לגבי חולה זה?", "o": ["הפרוגנוזה במצבו טובה יותר מאשר בחולים עם HFpEF משני ליתר ל״ד", "שכיח למצוא FMF במשפחה", "דיגוקסין יהווה אבן יסוד בטיפול בו", "יש להמנע מברדיקרדיה בחולים אלה"], "c": 0, "e": "## הסבר מדוע א' נכון\n\nמהתיאור הקליני: בן 76 עם נוירופתיה, בצקות היקפיות וקוצר נשימה → **אמילואידוזיס לבבי** (ATTR או AL) עם **אי ספיקת לב עם EF שמור (HFpEF)**.\n\n---\n\n### למה א' נכון – הפרוגנוזה טובה יותר:\n\n1. **באמילואידוזיס ATTR (transthyretin)** – שהוא הסביר יותר בגיל 76 – הפרוגנוזה **טובה משמעותית** בהשוואה לאמילואידוזיס AL, מאחר ש-AL אמילואידוזיס הוא אגרסיבי הרבה יותר עם מעורב", "reason": "Explanation discusses amyloidosis, not comparing prognoses correctly"}, {"idx": 235, "ti": 22, "t": "2022-Jun", "q": "מה יפחית את השכיחות הגבוהה של מחלות ממאירות במושתלי כליה?", "o": ["מתן טיפול מונע ע\"י Valganciclovir", "מתן טיפול מונע ע\"י Aciclovir", "טיפול ע\"י m-TOR inhibitors במקום Calcineurin inhibitors", "טיפול ע\"י Mycophenolate mofetil במקום m-TOR inhibitors"], "c": 2, "e": "## למה ב' נכון: Aciclovir מפחית שכיחות מחלות ממאירות במושתלי כליה\n\n### משפט 1 – המנגנון:\n**EBV (Epstein-Barr Virus)** הוא הגורם המרכזי ל-**PTLD (Post-Transplant Lymphoproliferative Disease)** – אחת המחלות הממאירות השכיחות ביותר אחרי השתלה. **Aciclovir** מעכב את שכפול ה-EBV (ו-HSV/VZV) בשלב ה-lytic, ובכך מפחית את העומס הויראלי ואת הסיכון להתפתחות לימפומה.\n\n### משפט 2 – ההבדל מול Valganciclovir:\n**Valganciclovir** (תשוב", "reason": "Explanation discusses Aciclovir, not mTOR inhibitors"}, {"idx": 237, "ti": 6, "t": "2022-Jun", "q": "בת 64, ברקע GERD, סוכרת ויתר שומנים, מטופלת בסותרי חומצה Metformin ו-Simvastatin. ב-3 הימים האחרונים מטופלת ב-Ciprofloxacin בשל זיהום בדרכי השתן על פי רגישות החיידק, אך ללא הטבה. מה הסיבה הסבירה ביותר לחוסר ההטבה במצבה?", "o": ["הבדלים בעמידויות החיידק בין in vitro ל-in vivo", "ריכוזי Ciprofloxacin בדם נמוכים בשל הפרעת ספיגה", "ריכוזי Ciprofloxacin במערכת השתן נמוכים בשל הסוכרת", "פינוי מהיר של Ciprofloxacin בשל שיפעול של CYP2D6"], "c": 1, "e": "## התשובה הנכונה היא ב'\n\n**ריכוזי Ciprofloxacin בדם נמוכים בשל הפרעת ספיגה**\n\n### הסבר בשני משפטים:\n\n1. **סותרי חומצה (אנטציד/PPI)** מעלים את ה-pH בקיבה, ו-Ciprofloxacin דורש סביבה חומצית לספיגה תקינה — לכן ספיגתו במעי יורדת משמעותית כאשר נלקח במקביל לתרופות אלו.\n\n2. כתוצאה מירידה בספיגה, ריכוז התרופה בדם (ולכן גם ברקמות ובשתן) נמוך מה-MIC הנדרש לטיפול יעיל ב-UTI, מ", "reason": "Ciprofloxacin absorption not pH-dependent like explanation claims"}, {"idx": 243, "ti": 5, "t": "2022-Jun", "q": "בן 40 עם רקע של אסתמה מתקבל עקב שיעול פרודוקטיבי וצילום חזה לא תקין בקהילה (תמונה 2). החולה לא טופל באנטיביוטיקה ב-3 החודשים האחרונים. בשל מצבו הוא מאושפז ביחידה לטיפול נמרץ. מה הטיפול האנטיביוטי המומלץ?", "o": ["IV Meropenem ו-IV Vancomycin", "IV Ceftriaxone ו-IV Vancomycin", "IV Piperacillin-Tazobactam ו-PO Ciprofloxacin", "IV Ceftriaxone ו-PO Levofloxacin"], "c": 3, "e": "## למה ד נכון:\n\n**1. CAP (Community Acquired Pneumonia) קלאסי:**\nהחולה התקבל מהקהילה עם תמונה קלינית של דלקת ריאות נרכשת בקהילה, ולכן הטיפול המומלץ לפי הגדלינס (IDSA/ATS) ל-CAP המאושפז הוא שילוב של **β-lactam (Ceftriaxone)** לכיסוי פנאומוקוק ובקטריות שכיחות + **Fluoroquinolone נשימתי (Levofloxacin)** לכיסוי אטיפיים (Legionella, Mycoplasma, Chlamydia) — בדיוק מה שמציעה תשובה ד.\n\n**2. אין אינדיקציה לטיפול רחב-", "reason": "Explanation supports combination therapy, answer lists same drug"}, {"idx": 222, "ti": 7, "t": "2021-Jun", "q": "בן 80, מאושפז בגלל דליריום ומיעוט באכילה ושתיה. בהכנסת קטטר כ-50 מ\"ל שתן. במעבדה: אוראה 250 מ\"ג/ד\"ל, קריאטנין 7.1 מ\"ג/ד\"ל, אשלגן 5.7 מא\"ק/ל, נתרן 125 מא\"ק/ל, אלבומין 3.2 גר'/ד\"ל, גלובולינים 7.5 גר'/ד\"ל. בדיקת השתן שלילית לחלבון, תאים אדומים ותאים לבנים. בשתן יחס חלבון/קריאטנין 11 גר'/גר'. מה תהיה האבחנה הסבירה?", "o": ["Acute pre-renal Kidney Injury", "Myeloma cast nephropathy", "Membranous nephropathy", "ANCA-associated vasculitis"], "c": 1, "e": "## למה ב' נכון: **Acute Pre-renal Kidney Injury**\n\n**משפט 1 – הקליניקה מצביעה על היפובולמיה:**\nהחולה בן 80 סובל מ**מיעוט באכילה ושתייה** (intake ירוד), מה שגורם לדהידרציה והיפובולמיה → ירידה בנפח הדם הזורם לכליות → ירידה ב-GFR → אי ספיקת כליות **פרה-רנלית**.\n\n**משפט 2 – הממצאים האובייקטיביים תואמים Pre-renal:**\n**אוראה 250 מ\"ג/ד\"ל** עם עלייה **בלתי פרופורציונלית** יחסית לקרייאטינין (BUN/Cr ratio גבוה", "reason": "Explanation describes pre-renal injury not myeloma nephropathy"}, {"idx": 263, "ti": 9, "t": "2022-Jun", "q": "בן 42, בריא בדרך כלל. בשל אי נוחות בצוואר עבר בדיקת US צוואר שהדגימה בלוטת תריס תקינה ומבנה אובאלי בגודל 7 מ\"מ חשוד ל-parathyroid adenoma. במעבדה PTH מוגבר פי 1.5 מהערך העליון של הנורמה, סידן 8.7 מ\"ג/ד\"ל, פוספור 3.5 מ\"ג/ד\"ל, אלבומין 4 גר'/ד\"ל. מה הצעד הבא בניהול המקרה?", "o": ["ניתוח כריתת פראתירואיד", "FNA מונחה ע\"י US", "רמות ויטמין D", "CT ראש צוואר עם חומר ניגוד"], "c": 2, "e": "## התשובה הנכונה היא ג - בדיקת רמות ויטמין D\n\n### הסבר:\n\n**1. אבחנה מבדלת של המבנה האובאלי:**\nמבנה אובאלי בצוואר בUS, בנוכחות בלוטת תריס **תקינה**, מעלה חשד ל**בלוטת לימפה תגובתית** - שהיא הסיבה הנפוצה ביותר למצב זה, ולא גידול ממאיר או בלוטת פאראתירואיד.\n\n**2. הצעד ההגיוני הבא:**\nבלוטת לימפה תגובתית מוגדלת יכולה לנבוע מחסר ויטמין D (הגורם לדיסרגולציה של מערכת החיס", "reason": "Explanation discusses lymph node, not parathyroid management"}, {"idx": 275, "ti": 22, "t": "2022-Jun", "q": "בן 80, מגיע למלר״ד בשל בלבול כשבבדיקה לחץ דם 220/110 ממ״כ ביד ימין ו-100/60 ממ״כ ביד שמאל. מה הצעד המידי הבא במצב זה?", "o": ["הורדה מיידית של לח״ד סיסטולי מתחת ל-100 ממ״כ", "הורדת לח״ד ל-160/100 ממ״כ בתוך שעתיים", "ביצוע CT מוח", "בדיקת קרקעית עיניים"], "c": 0, "e": "## התשובה הנכונה: **א. הורדה מיידית של לח\"ד סיסטולי מתחת ל- 100 ממ\"כ**\n\n❌ **זו למעשה התשובה השגויה והמסוכנת!**\n\n---\n\n## התשובה הנכונה היא **ג. ביצוע CT מוח**\n\n### הסבר בשני משפטים:\n\n1. **הפער הדרמטי בלחץ הדם בין שתי הידיים (220 לעומת 100 ממ\"כ) מעיד על דיסקציה של אאורטה** – מצב בו קרע בדופן אבי העורקים חוסם את זרימת הדם לצד שמאל, ובלבול עשוי לנבוע מאיסכמיה מוחית הנל", "reason": "Explanation says marked answer is wrong"}, {"idx": 280, "ti": 7, "t": "2022-Jun", "q": "בן 72, עם אלח דם (sepsis) על רקע זיהום בדרכי השתן, מלווה באי ספיקת כליות חדה. במעבדה: קריאטינין 2.5 מ\"ג/ד\"ל (בסיס 1 מ\"ג/ד\"ל) ו-BUN מ\"ג/ד\"ל. תפוקת השתן שלו במהלך 6 השעות הראשונות לאשפוזו היא 20 מ\"ל. משקלו 80 ק\"ג. מה ה-GFR המוערך שלו?", "o": ["א. כ-1 מ\"ל לדקה", "ב. כ-10 מ\"ל לדקה", "ג. כ-30 מ\"ל לדקה", "ד. כ-60 מ\"ל לדקה"], "c": 0, "e": "## תשובה: א - קצב סינון גלומרולרי (GFR) של כ-1 מ\"ל לדקה\n\n### הסבר בשני משפטים:\n\n1. **נוסחת Cockcroft-Gault** לחישוב קצב הסינון הגלומרולרי (CrCl) היא:\n**CrCl = [(140 - גיל) × משקל] / (72 × קריאטינין)**,\nובמטופל בן **72** עם קריאטינין **2.5**, הגיל (140-72=68) כמעט מתבטל עם המכנה, ומתקבל ערך נמוך מאוד של סביב **20-28 מ\"ל/דקה** — אך בנוכחות **אי ספיקת כליות חדה (AKI) עם ספס", "reason": "Calculation shows 20-28 ml/min not 1 ml/min"}, {"idx": 273, "ti": 12, "t": "2022-Jun", "q": "בת 75 עם רקע של Hypertrophic Cardiomyopathy מתאשפזת עקב אובדן 4 ק״ג במשקל גרד והזעות ליליות. מציינת כי עברה טיפול שיניים לפני 6 שבועות. בבדיקתה פריחה על כפות ידיים (תמונה 6) ללא ממצאים חריגים אחרים. במעבדה צמיחה של Aggregatibacter בשתי תרביות דם נפרדות. מה יגדיר definite endocarditis בחולה זו?", "o": ["חום 38.6 C°", "צמיחה של הפתוגן בתרבית שלישית", "מפרצת מיקוטית ב-CT ראש", "אוטם בטחול"], "c": 0, "e": "## התשובה הנכונה: א. חום C° 38.6\n\n## הסבר:\n\n**קריטריוני Duke לאבחון אנדוקרדיטיס חיידקית (IE):**\n\nהחולה עם **HCM** (גורם סיכון מרכזי ל-IE בשל הפרעה בזרימת הדם ופגיעה במסתמים) מציגה תסמינים קלאסיים של IE — ירידה במשקל, גרד והזעות לילות.\n\n**חום ≥38°C הוא קריטריון מינורי אחד בלבד** לפי Duke, ולכן **אינו מספיק לבדו** לאבחון — הוא אינו הממצא **האבחנתי** הספציפי ביותר.\n\n---\n\n**לעומת זאת, התש", "reason": "Explanation contradicts answer - fever alone insufficient"}, {"idx": 303, "ti": 9, "t": "2022-Jun", "q": "בת 45, ברקע השמנת יתר ובשנה האחרונה סוכרת. מטופלת ב-Metformin ובתכשיר מסוג GLP1 (Dulaglutide שבועי). המוגלובין מסוכרר 8.5%. מה מהווה התווית נגד למתן תכשיר מקבוצת מעכבי SGLT2 בחולה זו?", "o": ["ירידה בינונית-קשה בתפקוד סיסטולי של חדר שמאל", "אורוספסיס בעבר על רקע אבנים שלא הוצאו", "Body Mass Index מתחת ל-20", "CKD 5 לא בדיאליזה"], "c": 3, "e": "## התשובה הנכונה היא ד' - CKD 5 לא בדיאליזה\n\n### הסבר בשני משפטים:\n\n1. **Metformin אסור לשימוש ב-CKD 5** (GFR < 15 מ\"ל/דקה) בשל סכנת **לקטיק אצידוזיס** - התרופה מופרשת דרך הכליות ובאי-ספיקת כליות חמורה היא מצטברת ברקמות ומעכבת את מטבוליזם הלקטט במיטוכונדריה.\n\n2. **Dulaglutide (GLP-1)** אינו מומלץ ב-CKD 5 מכיוון שעלול להחמיר את תפקוד הכליות עקב **גרימת בחילות, ה", "reason": "Explanation discusses Metformin/GLP-1, not SGLT2 inhibitors"}, {"idx": 314, "ti": 1, "t": "2022-Jun", "q": "בן 30 מתלונן על צריבה והפרשות מהשופכה לראשונה בחייו. ברקע קיום יחסים לא מוגנים עם בן זוג קבוע. מה נכון לגבי הטיפול?", "o": ["יש לטפל בשילוב של Amoxicillin ו-Levofloxacin", "יש לשלב בטיפול גם Doxycycline ל-M. genitalium", "הטיפול כולל Azithromycin פומי במינון 1,000 מ״ג", "ל-Azithromycin אין משמעות בטיפול ב-N. gonorrhea"], "c": 2, "e": "## התשובה הנכונה: ג\n\n**הסבר:**\n\nמדובר בדלקת שופכה (Urethritis) לאחר יחסים לא מוגנים — הגורמים הנפוצים ביותר הם **N. gonorrhoeae** ו-**C. trachomatis**, ולכן הגישה היא **טיפול אמפירי כפול**.\n\n**Azithromycin 1g פומי במינון חד-פעמי** הוא הטיפול הסטנדרטי ל-**Chlamydia trachomatis**, וניתן **בשילוב** עם Ceftriaxone לכיסוי גונוקוק — זהו הפרוטוקול המקובל (CDC guidelines) לטיפול אמפירי ב-urethritis.\n\n> ❌ א' שגוי — Amoxic", "reason": "Explanation requires combination therapy, not monotherapy alone"}, {"idx": 308, "ti": 22, "t": "2022-Jun", "q": "על פי תוצאת יחס אלבומין/קריאטינין בשתן, למי יש מיקרואלבומינוריה?", "o": ["א. 50 מ\"ג/מ\"ג", "ב. 15 מ\"ג/ג'", "ג. 0.05 מ\"ג/מ\"ג", "ד. 50 מ\"ג/ג'"], "c": 3, "e": "## מיקרואלבומינוריה - תשובה ד נכונה\n\n**מיקרואלבומינוריה מוגדרת כיחס אלבומין/קריאטינין בשתן בין 30-300 מ\"ג/ג.**\n\nתשובה ד' (מ\"ג/ג) נכונה כי היחידות הנכונות לביטוי יחס אלבומין/קריאטינין הן **מ\"ג אלבומין לגרם קריאטינין**, וערך הנמצא בטווח 30–300 מ\"ג/ג מגדיר מיקרואלבומינוריה — בניגוד לתשובות עם יחידות מ\"ג/מ\"ג שהן יחידות שגויות לחלוטין למדידה זו, ומספרית", "reason": "Explanation defines 30-300 mg/g range, answer is 50"}, {"idx": 312, "ti": 0, "t": "2022-Jun", "q": "בן 55, שאושפז עקב STEMI, עבר PCI תוך שעה עם סטנט לעורק החסום ללא סיבוכים. לפני השחרור, כשהחולה במצב טוב, הוא שואל תוך כמה זמן ניתן לחזור לפעילות מינית סדירה. מה תשובתך?", "o": ["לאחר 6 חודשים", "לאחר שבוע", "לאחר חודש", "לאחר חודשיים"], "c": 1, "e": "## התשובה היא ב - לאחר שבוע\n\n**הסבר:**\n\n1. **בדיקת מאמץ לאחר STEMI עם PCI מוצלח** מומלצת לאחר **שבוע עד שבועיים** מהשחרור (בחולה יציב ללא סיבוכים), כדי להעריך את תפקוד הלב, סבילות למאמץ, ולאשר הצלחת ההתערבות לפני חזרה לפעילות יומיומית.\n\n2. **המתנה ארוכה יותר אינה מוצדקת** בחולה שעבר PCI מוצלח ללא סיבוכים ונמצא במצב טוב — בדיקה לאחר חודש, חודשיים או שישה חודשים עלולה **", "reason": "Explanation discusses stress test timing, not sexual activity"}, {"idx": 326, "ti": 0, "t": "2022-Jun", "q": "בת 38 אובחנה כסובלת ממחלת Graves והוחל טיפול ב-Mercaptizol. שלושה שבועות לאחר התחלת הטיפול נמדד חום 38.3°C והופיעו כאבי גרון. ספירת דם הדגימה לויקוציטוזיס עם סטייה שמאלה. משטח גרון חיובי ל-Streptococcus. הוחל טיפול אמפירי ב-Penicillin. מה הגישה הטיפולית בשלב זה?", "o": ["להמשיך Mercaptizol במקביל לאנטיביוטיקה", "להשהות מיידית את הטיפול ב-Mercaptizol", "להוסיף סטרואידים פומיים", "להחליף את ה-Mercaptizol ל-PTU"], "c": 0, "e": "## התשובה הנכונה: ב - להשהות מיידית את הטיפול ב-Mercaptizol\n\n### הסבר:\n\n**1. חום הוא סימן אזהרה ל-Agranulocytosis**\nתרופות מקבוצת ה-Thionamides (כולל Mercaptizol/Methimazole) גורמות ב-~0.5% מהמקרים ל**Agranulocytosis** (ירידה חמורה בנויטרופילים), וחום הוא הסימן הקליני הראשון והמרכזי לכך - ולכן יש להפסיק את התרופה **מיידית** עד לשלילת הסיבוך.\n\n**2. המשך הטיפול עלול לסכן חיים**\nלפני שמוסיפים אנטיביוט", "reason": "Explanation supports stopping Mercaptizol, not continuing it"}, {"idx": 329, "ti": 1, "t": "2022-Jun", "q": "בת 35, מושתלת כליה מזה חודשיים, מאושפזת בשל חום ובלבול. ידוע על אלרגיה לפניצילין. בניקור מותני 700 מונונוקלארים, גלוקוז 30 מ״ג/ד״ל (בדם 100 מג/ד״ל), חלבון גבוה ובמשטח ישיר מתגים גרם חיוביים. מה נכון לגבי הטיפול?", "o": ["יש להוסיף לטיפול Doxycycline IV", "כיסוי אמפירי ב-Ceftriaxone מספיק במקרה זה", "טיפול ב-Dexamethasone ישפר את הפרוגנוזה", "טיפול הבחירה Trimethoprim-Sulfamethoxazole IV"], "c": 3, "e": "## למה ד נכון: TMP-SMX IV הוא טיפול הבחירה\n\n**1. כיסוי של Listeria monocytogenes:**\nבמטופלת מדוכאת חיסון (מושתלת כליה + טיפול אימונוסופרסיבי), עם תמונה של מנינגיטיס ו-700 תאים בנוזל CSF, **Listeria היא חשד קריטי** – והיא **עמידה לצפלוספורינים** (Ceftriaxone לא מכסה אותה), ולכן TMP-SMX הוא הכיסוי האלטרנטיבי המועדף ל-Listeria.\n\n**2. אלרגיה לפניצילין שוללת Ampicillin:**\nהטיפול הסטנדרטי ל-Listeria הוא", "reason": "TMP-SMX doesn't cover gram-positive cocci on smear"}, {"idx": 335, "ti": 8, "t": "2022-Jun", "q": "כל החולים לעיל שמשקלם זהה, סובלים מהיפרקלמיה עם ריכוז אשלגן בדם של 5.8 מא\"ק/ליטר. למי מהם ה-total body potassium הנמוך ביותר?", "o": ["חולה הסובל מאי ספיקת כליות אוליגורית", "חולה הסובל ממחלת אדיסון", "חולה הסובל מ-RTA type IV", "חולה הסובל מהרעלת דיגוקסין"], "c": 3, "e": "## הסבר מדוע ד' נכון: הרעלת דיגוקסין\n\n### הרקע הפיזיולוגי\n\nדיגוקסין מעכב את משאבת **Na⁺/K⁺-ATPase** בממברנת התא.\n\n---\n\n### 2 משפטי הסבר:\n\n**משפט 1:**\nעיכוב Na⁺/K⁺-ATPase מונע מאשלגן **להיכנס לתוך התאים** – כלומר האשלגן \"נשאר\" בחוץ בדם, ולכן רמת האשלגן הגבוהה בדם (5.8) **אינה משקפת מחסור אמיתי בפוטסיום תוך-תאי** – ה-Total Body Potassium **(TBK) תקין או אף גב", "reason": "Explanation cut off, logic unclear or incomplete"}, {"idx": 331, "ti": 5, "t": "2022-Jun", "q": "מה האתיולוגיה הסבירה ביותר להיפוקלמיה של חולה שערכי האשלגן שלו בדם 2.2 מא\"ק/ליטר, נתרן 140 מא\"ק/ל, כלור 114 מא\"ק/ל, קריאטינין 1.2 מ\"ג/ד\"ל, ובבדיקת הגזים pH 7.25, ביקרבונט 18 מא\"ק/ל, PCO2 40 ממ\"כ. בבדיקת השתן: אשלגן 10 מא\"ק/ליטר וקריאטינין 50 מ\"ג/ד\"ל.", "o": ["שלשול", "RTA type 1", "שימוש במשתנים", "אכילת ליקוריץ"], "c": 0, "e": "## התשובה: א. שלשול\n\n### הסבר:\n\n**1. היפוקלמיה עם היפוכלורמיה ואצידוזיס מטבולי:**\nשלשול גורם לאיבוד ישיר של אשלגן ו**ביקרבונט** דרך הצואה, מה שמוביל לאצידוזיס מטבולי היפוכלורמי עם היפוקלמיה – תמונה המתאימה לערכי הכלוריד הנמוכים שצוינו (הכלוריד לא הושלם בשאלה, אך ההקשר מרמז על ירידה).\n\n**2. שלילת האפשרויות האחרות:**\n- **RTA type 1** – גורם אצידוזיס אך עם **כלוריד תקין", "reason": "Explanation shows hyperchloremia (114), contradicts diarrhea hypothesis"}, {"idx": 347, "ti": 12, "t": "2022-Jun", "q": "בת 85 ילידת ברה\"מ לשעבר מתאשפזת עקב חום, שיעול וכאבים בחזה. צילום החזה בתמונה 17. מה השיקולים לגבי הטיפול?", "o": ["יש להמתין לתוצאות התרבית לפני התחלת טיפול", "לתרבית מנוזל או רקמה פלאורליים אותה רמת דיוק אבחנתי", "בדיקת rtPCR מביופסיה פלאורלית עדיפה מבדיקה מנוזל פלאורלי", "סטרואידים סיסטמיים משפרים את הפרוגנוזה"], "c": 2, "e": "## הסבר מדוע ג נכון\n\nהצילום מראה **פלאוריטיס/תפליט פלאורלי** בחולה מבוגרת ילידת ברה\"מ לשעבר – תמונה קלאסית החשודה ל**שחפת (TB)**.\n\n---\n\n### שתי סיבות מדוע ג נכונה:\n\n1. **רגישות גבוהה יותר של RT-PCR מביופסיה פלאורלית לעומת בדיקת תרבית מנוזל פלאורלי** – נוזל פלאורלי ב-TB הוא לרוב **פאוצי-בצילרי** (מעט חיידקים), ולכן תרביות מנוזל פלאורלי חיוביות ב-**20-40% בלבד**.", "reason": "Explanation mentions culture, answer mentions RT-PCR technique"}, {"idx": 353, "ti": 5, "t": "2022-Jun", "q": "בן 38, ללא מחלות רקע ידועות מגיע לבירור באשפוז לאחר שבועיים של חום סביב 38, שיעול פרודוקטיבי עם ליחה שלדבריו \"מסריחה\" ולחצים לסירוגין בחזה. צילום חזה בתמונה 18. מה הצעד הבא?", "o": ["ביצוע ברונכוסקופיה כולל Trans Bronchial Biopsy", "ביצוע ביופסיה (FNB) ואספירציה (FNA) תחת CT", "התחלת טיפול ב-Ceftriaxone וב-Azithromycine", "התחלת טיפול ב-Amoxicillin-Clavulanate"], "c": 3, "e": "## הסבר מדוע ד נכון:\n\n### 1. אין אינדיקציה לאשפוז / טיפול אמפירי לדלקת ריאות נרכשת בקהילה (CAP) קל-בינוני\nבן 38 ללא מחלות רקע עם חום ושיעול פרודוקטיבי של שבועיים — התמונה תואמת **דלקת ריאות נרכשת בקהילה (CAP)**. לפי קריטריוני החומרה (PSI/CURB-65) מדובר בחולה **בסיכון נמוך**, שאינו מצריך טיפול אמפירי עם כיסוי רחב כמו Ceftriaxone, אלא **Amoxicillin-Clavulanate** המכסה את הפתוגנ", "reason": "Explanation says low-risk outpatient CAP, contradicts hospitalization"}, {"idx": 356, "ti": 2, "t": "2022-Jun", "q": "בת 63, עם סרטן שד מטסטטי, מתקבלת בעקבות שקיעה במצב ההכרה. בבדיקתה רושם JVP מוגבר מאוד, למצב ירוד ולחץ דם נמוך. מה צפוי להימצא בחולה זו?", "o": ["Left ventricular Hypertrophy", "Slow atrial fibrillation", "Diastolic IV sound", "Pulsus alternans"], "c": 3, "e": "## התשובה הנכונה: ד. Pulsus alternans\n\n### הסבר:\n\n**Pulsus alternans** הוא סימן קלאסי של **אי ספיקת לב שמאלי חמורה** – דפוס בו הדופק מתחלף בין פעימות חזקות לחלשות בקצב סינוס סדיר.\n\n1. **הקשר הקליני:** חולה עם סרטן שד גרורתי + ירידה בהכרה + **JVP מוגבר מאוד + לחץ דם ירוד** = תמונה של **טמפונדה לבבית** (גרורות פריקרדיאליות שכיחות בסרטן שד), או קרדיומיופתיה חמורה – שתיהן גורמות לירידה דרמטית", "reason": "Explanation describes tamponade not alternans condition"}, {"idx": 358, "ti": 10, "t": "2022-Jun", "q": "בן 60, סובל מכאב גב תחתון במשך מספר שנים ובצקת ברגליים, מגיע לבירור עקב אי ספיקת כליות מתקדמת (קריאטינין 3 מ״ג/ד״ל). ב-US נראה הידרונפרוזיס דו צדדי וב-CT יש גם פרי-אאורטיטיס. מה הטיפול הראשוני בחולה?", "o": ["Methotrexate", "Corticosteroids", "Cyclophosphamide", "Anti-IL-6 antibody"], "c": 1, "e": "## התשובה הנכונה היא **ב. Corticosteroids**\n\n### הסבר:\n\n**1. האבחנה המשתמעת:**\nהמצב הקליני – גבר בן 60, כאב גב תחתון כרוני, בצקת ברגליים ואי ספיקת כליות מתקדמת – מתאים מאוד ל**Amyloidosis (עמילואידוזיס)** משני ל-**Multiple Myeloma** או מחלה דלקתית כרונית, או ישירות **Multiple Myeloma** עם מעורבות כלייתית. האבחנה המובילה היא **AA Amyloidosis** או מיאלומה.\n\n---\n\n**2. למה קורטיקוסטרואידים נכונים:**\n\n- **קו ראשון לטיפול במיאלומה נ", "reason": "Explanation describes Amyloidosis/Myeloma not peri-aortitis treatment"}, {"idx": 368, "ti": 5, "t": "2022-Jun", "q": "בן 68 מתאשפז לבירור של קוצר נשימה המחמיר בהדרגה. באקו נמצא מפל לחצים ע\"פ הגרדיאנט הטריקוספידלי של 55, ו-moderate-severe MR. ברקע ידוע על COPD עם FEV1 של 60% מהצפוי וגם על דום נשימה בשינה, בינוני, שאינו מטופל. בצנתור לב ימני נמצא Mean PAP ממ\"כ ו-Pulmonary Capillary Wedge pressure ממ\"כ. מה ניתן להסיק לגבי הגורם העיקרי של לחץ הדם הריאתי?", "o": ["א. מדובר בלחץ דם ריאתי פרה-קפילרי המתאים למחלת הריאה שלו", "ב. מדובר בלחץ דם ריאתי המתאים לקבוצה I – יל\"ד ראשוני אידיופטי", "ג. מדובר בלחץ דם ריאתי פוסט קפילרי המתאים למחלת הריאה שלו", "ד. מדובר בלחץ דם ריאתי פוסט-קפילרי המתאים למחלת הלב שלו"], "c": 3, "e": "## הסבר מדוע ד נכון:\n\n### 1. חישוב לחץ סיסטולי ריאתי (RVSP/PASP):\n\nהגרדיאנט הטריקוספידלי של **55 mmHg** + לחץ אטריום ימין (RAP ~ 5-10 mmHg) = **~60-65 mmHg**\n\nלחץ סיסטולי ריאתי **>25 mmHg** = יתר לחץ דם ריאתי (PAH), וערך זה **גבוה משמעותית** → מדובר ביל\"ד ריאתי.\n\n---\n\n### 2. מדוע פוסט-קפילרי?\n\nהמטופל בן **68** עם קוצר נשימה מחמיר בהדרגה – הגיל והפרופיל הקליני מ", "reason": "Explanation incomplete, cannot verify post-capillary determination"}, {"idx": 369, "ti": 7, "t": "2022-Jun", "q": "מה הסיבה הסבירה ביותר לתוצאות המעבדה הבאות בגבר בן 55?\nNa Osmolality\nSerum 115 mEq/L 265 mOsm/KgH\nUrine 15 mEq/L 80 mOsm/KgH", "o": ["Nephrogenic DI", "SIADH", "Beer potomania", "Diuretics"], "c": 2, "e": "## למה ג' (Beer Potomania) נכון:\n\n**1. האוסמולליות הנמוכה תואמת צריכת נוזלים מסיבית עם מעט מאוד סולוטים:**\nב-Beer Potomania, המטופל שותה כמויות עצומות של בירה (עשירה במים אך דלה מאוד בחלבון ומלחים), מה שגורם לעומס נוזלים ללא מספיק סולוטים לאפשר הפרשת שתן תקינה — התוצאה היא היפונתרמיה עם **אוסמולליות סרום נמוכה (265)**, בדיוק כפי שמוצג.\n\n**2. ההיפונתרמיה אינה יכולה להיות SIADH כי ב-SIADH האו", "reason": "SIADH has concentrated urine, not dilute 80"}, {"idx": 371, "ti": 0, "t": "2022-Jun", "q": "בת 78, עם פרפור עליות, מושתלת קוצב בעקבות פאוזה (Pause). במעבר מפרפור לסינוס התקבלה לאשפוז בעקבות אי ספיקת לב חדשה. מה יכוון שמדובר בבעיה בקוצב?", "o": ["קצב לב סדיר", "אוושה סיסטולית מקסימלית במרווח בין צלעי שני מימין", "פולסציות בולטות בהסתכלות על הוריד הג'וגולרי", "קצב לב לא סדיר"], "c": 2, "e": "## למה ג נכון:\n\n**פרפור עליות** = העליות **אינן מתכווצות** בצורה מאורגנת ← אין גל A בלחץ הוורידי הוורידי.\n\nבמעבר ל**קצב סינוס** — העליות חוזרות להתכווץ בצורה מאורגנת ← מופיע מחדש **גל A בולט** בוורידים הצוואריים (JVP), הנראה כ**פולסציות בולטות** בהסתכלות על הוריד הג'וגולרי.\n\n---\n\n> בקצר: חזרת קצב סינוס = חזרת כיווץ עלייתי מאורגן = גל A חוזר ונראה כפולסציות בוורידי הצוואר.", "reason": "Explanation describes normal physiology, not pacemaker problem"}, {"idx": 372, "ti": 13, "t": "2022-Jun", "q": "בת 70, פונה למלר״ד עקב נפיחות וכאב בשורש כף היד מזה יומיים. זהו ההתקף הרביעי בשנתיים האחרונות. בניקור המפרק נמצאו 25,000 לויקוציטים. צילום שורש וכף היד בתמונה 21. איזה טיפול יכול למנוע התקפים חוזרים?", "o": ["Methotrexate", "Tofacitinib", "Allopurinol", "Colchicine"], "c": 3, "e": "## התשובה הנכונה היא ד - Colchicine\n\n**הסיבה:**\n\nהמטופלת סובלת מהתקפים חוזרים של **דלקת מפרקים גאוטית (Gout)** – ארתריטיס מיקרוגבישית קלאסית המתאפיינת בהתקפים חוזרים של נפיחות וכאב חריפים.\n\n**Colchicine היא תרופת הבחירה הראשונה לטיפול באקוטי של התקף גאוט**, שכן היא מעכבת את הנדידה של נויטרופילים ואת התגובה הדלקתית המושרית על ידי גבישי אורט חומצה, ובכך מקצרת ומקלה על ההתקף האקוטי ביעילות ג", "reason": "Explanation describes acute treatment not prevention"}, {"idx": 382, "ti": 12, "t": "2023-Jun", "q": "בן 80, עם אנדוקרדיטיס על רקע זיהום עם Enterococcus ובנוסף אי ספיקת כליות (קריאטינין 3 מ״ג/ד״ל). מה הטיפול במצב זה?", "o": ["Ampicillin במינון גבוה עם Chloramphenicol", "Ampicillin במינון גבוה עם Ceftriaxone", "Linezolid", "Meropenem"], "c": 1, "e": "## למה ד' נכון: Meropenem\n\n### הסבר בשני משפטים:\n\n1. **בגלל אי ספיקת כליות חמורה (קריאטינין 3 מ\"ג/ד\"ל)** – השילוב הסטנדרטי של **Ampicillin + Ceftriaxone** (תשובה ב') הוא אמנם הטיפול המועדף ב-Enterococcal endocarditis, אך Ceftriaxone תלוי בהפרשה כלייתית ודורש התאמת מינון, ואילו **Meropenem מכסה Enterococcus** ומהווה חלופה יעילה עם פרופיל בטיחותי טוב יותר בחולה עם פגיעה כלייתית קשה.\n\n2. **Meropenem ה", "reason": "Explanation supports Meropenem, answer is Ampicillin+Ceftriaxone"}, {"idx": 385, "ti": 3, "t": "2023-Jun", "q": "בן 42, פונה לחדר המיון בשל מדידת לחץ דם עם ערכים גבוהים. ברקע מושתל כליה מזה 3 חודשים על רקע ADPKD ומטופל ב-Prednisone 10 mg, Everolimus, ו-Mycophenolate mofetil (MMF). בבדיקה נראה חולה, מעט מבולבל, מתנשם, לחץ דם 200/100 ממ״הג, פורפורה על פני הגפיים. במעבדה המוגלובין 6.5 גר׳/ד״ל, טסיות 8 בממ״ק, קריאטינין 3 מ״ג/ד״ל. מה האטיולוגיה הסבירה ביותר למצבו?", "o": ["היצרות בהשקה העורקית", "הרעלת MMF", "הרעלת Everolimus", "תסמונת קושינג יאטרוגנית"], "c": 0, "e": "## תשובה: א. היצרות בהשקה העורקית (Transplant Renal Artery Stenosis - TRAS)\n\n---\n\n### הסבר בשני משפטים:\n\n**1.** בן 42 עם השתלת כליה לפני **3 חודשים בלבד** — זהו החלון הזמני הקלאסי להתפתחות TRAS (בד\"כ **1-6 חודשים** לאחר ההשתלה), כאשר ההיצרות נוצרת באתר האנסטומוזה העורקית עקב טכניקה כירורגית, טרשת עורקים, או תגובה פיברוטית — וביטויה הקליני הטיפוסי הוא **יתר לחץ דם עמיד וחמור**.\n\n**2.** רקע של **ADP", "reason": "Explanation describes TRAS, not thrombotic microangiopathy"}, {"idx": 386, "ti": 22, "t": "2023-Jun", "q": "בן 60, מאושפז בשל שלשול והמטומות מרובות בעור. ידוע על אי ספיקת הלב עם מקטע פליטה שמור, תסמונת נפרוטית, והפרעה כולסטטית. איזו בדיקה תוכיח את האבחנה הסבירה ביותר?", "o": ["רמת ויטמין B3", "אספירצית שומן בטני", "רמת ויטמין C", "אלקטרופורזה של חלבוני הסרום"], "c": 1, "e": "## התשובה הנכונה: א. רמת ויטמין B3 (ניאצין)\n\n---\n\n### הסבר בשני משפטים:\n\n**1.** המצגת הקלינית — שלשול, דרמטיטיס (המטומות/פריחה בעור) ובמטופל עם **תסמונת נפרוטית** (הגורמת לאיבוד חלבונים בשתן, כולל טריפטופן-נשא) — מתאימה בדיוק ל**פלגרה** (מחסור בויטמין B3/ניאצין), המאופיינת בשלישיית ה-3D: *Dermatitis, Diarrhea, Dementia*.\n\n**2.** תסמונת נפרוטית גורמת לאיבוד מוגבר של **טריפט", "reason": "Explanation supports vitamin B3, not fat aspiration"}, {"idx": 384, "ti": 0, "t": "2023-Jun", "q": "בן 85, מגיע לחדר המיון כשהוא מבולבל. לפני שבועיים אושפז בשל NSTEMI ושוחרר במצב טוב עם טיפול ב-Aspirin, Ticagrelor ו-Atorvastatin. בבדיקה כעת: בלבול ו-livedo reticularis. במעבדה: קריאטינין – 2 מ\"ג/ד\"ל (0.8 לפני שבועיים), BUN – מ\"ג/ד\"ל. רמות C3 נמוכות. מה מומלץ לעשות כעת בהקשר לסיבה הסבירה ביותר שגרמה לאי ספיקת הכליות?", "o": ["מתן סטרואידים", "מתן סטרואידים ו-Rituximab", "Plasmapheresis", "המשך מעקב"], "c": 3, "e": "## התשובה הנכונה היא ד' - המשך מעקב\n\n**הסבר קצר:**\n\nהמטופל בן 85 עם NSTEMI לאחרונה מגיע עם בלבול - התמונה הקלינית מתאימה ל**דמנציה/דליריום** על רקע גיל מבוגר ואשפוז אחרון, **ולא למחלה אימונולוגית** הדורשת התערבות כמו סטרואידים, Rituximab או Plasmapheresis.\n\nבמטופל קשיש עם רקע קרדיאלי, הגישה הנכונה היא **שמרנית** - מעקב, בירור גורמי הבלבול (זיהום, תרופות, הפרעות מטבוליות) **ללא טיפולים אג", "reason": "Explanation describes delirium, ignores cholesterol emboli syndrome"}, {"idx": 391, "ti": 5, "t": "2023-Jun", "q": "בת 68, עם COPD ותסמינים משמעותיים, והיא משתמשת לסירוגין בחמצן, לפי הצורך, מאושפזת בשל התלקחות ה-COPD, ורוויי החמצן 85% באוויר החדר. מה מומלץ לגבי טיפול בחמצן בחולה זו?", "o": ["יש לתת חמצן כדי שהסטורציה תישמר מעל 90%", "יש לתת חמצן במינון עד 2 ליטר לדקה", "אין מקום לטיפול בחמצן בחולה זו", "יש לטפל בחמצן רק בשעות הלילה"], "c": 0, "e": "## התשובה הנכונה: א\n\n### הסבר בשני משפטים:\n\nבהתלקחות COPD חריפה (AECOPD), המטרה היא לשמור על סטורציה של **88-92%** (ולא פחות מ-90% כפי שמציינת התשובה), כדי למנוע היפוקסמיה מסכנת חיים שגוברת על החשש מדיכוי נשימתי. **עצם העיקרון** שיש לתת חמצן ולכוון לסטורציה מעל 90% הוא נכון ובטוח יותר מהחלופות האחרות שמציגות מגבלה שרירותית (2 ל/ד) ללא קשר לצורך הקליני של המטופלת.\n\n> ⚠️ **ה", "reason": "Explanation says target is 88-92%, not above 90%"}, {"idx": 399, "ti": 13, "t": "2023-Jun", "q": "בת 75, מתלוננת על נוקשות וכאב בעורף, בחגורת הכתפיים ובירכיים מזה כשבועיים ללא כאב ראש וללא הפרעות בראיה. במעבדה אנמיה קלה ושקיעת דם 100 בשעה ראשונה. מה הטיפול המקובל בקו ראשון?", "o": ["Prednisone 10-20 מ\"ג", "Prednisone במינון 1 מ\"ג לק\"ג", "Tocilizumab במינון 8 מ\"ג לק\"ג", "Ibuprofen במינון 800 מ\"ג, שלוש פעמים ביום"], "c": 0, "e": "## האבחנה: Polymyalgia Rheumatica (PMR)\n\n**למה א' נכון – Prednisone 10-20 מ\"ג:**\n\nPMR מטופל בסטרואידים במינון **נמוך-בינוני** (10-20 מ\"ג/יום), שכן המחלה מגיבה באופן דרמטי למינון זה תוך 24-72 שעות, והתגובה המהירה היא בפני עצמה קריטריון אבחנתי.\n\n---\n\n**למה התשובות האחרות שגויות (בקצרה):**\n\n- **ב'** – מינון 1 מ\"ג/ק\"ג שמור ל-**GCA (Giant Cell Arteritis)** עם סכנת עיוורון – כאן אין כאב ראש או מעורבות כלי", "reason": "Explanation recommends 10-20mg but for different condition"}, {"idx": 409, "ti": 0, "t": "2023-Jun", "q": "בן 22, מטופל באופן קבוע ב-Methylphenidate, מופנה לחדר המיון כשעתיים לאחר בליעת 18 גרם Acetaminophen (Paracetamol). במעבדה: ספירת דם תקינה, AST יח'/ל ו-ALT יח'/ל, קריאטינין תקין. רמת Acetaminophen מק\"ג/מ\"ל. מה ניתן להניח לגבי מצבו?", "o": ["תיזמון בדיקת רמת ה-Paracetamol שולל אפשרות לפגיעה טוקסית", "רמת אנזימי הכבד מרמזת על פתולוגיה אחרת מפגיעת ה-Paracetamol", "יש להתחיל טיפול בקו ראשון ב-Saline תוך ורידי ובפחם פעיל פומי", "הרעילות הכבדית גבוהה יותר בגלל הטיפול הקבוע ב-Methylphenidate"], "c": 1, "e": "## התשובה הנכונה היא **ב'**\n\n### הסבר בשני משפטים:\n\n**Methylphenidate הוא מעכב של CYP2D6, אך החשוב יותר הוא שהוא גורם לאינדוקציה של נתיבי חמצון בכבד** – דבר זה מגביר את ייצור **NAPQI** (המטבוליט הרעיל של פרצטמול) דרך CYP2E1/CYP1A2, ולכן בחולה הזה הרעילות הכבדית **גבוהה יותר מהצפוי** לפי נומוגרם Rumack-Matthew הסטנדרטי.\n\nבמצב של רעילות מוגברת, **אנזימי הכבד (AST/ALT) עשויים לעלות מוקד", "reason": "Explanation describes enhanced toxicity, not other pathology"}, {"idx": 437, "ti": 5, "t": "2023-Jun", "q": "בן 22 פונה בשל חולשה. בבדיקה: לחץ דם 100/60 ממ״כ, והיפרפיגמנטציה בכפות הידיים וברירות. במעבדה: נתרן 125 מא״ק/ל, אוסמולריות בשתן 400, וריכוז נתרן בשתן 40. איזה פרט באנמנזה של החולה יתאים ביותר לתמונה המתוארת?", "o": ["הוא יהודי ממוצא איראני ולאחותו אירועים חוזרים של פטרת בריריות", "מטופל ב-Levothyroxine מזה שנתיים לאחר שחלה ב-Hashimoto", "טופל לאחרונה במעכבי tyrosine kinase עקב מלנומה גרורתית", "טופל עד לאחרונה בסטרואידים במינון גבוה והפסיק ללא tapering"], "c": 0, "e": "## הסבר מדוע א' נכון\n\nהתמונה הקלינית המתוארת – חולשה, יתר פיגמנטציה (כולל ריריות וכפות ידיים) ויתר אשלגן עם נתרן נמוך – מאפיינת **אי-ספיקת יותרת הכליה הראשונית (מחלת אדיסון)**.\n\n**משפט 1:**\nהעובדה שהאח הוא יהודי ממוצא איראני ולאחותו אירועים חוזרים (ככל הנראה **APS-1 / APECED**) מצביעה על מוטציה ב-**AIRE**, הגורמת לתסמונת פוליאנדוקרינית אוטואימונית מסוג 1 – שהיא **שכיחה", "reason": "Explanation cut off, incomplete for verification"}, {"idx": 442, "ti": 14, "t": "2023-Jun", "q": "מה הטיפול המתאים לאר ת ריטיס ספטית ללא סיבוכים סיסטמיים, כשבתרבית מדיקור הנוזלS. aureus רגיש ל- Methicillin ?", "o": ["Oxacillin בהזרקה לתוך המפרק", "IV Oxacillin למשך שישה שבועות", "IV Oxacillin + PO Rifampin למשך ארבעה שבועות", "IV Oxacillin למשך שבועיים ואחר כך טיפול פומי לשבועיים"], "c": 3, "e": "## תשובה ד' נכונה\n\n**ארתריטיס ספטית (MSSA) ללא סיבוכים סיסטמיים:**\n\n1. **משך הטיפול הכולל המקובל הוא 3-4 שבועות** – לאחר שבועיים של IV Oxacillin (להשגת ריכוזים גבוהים ומהירים לניקוי הזיה es, not neutropenia concern"}, {"idx": 618, "ti": 22, "t": "2024-Oct", "q": "מה מהבאים נכון לגבי אבחנת דליריום?", "o": ["הפרעה בקשב נדרשת לאבחנה", "הפרעה פלוקטואטיבית לא נדרשת באבחנה", "שינוי במצב הכרה נדרש באבחנה", "הפרעה בחשיבה קוהרנטית נדרשת באבחנה"], "c": 0, "e": "## תשובה: ב. הפרעה פלוקטואטיבית **לא** נדרשת לאבחנה\n\n### הסבר:\n\n**1. קריטריוני DSM-5 לדליריום דורשים:**\n- הפרעה בקשב ובמודעות **(א' נכון)**\n- שינוי קוגניטיבי נוסף (כמו הפרעה בחשיבה/זיכרון) **(ד' נכון)**\n- שינוי חד בהכרה **(ג' נכון)**\n\n**2. הפלוקטואציה היא מאפיין אופייני** של דליריום (תנודות לאורך היום), אך **אינה קריטריון הכרחי לאבחנה** לפי ה-DSM-5 — ניתן לאבחן דלירי", "reason": "Explanation says B is correct, not marked answer"}, {"idx": 616, "ti": 22, "t": "2024-Oct", "q": "בן 59 מאובחן עם מחלה ראומטולוגית. מתקבל לחדר מיון בתמונה של חום, תת לחץ דם ונראה חולה. בבדיקות הדם CRP - 0. איזו תרופה שמקבל המטופל יכולה לגרום לכך?", "o": ["Tocilizumab", "Adalimumab", "Abatacept", "Rituximab"], "c": 0, "e": "## למה התשובה היא **Abatacept (ג')**\n\n**Abatacept** הוא מעכב **CTLA-4-Ig** הפועל על ידי בלימת האקטיבציה של תאי T (בלוקדה של קו-סטימולציה CD80/CD86 – CD28) — **אינו גורם לשחרור ציטוקינים חריף** ולכן הסיכון ל-**Cytokine Release Syndrome (CRS)** נמוך משמעותית בהשוואה לתרופות אחרות.\n\nבניגוד לכך:\n- **Tocilizumab (א')** ו-**Adalimumab (ב')** — anti-IL6 / anti-TNF — יכולים לגרום לתגובות אינפוזיה ו-CRS\n- **Rituximab (ד')**", "reason": "Explanation supports Abatacept, not marked Tocilizumab"}, {"idx": 627, "ti": 0, "t": "2024-Oct", "q": "בן 30 בריא בדרך כלל, פונה למלר\"ד עקב כאבים לוחצים בחזה שהחלו לפני כיומיים לאחר שבהם סבל מחום ונזלת. מדדים במלר\"ד: לחץ דם 130/70, דופק 100 לדקה, חום תקין, סטורציה תקינה. בבדיקתו נראה אודם בגרון, אין סימני ספיקת לב, בדיקת הריאות תקינה. אק\"ג תקין. במעבדה: טרופונין 1000 בשתי בדיקות עוקבות. מה הטיפול הנכון ביותר כעת?", "o": ["אספירין וP2Y12 inhibitor", "סטרואידים תוך ורידיים", "אנטיביוטיקה", "טיפול תומך בלבד"], "c": 3, "e": "## התשובה הנכונה היא ד - טיפול תומך בלבד\n\n** לה זה?", "o": ["יש לטפל על מנת למנוע התפתחות של לוקמיות משנית", "אין צורך בטיפול – מעקב בלבד", "יש לטפל רק אם לחולה מוטציה ב-JAK2", "יש לטפל על מנת למנוע אירועים טרומבוטיים"], "c": 1, "e": "## למה ב' נכון – אין צורך בטיפול, מעקב בלבד\n\n**Essential Thrombocytosis** מחולקת לפי **סיכון טרומבוטי**:\n\n1. **גיל < 60** + **ללא היסטוריה של פקקת** = **סיכון נמוך** → מעקב בלבד\n2. **גיל ≥ 60** או **היסטוריה של פקקת** = סיכון גבוה → טיפול (Hydroxyurea)\n\n---\n\n### הסבר ב-2 משפטים:\n\n**משפט 1:** החולה בן 58 (מתחת ל-60) וללא היסטוריה של אירועים טרומבוטיים, ולכן הוא מסווג כ**סיכון נמוך** – בו הוכח שטי", "reason": "Patient is 58, explanation contradicts marked answer"}, {"idx": 698, "ti": 8, "t": "2024-Oct", "q": "בן 70, ברקע ידוע על HFrEF. בשבוע האחרון מקיא ונראה במצוקה ומתנשם. בבדיקות המעבדה:", "o": ["בבדיקתו כימיה גזים Na 140 מא\"ק/ל pH 7.58 K 5.2 מא\"ק/ל HCO3 10 מא\"ק/ל Cl 100 מא\"ק/ל PCO2 20 מ\"מ כספית Creatinine 1.8 מ\"ג/ד\"ל Albumin 4 ג'/ד\"ל מהי הפרעת החומצה בסיס של המטופל? בססת נשימתית עם פיצוי מטבולי הולם", "בססת נשימתית עם normal anion gap metabolic acidosis", "בששת נשימתית ובססת מטבולית בשילוב עם high anion gap metabolic acidosis", "בססת נשימתית עם high anion gap metabolic acidosis"], "c": 2, "e": "## למה ג' נכון: High Anion Gap Metabolic Acidosis\n\n### חישוב ה-Anion Gap:\n**AG = Na – (Cl + HCO₃)**\n\nנתונים: Na = 140, Cl = 100, HCO₃ = 10 (pH 7.58 עם הקשר קליני)\n\n**AG = 140 – (100 + 10) = 30** → **מוגבר** (נורמה < 12)\n\n---\n\n### 2 משפטים להסבר:\n\n1. **המטופל עם HFrEF + הקאות בשבוע אחרון** → הלב הכושל גורם לירידה בפרפוזיה כלייתית ורקמתית → צבירת **לקטט** (lactic acidosis מסוג B/cardiogenic), מה שמוביל ל-**high anion gap** עם פ", "reason": "Explanation shows high AG acidosis, not combined"}, {"idx": 702, "ti": 5, "t": "2024-Oct", "q": "איזה סיבוך מבין הבאים עשוי להיגרם על ידי מתן מוצרי דם מוקרנים?", "o": ["TRALI (Transfusion-related acute lung injury)", "Febrile non hemolytic transfusion reaction", "Alloimmunization", "GVHD (graft versus host disease)"], "c": 3, "e": "## למה ד' נכון – GVHD\n\nמוצרי דם מוקרנים (Irradiated blood products) ניתנים בדיוק **כדי למנוע** Transfusion-associated GVHD, כלומר ההקרנה **היא** הפתרון ל-GVHD ולא גורם לו.\n\n**הסבר בשני משפטים:**\n\n1. ההקרנה משמידה את הלימפוציטים T התורמים במוצר הדם, ובכך מונעת אותם מלתקוף את רקמות המארח החיסונית-מוחלש – כלומר מניעת GVHD היא **המטרה המרכזית** של מתן דם מוקרן.\n\n2. לכן GVHD הוא הסיבוך היחיד מהרש", "reason": "Explanation says irradiation PREVENTS GVHD, not causes"}, {"idx": 716, "ti": 6, "t": "2025-Jun", "q": "בן 82 יליד עירק, פנה למלר\"ד בשל חולשה וכאב בטן עז. מדווח על שתן כהה. מספר ימים קודם לכן סבל מחום ושיעול. בבדיקות הדם: המוגלובין 7.2 g/dL, רטיקולוציטים 250K, בילירובין בלתי ישיר 3.5 mg/dL, LDH מוגבר ו-Coombs ישיר שלילי. בבדיקת שתן המוגלובינוריה ללא המטוריה. איזו מבין תמונות משטח הדם הבאות סביר למצוא במקרה זה (תמונה 1)?", "o": ["משטח דם א'", "משטח דם ב'", "משטח דם ג'", "משטח דם ד'"], "c": 0, "e": "## התשובה היא א' - משטח דם א'\n\n### הסבר:\n\n**1. רקע אפידמיולוגי + ביטוי קליני של G6PD:**\nהמטופל הוא יליד עירק (אוכלוסייה בסיכון גבוה ל-G6PD), עם שתן כהה (המוגלובינוריה מהמוליזה), חום וחשיפה קודמת – תמונה קלאסית של **משבר המוליטי חריף** על רקע חסר G6PD.\n\n**2. ממצא אופייני במשטח – \"Bite Cells\" ו-\"Heinz Bodies\":**\nבמשטח א' ניתן לראות **כדוריות דם אדומות עם נגיסות (Bite Cells)** הנוצרות כאשר הטחול", "reason": "Explanation cut off, cannot verify complete reasoning"}, {"idx": 710, "ti": 0, "t": "2024-Oct", "q": "למי מהמטופלים הבאים מתאימות הבדיקות הללו: serum [K] – 2.8 meq/l, urine [K] – 35 meq/l, urine [Na] – 120 meq/l", "o": ["מטופל עם אנדוקרדיטיס המטופל מזה שבוע על ידי IV cloxacillin", "מטופל עם hyperosmolar state שהתחיל לקבל אינסולין דרך הוריד", "מטופל עם חום נויטרופני שמקבל יומיים GCSF", "מטופל עם קושי ממושך באכילה אחרי הקרנות לצוואר, שהחל לקבל TPN לפני 3 ימים"], "c": 0, "e": "## ניתוח הבדיקות\n\nהנתונים:\n- Serum K = **2.8 meq/l** (היפוקלמיה)\n- Urine K = **35 meq/l** (איבוד כליתי של אשלגן - גבוה)\n- Urine Na = **נמוך** (מרמז על נפח תוך-וסקולרי נמוך / אבסורפציה מקסימלית של Na)\n\n---\n\n## למה **א' נכון** - מטופל עם אנדוקרדיטיס המטופל שבוע ע\"י **Gentamicin**:\n\n### משפט 1:\nGentamicin (אמינוגליקוזיד) גורם לנזק טובולרי ישיר (**Fanconi-like syndrome / Bartter-like effect**) הפוגע ביכול", "reason": "Explanation discusses Gentamicin, answer states cloxacillin"}, {"idx": 713, "ti": 0, "t": "2025-Jun", "q": "בן 19 פונה למרפאה בשל חולשה ומבצע בדיקות מעבדה שמדגימות מספר פעמים ערכי סוכר של 130 מ\"ג/ד\"ל בצום. BMI – 22. לאביו וסבו הייתה סוכרת שאובחנה בגיל 22 ואף אחד מהם מעולם לא פיתח סיבוכי סוכרת או קטואצידוזיס. בהסתמך על האבחנה הסבירה ביותר, מה נכון לגבי הטיפול?", "o": ["ברוב המקרים נדרש טיפול באינסולין בשלב מוקדם של האבחון", "מעכבי dipeptidyl peptidase מומלצים כקו ראשון", "תרופות מקבוצת ה-sulfonylurea מומלצות כטיפול קו ראשון", "חלק ניכר יטופל רק ע\"י דיאטה מתאימה"], "c": 3, "e": "## התשובה הנכונה היא א'\n\n### הסבר בשני משפטים:\n\n**בן 19 עם ערכי גלוקוז בצום של 130 מ\"ג/ד\"ל** מאובחן כסוכרת סוג 1 (בהתחשב בגילו הצעיר), שבה קיימת **הרס אוטואימוני של תאי בטא** בלבלב עם חסר מוחלט של אינסולין אנדוגני.\n\nלכן, **ברוב מקרי סוכרת סוג 1**, הטיפול **חייב להיות אינסולין** מהשלב הראשון – ללא אפשרות לטפל בתרופות פומיות בלבד, מכיוון שהגוף אינו מייצר אינסולין ב", "reason": "Explanation says insulin required, answer says diet"}, {"idx": 717, "ti": 7, "t": "2025-Jun", "q": "בת 82, ברקע CKD, קריאטינין בסיס 1.7 מ\"ג/ד\"ל והיפראוריצמיה. התייצגה עם התקף גאוט וטופלה כמקובל. כעבור שבועיים פונה למלר\"ד בשל חולשת שרירים פרוקסימלית ו-CPK מוגבר. איזו מבין התרופות הבאות גרמה בסבירות הגבוהה ביותר לתלונותיה?", "o": ["Prednisone", "Etoricoxib", "Allopurinol", "Colchicine"], "c": 3, "e": "## למה ד (Colchicine) נכון:\n\n1. **בחולה עם CKD ו-eGFR ירוד** (קריאטינין בסיס 1.7 במבוגרת בת 82 = eGFR נמוך מאוד), קולכיצין בטוח יחסית לטיפול בהתקף גאוט חריף, **בניגוד ל-NSAIDs** (כמו Etoricoxib) שאסורים באי-ספיקת כליות בשל החמרת תפקוד כלייתי ועיכוב פרוסטגלנדינים.\n\n2. **סטרואידים (Prednisone)** הם אלטרנטיבה אך בגיל 82 הסיכונים גבוהים (היפרגליקמיה, אוסטאופ", "reason": "Explanation supports Colchicine safety, not its toxicity"}, {"idx": 715, "ti": 1, "t": "2025-Jun", "q": "בן 65, ברקע אי ספיקת לב סיסטולית על רקע מחלת לב איסכמית. בתרשים אק\"ג: מקצב סינוס עם CLBBB. לאור התמשכות סימפטומים למרות GDMT עובר השתלת CRTD. מה אחוז הקיצוב הרצוי?", "o": ["פחות מ-25%", "כ-50%", "כ-100%", "לא ניתן לקבוע מראש"], "c": 2, "e": "## למה ג' נכון – כ-100% סיכוי ל-LBBB אמיתי (אורגני)\n\n**1. שילוב של אי ספיקת לב סיסטולית + מחלת לב איסכמית = בסיס מבני ברור**\nבחולה עם קרדיומיופתיה איסכמית ו-EF ירודה, ה-LBBB נובע כמעט תמיד מנזק מיוקרדיאלי אמיתי (פיברוזיס, אוטם קודם, הפרעת הולכה אורגנית) – ולא מסיבה פונקציונלית חולפת.\n\n**2. CLBBB (Complete LBBB) בהקשר קליני זה = אינדיקציה מוחלטת ל-CRT**\nעל פ", "reason": "Explanation discusses LBBB probability not pacing percentage"}, {"idx": 720, "ti": 12, "t": "2025-Jun", "q": "בן 32, נמצא כסובל מפורפורה עורית ודימום מהחניכיים. בבדיקת עיניים מספר דימומים רטינליים. ממצאי מעבדה מגלים ספירת טסיות של 4000 / מיקרוליטר, שאר הספירה תקינה, תפקודי קרישה תקינים. סוג דם O neg. המטופל מקבל טיפול בשני תכשירים הניתנים כקו ראשון. איזו תופעת לוואי אפשרית כתוצאה מטיפול זה?", "o": ["Nephritic syndrome", "Aseptic meningitis", "Megaloblastic anemia", "Hemolytic anemia"], "c": 1, "e": "## התשובה הנכונה: ב. Aseptic Meningitis\n\n### הסבר בשני משפטים:\n\n**1.** התמונה הקלינית של פורפורה עורית + דימומים רטינליים + דימום חניכיים + פגיעה כלייתית (נפריטית) מצביעה על **SLE (זאבת אדמנתית)** – מחלה אוטואימונית שיכולה לפגוע בכל מערכות הגוף, כולל מערכת העצבים המרכזית.\n\n**2.** ב-SLE מתפתח **Aseptic Meningitis (דלקת קרום מוח ללא זיהום)** כסיבוך נוירולוגי ידוע (CNS Lupus / Neuropsychiatric SLE), הנגרם ממנגנ", "reason": "Explanation describes SLE complication, not ITP treatment"}, {"idx": 724, "ti": 22, "t": "2025-Jun", "q": "בת 83, ברקע יל\"ד וסוכרת, פונה אליך בשל תלונות על קוצר נשימה במאמצים ותחושת סחרחורת. מדדיה החיוניים מצביעים על דופק 40 לדקה. מה מבין הבאים יכווין לצורך בהשתלת קוצב קבוע בהקדם?", "o": ["אוושה סיסטולית בעוצמה 3/6 בגבול התחתון השמאלי של הסטרנום (LLSB)", "קול שני מוחלש", "טיפול קבוע ב-bisoprolol", "גלי a בולטים בבדיקת ורידי הצוואר"], "c": 3, "e": "## למה ד' נכון – גלי a בולטים בבדיקת ורידי הצוואר\n\n**גלי a בולטים** ב-JVP מייצגים **התכווצות פרוזדורית חזקה** כנגד התנגדות מוגברת – מה שמתרחש באופן קלאסי ב**היצרות מסתם אאורטלי (AS)**, שם החדר הימני (ובעקיפין הלחץ הפרוזדורי) מתמודד עם נוקשות חדרית (היענות ירודה של החדר השמאלי), שגורמת לפרוזדור לעבוד קשה יותר כדי למלא את החדר הנוקשה.\n\n**בהקשר הקליני:** בחולה בת 83 עם אוושה", "reason": "Explanation discusses aortic stenosis not pacemaker indication"}, {"idx": 731, "ti": 22, "t": "2025-Jun", "q": "איזה מבין הממצאים הבאים מנבא תיקון מהיר של ריכוז הנתרן בתגובה למתן סליין 0.9% במטופל עם לד 80/50 ממ\"כ והיפונתרמיה 121 מא\"ק/ל?", "o": ["א. אוסמולליות שתן 180 מאוסמ/ל", "ב. ריכוז נתרן בשתן 15 מא\"ק/ל", "ג. אבחנה של אדיסון שניוני", "ד. אי ספיקת כליות אקוטית, קריאטינין 3.5 מ\"ג/ד\"ל"], "c": 0, "e": "## התשובה הנכונה: א. אוסמולליות שתן 180 מאוסמ/ל\n\n---\n\n### הסבר בשני משפטים:\n\n**1.** אוסמולליות שתן **נמוכה (180 mOsm/L)** מעידה על כך שהכליה **כבר מדללת את השתן באופן מקסימלי** — כלומר ADH מדוכא והכליה מנסה להפריש מים חופשיים; מצב זה מאפיין **SIADH שנגרם מגירוי המודינמי (low-flow)** — כאשר עם מתן סליין ותיקון הנפח, הגירוי ל-ADH יפסק פתאומית והכליה תפריש כמות גדולה של מים מהר מאוד, מה ש", "reason": "Explanation contradicts itself - describes suppressed ADH"}, {"idx": 732, "ti": 22, "t": "2025-Jun", "q": "למי מבין המטופלים הבאים קיימת התוויה מוחלטת לטיפול בסטרואידים באבחנה של acute interstitial nephritis?", "o": ["בן 60 עם אי-ספיקת כליות שמתקדמת מהר (rapid progression) משנית לאלופורינול", "בת 25 עם חוסר שיפור בתפקוד כלייתי 5 ימים אחרי הפסקת טיפול באמוקסיצילין", "בן 46 עם עדות להסננה לימפוציטרית נרחבת בביופסיית כליה", "בת 20 עם יובש בעיניים ובפה ונוגדנים חיוביים ל-RO"], "c": 3, "e": "## התשובה הנכונה היא ד'\n\n**בת 20 עם יובש בעיניים ובפה ונוגדנים חיוביים** – התמונה הקלינית מתאימה ל**תסמונת שוגרן (Sjögren's Syndrome)**, שהיא מחלה אוטואימונית הגורמת AIN.\n\n---\n\n### למה ד' היא התווית נגד מוחלטת לסטרואידים?\n\n1. **ב-AIN על רקע שוגרן, הסטרואידים אינם יעילים ועלולים להזיק** – ה-AIN בשוגרן קשור לתהליך אוטואימוני כרוני עם פיברוזיס טובולואינטרסטיציאלי, ולא לתגובת רגישות יתר חרי", "reason": "Explanation calls it contraindication not absolute indication"}, {"idx": 736, "ti": 0, "t": "2025-Jun", "q": "בת 70, ברקע החלפת מסתם אורטלי למסתם ביולוגי. מאושפזת עם אבחנה של אנדוקרדיטיס על המסתם התותב עם צמיחה של staphylococcus aureus רגיש למתיצילין. המטופלת מציינת אלרגיה לפניצילין שהתבטאה בגרד קל. מה הטיפול המומלץ ביותר?", "o": ["Vancomycin + Gentamycin + Rifampin", "Cefazolin + Gentamycin + Rifampin", "יש לבצע דסנסיטיזציה לפניצילין ואז לטפל ב-Cloxacillin", "Vancomycin"], "c": 1, "e": "## התשובה הנכונה: א\n\n### הסבר:\n\n**1. בחירת הטיפול באנדוקרדיטיס על מסתם תותב (PVE):**\nאנדוקרדיטיס על מסתם תותב הנגרמת לרוב על ידי **Staph. epidermidis** או **Staph. aureus** מטופלת לפי הנחיות ה-AHA/ESC בשילוש **Vancomycin + Gentamycin + Rifampin** — ה-Rifampin חיוני במיוחד כי הוא חודר לביופילם על המסתם התותב, ו-Vancomycin ניתן עד לידיעת הרגישות (ולא Cefazolin שאינו קו ראשון אמפירי ב-PVE).\n\n**2. מדוע", "reason": "Explanation recommends Vancomycin not Cefazolin regimen"}, {"idx": 734, "ti": 22, "t": "2025-Jun", "q": "בת 55 פונה לאשפוז בשל מחלת שלשול וחום. מדווחת על 3 אירועי שלשול ביום וחום עד C 38.5 ביומיים האחרונים. בבדיקות בקבלתה: נתרן- מא\"ק/ליטר. לחצי הדם בקבלתה 90/60. לאחר קבלת שני ליטר נוזלים, הנתרן והאשלגן נותרים ללא שינוי. בשנה האחרונה הייתה מאושפזת פעמיים בשל היפונתרמיה סביב מחלה זיהומית חדה. בהתחשב באבחנה הסבירה ביותר מה מהבאים יעיד על מחלה ראשונית?", "o": ["היפוגליקמיה", "היפותירואידיזם", "היפרקלמיה", "אאוזינופיליה"], "c": 2, "e": "## למה ג. היפרקלמיה נכון\n\n**היפרקלמיה (עודף אשלגן בדם)** היא הסיבוך המטבולי הצפוי במצב זה מכיוון:\n\n1. **שלשול גורם לאיבוד נוזלים ואלקטרוליטים**, מה שמוביל להתייבשות ולירידה בנפח הדם → הכליות מפחיתות סילוק אשלגן (אוליגוריה/אי-ספיקה כלייתית פרה-רנלית), ובנוסף **אצידוזיס מטבולי** הנגרם מהשלשול גורם ל
