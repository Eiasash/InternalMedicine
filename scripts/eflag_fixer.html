const APP = 'pnimit';
const STOR = 'eflag_fix_'+APP;
let state = JSON.parse(localStorage.getItem(STOR)||'{}');
let filter = 'todo';
let pos = 0;

function filtered(){
  return ITEMS.map((item,i)=>({item,i})).filter(({item})=>{
    const d = state[item.idx];
    if(filter==='todo') return !d;
    if(filter==='applied') return d==='apply';
    if(filter==='flip_c') return item.fix==='flip_c' && !d;
    if(filter==='rewrite_e') return item.fix==='rewrite_e' && !d;
    if(filter==='ambiguous') return item.fix==='ambiguous';
    return true;
  });
}
function stats(){
  let a=0,r=0,s=0,t=0;
  ITEMS.forEach(item=>{
    const v = state[item.idx];
    if(v==='apply')a++;
    else if(v==='reject')r++;
    else if(v==='skip')s++;
    else t++;
  });
  return {a,r,s,t};
}
function render(){

  document.getElementById('nSkip').textContent = s.s;
  document.getElementById('nTodo').textContent = s.t;
  document.getElementById('total').textContent = ITEMS.length;
  document.getElementById('bar').style.width = (100*(s.a+s.r)/ITEMS.length)+'%';

      else if(j===item.c_current) cls+=' current';
      else if(j===item.new_c) cls+=' proposed';
    } else if(j===item.c_current) cls+=' current';
    const tag = (item.fix==='flip_c' && j===item.c_current && j!==item.new_c) ? ' <span style="font-size:9px;color:#fecaca">✗ current c</span>' :
                (item.fix==='flip_c' && j===item.new_c && j!==item.c_current) ? ' <span style="font-size:9px;color:#a7f3d0">✓ proposed</span>' :

  }).join('');

  }
  
  main.innerHTML = `

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function move(d){
  const list = filtered();

function decide(v){

  if(!list.length) return;
  const {item} = list[pos];

    out.decisions[item.idx] = {action: v, fix: item.fix, new_c: item.new_c, new_e: item.new_e};
  });
  const blob = new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'eflag_fixes_'+APP+'_'+Date.now()+'.json';
  a.click();
}
document.querySelectorAll('.filter-bar button').forEach(b=>{

    filter = b.dataset.f;
    pos = 0;
    render();
  };
});
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft') move(-1);
  else if(e.key==='ArrowRight') move(1);
  else if(e.key==='a') decide('apply');
  else if(e.key==='r') decide('reject');
  else if(e.key==='s') decide('skip');
