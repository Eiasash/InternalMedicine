<style id="clinical-kit">
/* SZMC Clinical Kit v1 (injected) */
/* SZMC Clinical Kit — semantic tokens + per-app skin. Additive layer; does
 * not remove existing --bg/--fg/--brd/--sky variables. New components should
 * reference --sem-* and --app-*; existing code keeps working unchanged.
 * Modes: body.dark, body.study (sepia) — both already match app conventions.
 */

/* ── Self-hosted Heebo (Hebrew + Latin, split by unicode-range) ── */
@font-face{font-family:"Heebo";font-style:normal;font-weight:400;font-display:swap;
  src:url("fonts/heebo-hebrew-400-normal.woff2") format("woff2");
  unicode-range:U+0590-05FF,U+FB1D-FB4F;}
@font-face{font-family:"Heebo";font-style:normal;font-weight:500;font-display:swap;
  src:url("fonts/heebo-hebrew-500-normal.woff2") format("woff2");
  unicode-range:U+0590-05FF,U+FB1D-FB4F;}
@font-face{font-family:"Heebo";font-style:normal;font-weight:600;font-display:swap;
  src:url("fonts/heebo-hebrew-600-normal.woff2") format("woff2");
  unicode-range:U+0590-05FF,U+FB1D-FB4F;}
@font-face{font-family:"Heebo";font-style:normal;font-weight:700;font-display:swap;
  src:url("fonts/heebo-hebrew-700-normal.woff2") format("woff2");
  unicode-range:U+0590-05FF,U+FB1D-FB4F;}
@font-face{font-family:"Heebo";font-style:normal;font-weight:400;font-display:swap;
  src:url("fonts/heebo-latin-400-normal.woff2") format("woff2");
  unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+2000-206F,U+2074,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;}
@font-face{font-family:"Heebo";font-style:normal;font-weight:500;font-display:swap;
  src:url("fonts/heebo-latin-500-normal.woff2") format("woff2");
  unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+2000-206F,U+2074,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;}
@font-face{font-family:"Heebo";font-style:normal;font-weight:600;font-display:swap;
  src:url("fonts/heebo-latin-600-normal.woff2") format("woff2");
  unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+2000-206F,U+2074,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;}
@font-face{font-family:"Heebo";font-style:normal;font-weight:700;font-display:swap;
  src:url("fonts/heebo-latin-700-normal.woff2") format("woff2");
  unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+2000-206F,U+2074,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;}

/* ── Self-hosted Inter (Latin only) ── */
@font-face{font-family:"Inter";font-style:normal;font-weight:400;font-display:swap;
  src:url("fonts/inter-latin-400-normal.woff2") format("woff2");}
@font-face{font-family:"Inter";font-style:normal;font-weight:500;font-display:swap;
  src:url("fonts/inter-latin-500-normal.woff2") format("woff2");}
@font-face{font-family:"Inter";font-style:normal;font-weight:600;font-display:swap;
  src:url("fonts/inter-latin-600-normal.woff2") format("woff2");}
@font-face{font-family:"Inter";font-style:normal;font-weight:700;font-display:swap;
  src:url("fonts/inter-latin-700-normal.woff2") format("woff2");}

/* ── Semantic tokens (clinical — reserved, never decorative) ── */
:root{
  --sem-critical:#ef4444;
  --sem-warning:#f59e0b;
  --sem-ok:#10b981;
  --sem-info:#3b82f6;
  --sem-neutral:#64748b;
  --tap-min:44px;
  /* Defaults (Shlav A already primary; overridden per-skin below) */
  --app-primary:rgb(var(--sky, 59 130 246));
  --app-accent:#8b5cf6;
  --app-on-primary:#fff;
}

/* ── Skin: Geriatrics (Shlav A) — amber primary, violet accent ── */
html[data-skin="geriatrics"]{
  --app-primary:#f59e0b;
  --app-accent:#8b5cf6;
  --app-on-primary:#1e293b;
}
/* ── Skin: Pnimit Mega — sky primary, emerald accent ── */
html[data-skin="pnimit"]{
  --app-primary:#3b82f6;
  --app-accent:#10b981;
  --app-on-primary:#fff;
}
/* ── Skin: Toranot — slate primary, sky accent ── */
html[data-skin="toranot"]{
  --app-primary:#1e293b;
  --app-accent:#3b82f6;
  --app-on-primary:#fff;
}

/* ── Dark mode (body.dark) keeps skin accent legible ── */
body.dark[data-skin="geriatrics"],html[data-skin="geriatrics"] body.dark{
  --app-primary:#fbbf24;
  --app-on-primary:#0f172a;
}
body.dark[data-skin="toranot"],html[data-skin="toranot"] body.dark{
  --app-primary:#3b82f6;
}
/* ── Study (sepia) — warm the primary toward amber for 3am ── */
body.study{--app-primary:#c48a3a;--app-on-primary:#0f172a;}

/* ── Clinical badges (semantic, reserved) ── */
.badge-critical{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#fef2f2;color:#dc2626}
.badge-warning {padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#fffbeb;color:#d97706}
.badge-ok      {padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#ecfdf5;color:#059669}
.badge-info    {padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#eff6ff;color:#2563eb}
body.dark .badge-critical{background:#450a0a;color:#fca5a5}
body.dark .badge-warning {background:#451a03;color:#fde68a}
body.dark .badge-ok      {background:#064e3b;color:#6ee7b7}
body.dark .badge-info    {background:#172554;color:#93c5fd}
body.study .badge-critical{background:#3d1212;color:#ff9b8a}
body.study .badge-warning {background:#3d2a12;color:#f0c878}
body.study .badge-ok      {background:#1e3d1e;color:#a6e0a0}
body.study .badge-info    {background:#1e2a3d;color:#a0c8f0}

/* ── Numeric (labs/doses/timers): tabular + LTR isolated inside RTL ── */
.num,.lab,.dose,.timer,.ltr-num{font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:isolate;}

/* ── 44px tap minimum for interactive elements ── */
.tap-min,button.tap-min{min-height:var(--tap-min);}

/* ── Reduced motion (respect OS setting globally) ── */
@media (prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important;animation:none!important;}}

</style>
