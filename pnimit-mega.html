<script>
document.addEventListener('DOMContentLoaded',function(){
const el=document.getElementById('hdr-sub');
if(!el)return;
function upd(){
const d=new Date();
const day=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
const h=String(d.getHours()).padStart(2,'0');
const m=String(d.getMinutes()).padStart(2,'0');
const mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
el.textContent=day+' '+d.getDate()+' '+mon+' · '+h+':'+m;
}
upd();setInterval(upd,30000);
});
</script>

// Boot: IDB migration → render
migrateToIDB().then(()=>{renderTabs();render();if(!localStorage.getItem('pnimit_seen_help')){localStorage.setItem('pnimit_seen_help','1');setTimeout(showHelp,500);}}).catch(e=>{console.error('IDB init failed, falling back to localStorage:',e);renderTabs();render();});
// Header version
{const hv=document.getElementById('headerVer');if(hv)hv.textContent='v'+APP_VERSION;}
// Prevent accidental navigation during mock exam
window.addEventListener('beforeunload',function(e){
  if(examMode&&(S.qOk+S.qNo)>0){
    e.preventDefault();
    e.returnValue='Mock exam in progress — are you sure you want to leave?';
    return e.returnValue;
  }
});
// iOS Safari: save on background
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='hidden'){
    try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){}
  }
});
</script>
