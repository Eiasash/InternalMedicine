<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://ima-contentfiles.s3.amazonaws.com https://ima-files.s3.amazonaws.com; connect-src 'self' https://*.supabase.co https://api.anthropic.com https://toranot.netlify.app;">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">

<title>Pnimit Mega — Internal Medicine Board Prep</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--sky:59 130 246;--em:16 185 129;--sl8:30 41 59;--red:239 68 68;--amb:245 158 11}
body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;color:#1e293b;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.heb{font-family:'Heebo',sans-serif;direction:rtl;text-align:right}
button{cursor:pointer;border:none;background:none;font:inherit}
input,textarea,select{font:inherit}
.hdr{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:10px 16px;position:sticky;top:0;z-index:40}
.hdr h1{font-size:16px;font-weight:700;letter-spacing:-.5px}
.hdr p{font-size:10px;color:#64748b;margin-top:1px}
.tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;display:flex;z-index:50;box-shadow:0 -2px 10px rgba(0,0,0,.06);padding-bottom:max(4px,env(safe-area-inset-bottom));overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{flex:0 0 auto;min-width:52px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 6px 6px;transition:.15s;font-size:10px;font-weight:600}
.tabs button.on{color:rgb(var(--sky))}
.tabs button:not(.on){color:#94a3b8}
.tabs .ic{font-size:18px}
.ct{max-width:640px;margin:0 auto;padding:12px 12px 80px}
.card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden;margin-bottom:10px}
.pill{display:inline-block;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;transition:.15s;cursor:pointer}
.pill.on{background:rgb(var(--sky));color:#fff;box-shadow:0 2px 6px rgba(59,130,246,.25)}
.pill:not(.on){background:#fff;color:#64748b;border:1px solid #e2e8f0}
.qo{width:100%;text-align:right;padding:12px 14px;border-radius:12px;border:2px solid #e2e8f0;font-size:12px;line-height:1.6;transition:.15s;margin-bottom:6px;font-family:'Heebo',sans-serif;display:block}
.qo:not(.lk):hover{border-color:#bae6fd;background:#f0f9ff}
.qo.sel{border-color:rgb(var(--sky));background:#eff6ff}
.qo.ok{border-color:rgb(var(--em));background:#ecfdf5;color:#065f46}
.qo.no{border-color:rgb(var(--red));background:#fef2f2;color:#991b1b}
.qo.dim{border-color:#f1f5f9;color:#cbd5e1}
.btn{padding:7px 18px;border-radius:12px;font-size:12px;font-weight:700;transition:.15s;display:inline-block}
.btn:disabled{opacity:.35}
.btn-p{background:rgb(var(--sky));color:#fff}
.btn-d{background:rgb(var(--sl8));color:#fff}
.btn-g{background:rgb(var(--em));color:#fff}
.btn-o{background:#f1f5f9;color:#475569}
.ab{max-height:0;overflow:hidden;transition:max-height .3s ease}.ab.op{max-height:5000px}
.acc-h{width:100%;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;text-align:left;transition:.1s}
.acc-h:hover{background:#f8fafc}
.acc-ic{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex-shrink:0}
.acc-ar{font-size:10px;color:#94a3b8;transition:transform .2s}
.acc-ar.op{transform:rotate(180deg)}
.stats{display:flex;gap:6px;margin-bottom:12px}
.stat{flex:1;background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:10px 8px;text-align:center}
.stat .n{font-size:20px;font-weight:700}
.stat .l{font-size:9px;color:#64748b;text-transform:uppercase;font-weight:600;letter-spacing:.5px;margin-top:2px}
.fc{background:#fff;border-radius:16px;border:1px solid #e2e8f0;padding:24px 20px;min-height:180px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;cursor:pointer;transition:.2s;user-select:none}
.fc:active{transform:scale(.98)}
.search-box{width:100%;border:1px solid #e2e8f0;border-radius:12px;padding:8px 12px;font-size:12px;margin-bottom:12px}
.search-box:focus{outline:none;border-color:rgb(var(--sky));box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.timer{font-variant-numeric:tabular-nums;font-family:'Inter',monospace}
.ck{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;border:1px solid #e2e8f0;font-size:11px;cursor:pointer;margin-bottom:5px}
.ck:hover{background:#f8fafc}
.ck.done span{text-decoration:line-through;color:#94a3b8}
.topic{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;font-size:11px;cursor:pointer;transition:.1s}
.topic:hover{background:#f1f5f9}
.topic.done{background:#ecfdf5;border:1px solid #a7f3d0}
.drug-row{padding:8px 12px;border-bottom:1px solid #f1f5f9;font-size:11px}
.drug-row:last-child{border:none}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700}
.badge-r{background:#fef2f2;color:#dc2626}
.badge-y{background:#fffbeb;color:#d97706}
.badge-g{background:#ecfdf5;color:#059669}
.calc-in{width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:13px;margin-bottom:8px}
.calc-in:focus{outline:none;border-color:rgb(var(--sky))}
.sec-t{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:3px}
.sec-s{font-size:10px;color:#64748b;margin-bottom:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
@media(min-width:768px){.ct{padding:20px 16px 88px;max-width:800px}.tabs button{min-width:64px;font-size:11px}.hdr h1{font-size:18px}}
@media(min-width:1024px){.ct{max-width:900px}.card{padding:16px}}
.dm-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:16px;padding:4px;opacity:.7}
.tabs button{min-height:44px}
.qo{min-height:44px;display:flex;align-items:center}
.ck{min-height:44px}
.topic{min-height:44px}
.pill{min-height:32px;display:inline-flex;align-items:center}
.btn:active{transform:scale(.96)}
.qo:active:not(.lk){transform:scale(.99)}
.stat .l{font-size:10px}
.badge{font-size:10px}
.hdr p{font-size:11px}
.progress-bar{height:3px;background:#e2e8f0;border-radius:2px;margin-bottom:10px;overflow:hidden}
.progress-bar .fill{height:100%;background:rgb(var(--sky));border-radius:2px;transition:width .3s ease}
body.dark .progress-bar{background:#334155}
body.dark .badge-r{background:#450a0a;color:#fca5a5}
body.dark .badge-y{background:#451a03;color:#fde68a}
body.dark .badge-g{background:#064e3b;color:#6ee7b7}
body.dark .ck:hover{background:#1e293b}
body.dark .calc-result{background:#1e293b !important}
body.dark a{color:#60a5fa}
body.dark .explain-box{background:#064e3b !important;border-color:#059669 !important;color:#a7f3d0 !important}
body.dark .tag-topic{background:#064e3b !important;color:#6ee7b7 !important}
body.dark .tag-year{background:#1e3a5f !important;color:#93c5fd !important}
body.dark .sec-s{color:#94a3b8}
body.dark .btn-o{background:#334155;color:#e2e8f0}
.streak-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:#fffbeb;color:#d97706;border:1px solid #fde68a}
body.dark .streak-badge{background:#451a03;border-color:#92400e}
@media print{.tabs,.hdr,.dm-btn,button{display:none !important}.ct{padding:0;max-width:100%}.card{break-inside:avoid;border:1px solid #ccc;margin-bottom:8px}.ab{max-height:none !important}.stat,.stats{break-inside:avoid}body{background:#fff;color:#000;font-size:12pt}}
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.share-btn{font-size:13px;padding:2px 6px;opacity:.5;cursor:pointer;border:none;background:none}
.share-btn:hover{opacity:1}
.empty{text-align:center;padding:32px 16px;color:#94a3b8;font-size:12px;line-height:1.7}

body.dark{background:#0f172a;color:#e2e8f0}
body.dark .card{background:#1e293b;border-color:#334155}
body.dark .hdr{background:linear-gradient(135deg,#000,#0f172a)}
body.dark .tabs{background:#1e293b;border-color:#334155}
body.dark .tabs button:not(.on){color:#64748b}
body.dark .qo{border-color:#334155;color:#e2e8f0}
body.dark .qo:not(.lk):hover{border-color:#475569;background:#1e293b}
body.dark .qo.sel{border-color:rgb(var(--sky));background:#172554}
body.dark .qo.ok{background:#064e3b;border-color:#065f46;color:#a7f3d0}
body.dark .qo.no{background:#450a0a;border-color:#7f1d1d;color:#fca5a5}
body.dark .qo.dim{border-color:#1e293b;color:#475569}
body.dark .pill:not(.on){background:#1e293b;color:#94a3b8;border-color:#334155}
body.dark .search-box,body.dark .calc-in{background:#1e293b;border-color:#334155;color:#e2e8f0}
body.dark select{background:#1e293b;color:#e2e8f0}
body.dark .acc-h:hover{background:#1e293b}
body.dark .fc{background:#1e293b;border-color:#334155;color:#e2e8f0}
body.dark .topic:hover{background:#1e293b}
body.dark .topic.done{background:#064e3b;border-color:#065f46}
body.dark .ck{border-color:#334155;color:#e2e8f0}
body.dark .stat{background:#1e293b;border-color:#334155}
body.dark .sec-t{color:#f1f5f9}
body.dark .drug-row{border-color:#334155;color:#e2e8f0}

/* ===== BLIND RECALL BLUR ===== */
.qo-blur{filter:blur(8px);transition:filter .25s ease;user-select:none}
.qo-blur:active,.qo-blur:focus,.qo-blur.revealed{filter:none}
.qo-blur::after{content:'Tap to reveal';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:10px;color:#94a3b8;pointer-events:none;opacity:.9}
.qo{position:relative}

/* ===== SUDDEN DEATH ===== */
.sudden-death-banner{background:linear-gradient(135deg,#dc2626,#991b1b);color:#fff;padding:10px 14px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;animation:pulse-red 2s infinite}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}50%{box-shadow:0 0 0 8px rgba(220,38,38,0)}}
.leaderboard-row{display:flex;justify-content:space-between;padding:6px 10px;border-bottom:1px solid #f1f5f9;font-size:11px}
body.dark .leaderboard-row{border-color:#334155}

/* ===== POMODORO ===== */
.pomo-bar{position:fixed;top:0;left:0;right:0;height:4px;background:#e2e8f0;z-index:60}
.pomo-bar .pomo-fill{height:100%;background:rgb(var(--em));transition:width 1s linear}
.pomo-overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;backdrop-filter:blur(6px)}
.pomo-overlay h2{font-size:24px;margin-bottom:8px}
.pomo-overlay .pomo-break-timer{font-size:64px;font-weight:700;font-variant-numeric:tabular-nums}


@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}




/* ===== MED BASKET ===== */
.med-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;background:#eff6ff;color:#1d4ed8;cursor:pointer;border:1px solid #bfdbfe;margin:2px}
.med-chip .x{font-size:12px;font-weight:700;margin-left:2px;opacity:.6}
.med-chip .x:hover{opacity:1}
body.dark .med-chip{background:#1e3a5f;color:#93c5fd;border-color:#1e40af}
.acb-meter{height:10px;border-radius:5px;background:#e2e8f0;overflow:hidden;margin:6px 0}
.acb-meter .acb-fill{height:100%;border-radius:5px;transition:width .3s}


/* ===== LAB OVERLAY ===== */
.lab-modal{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.lab-sheet{background:#fff;width:calc(100% - 24px);max-width:600px;max-height:85vh;border-radius:20px;overflow-y:auto;padding:20px 16px;animation:fadeIn .2s ease}
body.dark .lab-sheet{background:#1e293b;color:#e2e8f0}
.range-bar{height:8px;border-radius:4px;background:#e2e8f0;position:relative;margin:8px 0}
.range-bar .normal{position:absolute;height:100%;background:#bbf7d0;border-radius:4px}
.range-bar .marker{position:absolute;width:3px;height:16px;top:-4px;background:#1e293b;border-radius:2px}
body.dark .range-bar{background:#334155}
body.dark .range-bar .marker{background:#f1f5f9}
.frailty-slider{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:linear-gradient(to right,#bbf7d0,#fde68a,#fecaca);outline:none}
.frailty-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#1e293b;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
body.dark .frailty-slider::-webkit-slider-thumb{background:#e2e8f0;border-color:#334155}

/* ===== CHEAT SHEET ===== */
.aging-row{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid #f1f5f9;font-size:10px}
.aging-row .cell{padding:8px 10px;line-height:1.5}
.aging-row .normal-cell{background:#f0fdf4;color:#166534}
.aging-row .path-cell{background:#fef2f2;color:#991b1b}
body.dark .aging-row{border-color:#334155}
body.dark .aging-row .normal-cell{background:#064e3b;color:#6ee7b7}
body.dark .aging-row .path-cell{background:#450a0a;color:#fca5a5}

/* ===== DISTRACTOR AUTOPSY ===== */
.distractor-highlight{border:2px solid #f59e0b !important;background:#fffbeb !important;position:relative}
.distractor-highlight::before{content:'🔍';position:absolute;top:-8px;right:-8px;font-size:14px}
body.dark .distractor-highlight{background:#451a03 !important;border-color:#d97706 !important}

/* ===== SPEECH BUTTON ===== */
.speech-btn{font-size:18px;padding:4px;opacity:.5;cursor:pointer;border:none;background:none;transition:.15s}
.speech-btn:hover,.speech-btn.speaking{opacity:1}
.speech-btn.speaking{animation:pulse-speak 1s infinite}
@keyframes pulse-speak{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* ===== ROI SCATTER ===== */
.roi-grid{position:relative;width:100%;aspect-ratio:1.4;border-left:2px solid #64748b;border-bottom:2px solid #64748b;margin:12px 0}
.roi-dot{position:absolute;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;cursor:pointer;transition:.2s;border:2px solid rgba(255,255,255,.8);text-align:center;line-height:1.1;overflow:hidden}
.roi-dot:hover{transform:scale(1.3);z-index:5}
.roi-label{position:absolute;font-size:9px;color:#64748b;font-weight:600}

/* ===== VOICE PARSER ===== */
.voice-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;cursor:pointer}
.voice-btn.listening{background:#dc2626;color:#fff;animation:pulse-red 1.5s infinite}
body.dark .voice-btn{background:#450a0a;border-color:#7f1d1d}

/* Night/Study Mode */
body.study{background:#1a1008;color:#e8d5b0}
body.study .card{background:#221508;border-color:#3d2a12}
body.study .hdr{background:linear-gradient(135deg,#0d0804,#1a1008)}
body.study .tabs{background:#221508;border-color:#3d2a12}
body.study .tabs button:not(.on){color:#a08060}
body.study .pill:not(.on){background:#221508;color:#a08060;border-color:#3d2a12}
body.study .qo{border-color:#3d2a12;color:#e8d5b0;background:#221508}
body.study .qo:not(.lk):hover{border-color:#7a5c30;background:#2a1e0d}
body.study .qo.sel{border-color:#c48a3a;background:#2a1e0d}
body.study .search-box,body.study .calc-in{background:#221508;border-color:#3d2a12;color:#e8d5b0}
body.study .stat{background:#221508;border-color:#3d2a12}
body.study .fc{background:#221508;border-color:#3d2a12;color:#e8d5b0}
body.study .sec-t{color:#e8d5b0}
.chat-msgs{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
.chat-msg-user{background:#eff6ff;border-radius:12px 12px 2px 12px;padding:8px 12px;font-size:12px;align-self:flex-end;max-width:85%}
.chat-msg-ai{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px 12px 12px 2px;padding:8px 12px;font-size:12px;align-self:flex-start;max-width:90%;white-space:pre-wrap;line-height:1.6}
.chat-msg-err{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:8px 12px;font-size:11px;color:#dc2626}
.chat-input-row{display:flex;gap:6px;padding:8px 10px;border-top:1px solid #e2e8f0}
.chat-starter{display:block;width:100%;text-align:right;padding:8px 12px;border-radius:10px;border:1px solid #e2e8f0;font-size:11px;margin-bottom:5px;background:#fff;cursor:pointer;font-family:'Heebo',sans-serif}
.chat-starter:hover{background:#eff6ff;border-color:#bae6fd}
.chat-disclaimer{font-size:10px;color:#d97706;padding:5px 8px;background:#fffbeb;border-radius:8px;border:1px solid #fde68a}
.typing-dots{display:flex;gap:4px;align-items:center;padding:2px 0}.typing-dots span{width:6px;height:6px;border-radius:50%;background:#94a3b8;animation:tdot 1.2s infinite}.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
body.dark .chat-msg-ai{background:#1e293b;border-color:#334155;color:#e2e8f0}
body.dark .chat-msg-user{background:#1e3a5f;color:#e2e8f0}
body.dark .chat-starter{background:#1e293b;border-color:#334155;color:#e2e8f0}
body.dark .chat-input-row{border-color:#334155}
body.dark .chat-disclaimer{background:#422006;border-color:#92400e;color:#fcd34d}
.skip-link{position:absolute;left:-9999px;top:4px;z-index:9999;padding:6px 12px;background:#3b82f6;color:#fff;border-radius:6px;font-size:12px;font-weight:700;text-decoration:none}
.skip-link:focus{left:4px}
:focus-visible{outline:2px solid #3b82f6;outline-offset:2px}

/* ===== TOOLTIPS ===== */
.tt-wrap{position:relative;display:inline-flex;align-items:center;gap:3px}
.tt-icon{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:#e2e8f0;color:#64748b;font-size:9px;font-weight:700;cursor:help;flex-shrink:0;line-height:1;border:none;padding:0}
.tt-icon:focus{outline:2px solid rgb(var(--sky));outline-offset:1px}
.tt-box{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e293b;color:#f1f5f9;font-size:10px;line-height:1.5;padding:7px 10px;border-radius:8px;width:180px;z-index:999;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.tt-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1e293b}
.tt-icon:hover+.tt-box,.tt-icon:focus+.tt-box{display:block}
</style>

<script>
document.addEventListener('DOMContentLoaded',function(){
const el=document.getElementById('hdr-sub');
if(!el)return;
function upd(){
const d=new Date();
const day=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
const h=String(d.getHours()).padStart(2,'0');
const m=String(d.getMinutes()).padStart(2,'0');
const mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
el.textContent=day+' '+d.getDate()+' '+mon+' · '+h+':'+m;
}
upd();setInterval(upd,30000);
});
</script>

<body>

// ===== INDEXEDDB MIGRATION =====
const IDB_NAME='pnimit_mega_db',IDB_VER=1,IDB_STORE='state';
let idb=null;
function openIDB(){return new Promise((resolve,reject)=>{
const req=indexedDB.open(IDB_NAME,IDB_VER);
req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE);};
req.onsuccess=e=>{idb=e.target.result;resolve(idb);};
req.onerror=e=>reject(e.target.error);
});}
function idbGet(key){return new Promise((resolve,reject)=>{
if(!idb)return resolve(null);
const tx=idb.transaction(IDB_STORE,'readonly');
const req=tx.objectStore(IDB_STORE).get(key);
req.onsuccess=()=>resolve(req.result||null);
req.onerror=()=>resolve(null);
});}
function idbSet(key,val){return new Promise((resolve,reject)=>{
if(!idb)return resolve();
const tx=idb.transaction(IDB_STORE,'readwrite');
tx.objectStore(IDB_STORE).put(val,key);
tx.oncomplete=()=>resolve();
tx.onerror=()=>resolve();
});}
// Migrate localStorage → IndexedDB on first run

function calcACBTotal(){return medBasket.reduce((sum,name)=>{const d=DRUGS.find(x=>x.name===name);return sum+(d?d.acb:0);},0);}
function getSTOPPWarnings(){
const warnings=[];const names=medBasket.map(n=>n.toLowerCase());
const cats=medBasket.map(n=>{const d=DRUGS.find(x=>x.name===n);return d?d.cat:'';}).filter(Boolean);
// Dual anticholinergic
const acDrugs=medBasket.filter(n=>{const d=DRUGS.find(x=>x.name===n);return d&&d.acb>=2;});
if(acDrugs.length>=2)warnings.push({level:'high',text:`Dual anticholinergic burden: ${acDrugs.join(' + ')} — cumulative cognitive/fall risk`});
// Benzo + opioid
const hasBenzo=cats.some(c=>c.toLowerCase().includes('benzo'));
const hasOpioid=cats.some(c=>c.toLowerCase().includes('opioid'));
if(hasBenzo&&hasOpioid)warnings.push({level:'high',text:'Benzodiazepine + Opioid — respiratory depression risk'});
// Dual antiplatelet
const antiPlat=medBasket.filter(n=>/aspirin|clopidogrel|prasugrel|ticagrelor/i.test(n));
if(antiPlat.length>=2)warnings.push({level:'med',text:`Dual antiplatelet: ${antiPlat.join(' + ')} — bleeding risk, especially with anticoagulant`});
// NSAID + anticoagulant
const hasNSAID=cats.some(c=>c.toLowerCase().includes('nsaid'));
const hasAnticoag=cats.some(c=>c.toLowerCase().includes('anticoag'));
if(hasNSAID&&hasAnticoag)warnings.push({level:'high',text:'NSAID + Anticoagulant — major GI bleed risk'});
// ACEi/ARB + K-sparing + NSAID (triple whammy)
const hasACE=names.some(n=>/enalapril|ramipril|lisinopril|losartan|valsartan|candesartan/i.test(n));
const hasKsparing=names.some(n=>/spironolactone|eplerenone|amiloride/i.test(n));
if(hasACE&&hasKsparing)warnings.push({level:'med',text:'ACEi/ARB + K-sparing diuretic — hyperkalemia risk'});
if(hasACE&&hasNSAID)warnings.push({level:'med',text:'ACEi/ARB + NSAID — AKI risk, reduced BP efficacy'});
// Anticholinergic opposing cholinesterase inhibitor
const hasAntiChol=medBasket.some(n=>{const d=DRUGS.find(x=>x.name===n);return d&&d.acb>=2;});
const hasChEI=names.some(n=>/donepezil|rivastigmine|galantamine/i.test(n));
if(hasAntiChol&&hasChEI)warnings.push({level:'high',text:'Anticholinergic opposes cholinesterase inhibitor — pharmacological conflict'});
// Metformin + CKD
const hasMet=names.some(n=>/metformin/i.test(n));
if(hasMet)warnings.push({level:'low',text:'Metformin — verify eGFR >30; contraindicated in severe CKD'});
// PPI long-term
const hasPPI=names.some(n=>/omeprazole|pantoprazole|esomeprazole|lansoprazole/i.test(n));
if(hasPPI)warnings.push({level:'low',text:'PPI — long-term use: Mg/Ca malabsorption, C. difficile risk, consider step-down'});
return warnings;
}

// ===== IMA SYLLABUS WEIGHTS (approximate % from P0064-2025) =====
const IMA_WEIGHTS=[8,7,6,5,7,10,8,7,6,8,7,6,9,6,7,5,3,3,4,4,3,3,5,4];

// ===== SPACED REP =====

// ===== FSRS-4.5 ALGORITHM =====
// Parameters from official FSRS-4.5 defaults (Anki 23.10+)
const FSRS_W=[0.40255,1.18385,3.1262,15.4722,7.2102,0.5316,1.0651,0.06362,
              1.544,0.1544,1.0070,1.9395,0.11,0.29605,2.2698,0.2315,2.9898,0.51655,0.6621];
const FSRS_DECAY=-0.5;
const FSRS_FACTOR=19/81;
const FSRS_RETENTION=0.90; // target 90% retention

function fsrsR(t,s){
  // Retrievability after t days with stability s
  if(!s||s<=0)return 0;
  return Math.pow(1+FSRS_FACTOR*t/s,FSRS_DECAY);
}
function fsrsInterval(s){
  // Days until retrievability drops to FSRS_RETENTION
  return Math.max(1,Math.round(s/FSRS_FACTOR*(Math.pow(FSRS_RETENTION,1/FSRS_DECAY)-1)));
}
function fsrsInitNew(rating){
  // rating: 1=Again,2=Hard,3=Good,4=Easy
  const r=Math.max(0,Math.min(3,rating-1));
  const s=Math.max(0.1,FSRS_W[r]);
  const d=Math.min(10,Math.max(1,FSRS_W[4]-Math.exp(FSRS_W[5]*r)+1));
  return{s,d};
}
function fsrsUpdate(s,d,rPrev,rating){
  let newS,newD;
  if(rating===1){
    // Forgot — short-term stability
    newS=FSRS_W[11]*Math.pow(Math.max(0.1,d),-FSRS_W[12])*
         (Math.pow(s+1,FSRS_W[13])-1)*
         Math.exp(FSRS_W[14]*(1-rPrev));
    newS=Math.max(0.1,newS);
  }else{
    // Recalled
    const hard=rating===2?FSRS_W[15]:1;
    const easy=rating===4?FSRS_W[16]:1;
    newS=s*(Math.exp(FSRS_W[8])*(11-d)*
         Math.pow(Math.max(0.01,s),-FSRS_W[9])*
         (Math.exp(FSRS_W[10]*(1-rPrev))-1)*
         hard*easy+1);
    newS=Math.max(0.1,newS);
  }
  // Difficulty update with mean reversion
  const deltaD=-FSRS_W[6]*(rating-3);
  const mr=FSRS_W[7]*(FSRS_W[4]-d);
  newD=Math.min(10,Math.max(1,d+deltaD+mr));
  return{s:newS,d:newD};
}
function fsrsMigrateFromSM2(sm2entry){
  // Estimate FSRS state from existing SM-2 data
  const daysLeft=Math.max(0,(sm2entry.next-Date.now())/86400000);
  const s=Math.max(0.1,daysLeft>0?daysLeft:sm2entry.n||0.1);
  // ef 2.5=easy(D≈1), ef 1.3=hard(D≈10)
  const d=Math.min(10,Math.max(1,Math.round((2.5-sm2entry.ef)/(2.5-1.3)*9+1)));
  return{s,d};
}
// ===== END FSRS =====
function srScore(qIdx,correct){
if(!S.sr[qIdx])S.sr[qIdx]={ef:2.5,n:0,next:0,ts:[],at:0,tot:0,ok:0};
const s=S.sr[qIdx];
if(s.tot===undefined){s.tot=0;s.ok=0;}
const elapsed=Math.round((Date.now()-qStartTime)/1000);
if(!s.ts)s.ts=[];
s.ts.push(elapsed);if(s.ts.length>10)s.ts.shift();
s.at=Math.round(s.ts.reduce((a,b)=>a+b,0)/s.ts.length);
s.tot++;if(correct)s.ok++;
// FSRS-4.5 scheduling
const rating=correct?3:1; // Good=3, Again=1
const daysSinceReview=s.lastReview?Math.max(0,(Date.now()-s.lastReview)/86400000):0;
// Initialize or migrate FSRS state
if(s.fsrsS===undefined||s.fsrsD===undefined){
  if(s.n>0||s.ef!==2.5){
    const mig=fsrsMigrateFromSM2(s);s.fsrsS=mig.s;s.fsrsD=mig.d;
  }else{
    const init=fsrsInitNew(rating);s.fsrsS=init.s;s.fsrsD=init.d;
  }
}
const rPrev=daysSinceReview>0?fsrsR(daysSinceReview,s.fsrsS):1;
const upd=fsrsUpdate(s.fsrsS,s.fsrsD,rPrev,rating);
s.fsrsS=Math.round(upd.s*1000)/1000;
s.fsrsD=Math.round(upd.d*100)/100;
s.lastReview=Date.now();
// FSRS interval → next review
const fsrsDays=fsrsInterval(s.fsrsS);
s.next=Date.now()+fsrsDays*86400000;
// Keep SM-2 ef/n as proxies for filter compatibility
s.n=correct?s.n+1:0;
// ef mirrors difficulty: D=1→ef=2.5, D=10→ef=1.3
s.ef=Math.round((2.5-(s.fsrsD-1)/(10-1)*(2.5-1.3))*1000)/1000;
// session tracking
_sessionOk+=correct?1:0;_sessionNo+=correct?0:1;
if(correct&&QZ[qIdx])_sessionBest[QZ[qIdx].ti]=((_sessionBest[QZ[qIdx].ti]||0)+1);
if(!correct&&QZ[qIdx])_sessionWorse[QZ[qIdx].ti]=((_sessionWorse[QZ[qIdx].ti]||0)+1);
qStartTime=Date.now();
save();
}
function isChronicFail(qIdx){
const s=S.sr[qIdx];
if(!s)return false;
const lowAccuracy=s.tot>=4&&s.ok/s.tot<0.35;
const highDifficulty=s.fsrsD&&s.fsrsD>=8&&s.tot>=3;
return lowAccuracy||highDifficulty;
}
function getDueQuestions(){
const now=Date.now();
return Object.entries(S.sr).filter(([k,v])=>v.next<=now).map(([k])=>parseInt(k)).slice(0,20);

function buildMockExamPool(){
  const total=EXAM_FREQ.reduce((a,b)=>a+b,0);

  const byTopic={};
  QZ.forEach((q,i)=>{const ti=q.ti>=0?q.ti:39;if(!byTopic[ti])byTopic[ti]=[];byTopic[ti].push(i);});

    const target=Math.max(1,Math.round(freq/total*100));
    // shuffle that topic's questions, take target count
    const src=[...byTopic[ti]];for(let i=src.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[src[i],src[j]]=[src[j],src[i]];}
    for(let k=0;k<Math.min(target,src.length);k++)examPool.push(src[k]);
  });
  // Trim or pad to ~100
  for(let i=examPool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[examPool[i],examPool[j]]=[examPool[j],examPool[i]];}

function isMetaOption(text){
  // Detect options that reference letter positions or aggregate all answers
  // These must NOT be shuffled as their content references other option positions
  const t=(text||'').trim();
  const metaPatterns=[
    /כל\s*(ה)?תשוב/,           // כל התשובות נכונות
    /כל\s*(ה)?אמור/,            // כל האמור נכון
    /אף\s*תשוב/,                // אף תשובה
    /all\s+of\s+the\s+above/i,
    /none\s+of\s+the\s+above/i,
    /both\s+[a-e]\s+and\s+[a-e]/i,
    /[א-ת][׳']\s*ו[־-]?\s*[א-ת][׳']/,  // א׳ ו-ב׳, א׳ וג׳
    /^\s*[a-e]\s+and\s+[a-e]\s*$/i,      // "A and C"
    /\d\s*ו\s*\d/,              // 1 ו-2
  ];
  return metaPatterns.some(p=>p.test(t));
}
function getOptShuffle(qIdx,q){
  // Return stable shuffle for this question in this session
  if(_optShuffle&&_optShuffle.qIdx===qIdx)return _optShuffle.map;
  const n=q.o.length;
  // Separate meta-options (pin to end) from regular options (shuffle)
  const regular=[],meta=[];
  q.o.forEach((_,i)=>{isMetaOption(q.o[i])?meta.push(i):regular.push(i);});
  // Fisher-Yates shuffle of regular options only, seeded by qIdx
  let seed=qIdx*31+17;
  const rand=()=>{seed=(seed*1664525+1013904223)&0xffffffff;return(seed>>>0)/0xffffffff;};
  for(let i=regular.length-1;i>0;i--){
    const j=Math.floor(rand()*(i+1));
    [regular[i],regular[j]]=[regular[j],regular[i]];
  }
  // Meta options stay at end in original relative order
  const map=[...regular,...meta];
  _optShuffle={qIdx,map};
  return map;
}

return '<div style="margin:14px 0 6px;padding:5px 10px;background:linear-gradient(90deg,#eff6ff,transparent);border-left:3px solid #3b82f6;border-radius:0 4px 4px 0;font-size:10px;font-weight:800;color:#1e40af;text-transform:uppercase;letter-spacing:.6px">'+title+'</div>';

// Sub-headers: ALL-CAPS word followed by colon at line start (e.g. "Tai Chi:", "RACF setting:")
line=line.replace(/^([A-Z][A-Z\s\/&\-()]{2,40}):/,'<strong style="color:#0f172a">$1:</strong>');
// Any remaining "Label:" pattern
line=line.replace(/^([^:\n]{2,50}):/,'<strong>$1:</strong>');
// Numbers with units, thresholds
line=line.replace(/(≥\d[\d.]*\s*(?:mmHg|m\/s|s\b|mg|IU|%)?|≤\d[\d.]*\s*(?:mmHg|m\/s|s\b|mg|IU|%)?|[<>]\d[\d.]*\s*(?:mmHg|m\/s|s\b|mg|IU|%)?|\d+–\d+%|\d+%)/g,'<b style="color:#0f172a">$1</b>');

// Positive keywords
line=line.replace(/\b(SOE=A)\b/g,'<span style="color:#059669;font-weight:700">$1</span>');
return line;
}

</div>`;
    });
  }
  
  // Recently wrong (last streak broken)
  const shown=recentWrong.slice(0,8);

    h+=`<div style="font-weight:700;font-size:11px;margin-bottom:6px;margin-top:10px;color:#d97706">⚠️ Recently Wrong — retry these</div>`;

</div>`;
    });
  }
  
  if(!chronic.length&&!shown.length&&!curQ)h+='<div style="font-size:11px;color:#94a3b8;text-align:center;padding:20px">No data yet — answer some questions first</div>';
  return h;

let calcVals={};
function calcUp(k,v){calcVals[k]=parseFloat(v)||0;render();}
function renderCalc(){
let h=`<div class="sec-t">🧮 Clinical Calculators</div><div class="sec-s">CrCl · CHA₂DS₂-VASc · CURB-65 · Wells · PADUA · Braden · Norton</div>`;

// CrCl
const age=calcVals.age||75,wt=calcVals.wt||55,cr=calcVals.cr||1.0,fem=calcVals.fem===undefined?0.85:calcVals.fem;
const crcl=Math.max(0,Math.round(((140-age)*wt*fem)/(72*cr)));
h+=`<div class="card" style="padding:14px"><h3 style="font-size:13px;font-weight:700;margin-bottom:10px">Cockcroft-Gault CrCl</h3>

<div><label style="font-size:10px;color:#64748b">Creatinine</label><input class="calc-in" type="number" step="0.1" value="${cr}" onchange="calcUp('cr',this.value)"></div>
<div><label style="font-size:10px;color:#64748b">Sex</label><select class="calc-in" onchange="calcUp('fem',this.value)">

</div>
<div style="margin-top:10px;padding:10px;background:#eff6ff;border-radius:10px;text-align:center">
<span style="font-size:22px;font-weight:700;color:${crcl<30?'#dc2626':crcl<60?'#d97706':'#059669'}">${crcl} ml/min</span>
<p style="font-size:10px;color:#64748b;margin-top:2px">${crcl<30?'CKD 4-5: Avoid metformin, adjust all renally-cleared drugs':crcl<60?'CKD 3: Dose adjust many drugs':'CKD 1-2: Mild impairment'}</p>
</div></div>`;

// CHA2DS2-VASc
const cha=Object.entries(calcVals).filter(([k])=>k.startsWith('cha_')).reduce((s,[k,v])=>s+v,0);

// CURB-65

}else if(type==='morse'){

function renderExamTrendCard(){
  const OLD_EX=new Set(['2020','Jun21','Jun22']);
  const NEW_EX=new Set(['May24','Oct24','Jun25']);
  const TOPICS_L=TOPICS;
  const oldTot=QZ.filter(q=>OLD_EX.has(q.t)).length||1;
  const newTot=QZ.filter(q=>NEW_EX.has(q.t)).length||1;
  const trends=TOPICS_L.map((name,ti)=>{
    const oldN=QZ.filter(q=>OLD_EX.has(q.t)&&q.ti===ti).length;
    const newN=QZ.filter(q=>NEW_EX.has(q.t)&&q.ti===ti).length;
    const delta=(newN/newTot - oldN/oldTot)*100;
    return{ti,name,oldN,newN,oldPct:oldN/oldTot*100,newPct:newN/newTot*100,delta};
  }).filter(r=>r.oldN+r.newN>0);
  
  const growing=trends.filter(r=>r.delta>0.5).sort((a,b)=>b.delta-a.delta).slice(0,6);
  const shrinking=trends.filter(r=>r.delta<-0.5).sort((a,b)=>a.delta-b.delta).slice(0,4);
  
  let h=`<div class="card" style="padding:14px;margin-bottom:10px;border-left:4px solid #7c3aed">

  h+=`<div style="font-size:10px;font-weight:700;color:#059669;margin-bottom:5px">▲ GROWING — prioritize</div>`;

    const barW=Math.min(100,Math.round(r.delta*15));
    h+=`<div style="margin-bottom:5px">

  h+=`</div>`;
  return h;

function calcEstScore(){
  // FSRS-aware estimated score: weight by retrievability for seen questions
  const now2=Date.now();
  // Frequency weights from historical exam distribution
  const FREQ=[0,34,30,28,36,43,178,39,63,36,20,27,19,22,50,40,22,94,70,78,18,80,43,21,46,27,29,52,10,11,7,0,6,9,26,19,23,9,17,0];
  const totalFreq=FREQ.reduce((a,b)=>a+b,0);
  const tSt=S.ts||{};
  const due=new Set(getDueQuestions());
  
  let weightedScore=0,totalWeight=0;
  FREQ.forEach((freq,ti)=>{
    if(!freq)return;
    const s=tSt[ti]||{ok:0,no:0,tot:0};
    const weight=freq/totalFreq;
    let acc;
    if(s.tot<3){
      // Not enough data — assume 60% (neutral)
      acc=0.60;
    } else {
      acc=s.ok/s.tot;
      // Penalize if due questions exist in this topic
      const duePenalty=QZ.filter((_,i)=>QZ[i]?.ti===ti&&due.has(i)).length;
      if(duePenalty>0)acc=Math.max(0,acc-duePenalty*0.02);
    }
    weightedScore+=acc*weight;
    totalWeight+=weight;
  });
  return totalWeight>0?Math.round(weightedScore/totalWeight*100):null;
}

const data=await resp.json();

// ===== WEEKLY TREND SNAPSHOT =====
function takeWeeklySnapshot(){
  try{
    const now=new Date();
    const weekKey='w_'+now.getFullYear()+'_'+Math.floor((now-new Date(now.getFullYear(),0,0))/(7*864e5));
    const snapshots=JSON.parse(localStorage.getItem('pnimit_weekly')||'{}');
    if(snapshots[weekKey])return; // already taken this week
    const tSt=S&&S.ts?S.ts:{};
    const snap={};
    for(let i=0;i<40;i++){const s=tSt[i]||{ok:0,no:0,tot:0};snap[i]=s.tot>0?Math.round(s.ok/s.tot*100):null;}
    snapshots[weekKey]={date:now.toISOString(),acc:snap};
    const keys=Object.keys(snapshots).sort();
    if(keys.length>52)delete snapshots[keys[0]];
    localStorage.setItem('pnimit_weekly',JSON.stringify(snapshots));
  }catch(e){}
}
function getTopicTrend(ti){
  try{
    const snapshots=JSON.parse(localStorage.getItem('pnimit_weekly')||'{}');
    const keys=Object.keys(snapshots).sort();
    if(keys.length<2)return null;
    const prev=snapshots[keys[keys.length-2]].acc[ti];
    const curr=snapshots[keys[keys.length-1]].acc[ti];
    if(prev===null||curr===null)return null;
    return curr-prev; // positive = improving
  }catch(e){return null;}
}

function showUpdateBanner(){
const existing=document.getElementById('update-banner');
if(existing)return;
const b=document.createElement('div');
b.id='update-banner';
b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;padding:12px 16px;font-size:12px;display:flex;align-items:center;gap:10px;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.3)';
b.innerHTML=`<div><b>🆕 עדכון זמין!</b> גרסה חדשה מוכנה</div>
<div style="display:flex;gap:6px;flex-shrink:0">
<button onclick="applyUpdate()" style="background:#fff;color:#4f46e5;border:none;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer">🔄 עדכן עכשיו</button>
<button onclick="this.closest('#update-banner').remove()" style="background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer">✕</button>
</div>`;
document.body.prepend(b);
}
function applyUpdate(){
if(navigator.serviceWorker&&navigator.serviceWorker.controller){
navigator.serviceWorker.getRegistrations().then(regs=>{
regs.forEach(r=>{if(r.waiting)r.waiting.postMessage({type:'SKIP_WAITING'});});
});
}
caches.keys().then(ks=>{ks.forEach(k=>caches.delete(k));});
setTimeout(()=>window.location.reload(true),500);
}

if('serviceWorker' in navigator){
// Force update — clears old cache-first SW
navigator.serviceWorker.getRegistrations().then(regs=>{
regs.forEach(r=>r.update());
});
caches.keys().then(ks=>{
const old=ks.filter(k=>k.startsWith('pnimit-')&&k!=='pnimit-v'+APP_VERSION);
old.forEach(k=>{caches.delete(k);console.log('Deleted old cache:',k);});
});
navigator.serviceWorker.register('sw.js').then(reg=>{
// Detect waiting worker = update available
if(reg.waiting){showUpdateBanner();}
reg.addEventListener('updatefound',()=>{
const nw=reg.installing;
if(nw){nw.addEventListener('statechange',()=>{if(nw.state==='installed'&&navigator.serviceWorker.controller){showUpdateBanner();}});}
});
// Schedule daily notification at 07:00
function scheduleDailyNotification(){
const now=new Date();
const target=new Date(now);
target.setHours(7,0,0,0);
if(now>=target)target.setDate(target.getDate()+1);
const delay=target-now;
setTimeout(()=>{
const dueN=getDueQuestions().length;
if(dueN>0&&reg.active){
reg.active.postMessage({type:'schedule-notification',dueCount:dueN});
}
scheduleDailyNotification();// Reschedule for next day
},delay);
}
// Request notification permission
if('Notification' in window&&Notification.permission==='default'){
Notification.requestPermission();
}
scheduleDailyNotification();
}).catch(()=>{});
}
// Background sync helper — call when Supabase backup fails offline
async function queueBackgroundSync(url,body,apikey){
try{
if('serviceWorker' in navigator&&'SyncManager' in window){
const reg=await navigator.serviceWorker.ready;
// Store pending data in IDB
if(idb){
const tx=idb.transaction('state','readwrite');
tx.objectStore('state').put({url,body,apikey},'pending_sync');
await new Promise(r=>{tx.oncomplete=r;});
}
await reg.sync.register('supabase-backup');
}
}catch(e){console.warn('Background sync registration failed:',e);}
}
