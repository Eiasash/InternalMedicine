name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── JSON Parse Validity ──
      - name: Validate JSON files parse correctly
        run: |
          for f in data/questions.json data/notes.json data/drugs.json data/flashcards.json data/topics.json data/tabs.json; do
            echo "Checking $f..."
            python3 -c "import json,sys; json.load(open('$f')); print('  OK')"
          done

      # ── Question Count ──
      - name: Check question count (must be > 800)
        run: |
          COUNT=$(python3 -c "import json; print(len(json.load(open('data/questions.json'))))")
          echo "Question count: $COUNT"
          [ "$COUNT" -gt 800 ] && echo "OK: $COUNT questions" || { echo "ERROR: Expected > 800, got $COUNT"; exit 1; }

      # ── Question Schema ──
      - name: Validate question schema integrity
        run: |
          python3 << 'PYEOF'
          import json, sys
          qs = json.load(open('data/questions.json'))
          errors = []
          for i, q in enumerate(qs):
              if not q.get('q'): errors.append(f'Q{i}: missing question text')
              if len(q.get('q', '')) < 10: errors.append(f'Q{i}: question text too short')
              if not isinstance(q.get('o'), list) or len(q.get('o', [])) != 4:
                  errors.append(f'Q{i}: expected 4 options')
              if not isinstance(q.get('c'), int) or q['c'] < 0 or q['c'] >= len(q.get('o', [])):
                  errors.append(f'Q{i}: invalid correct answer c={q.get("c")}')
              if q.get('ti') is None: errors.append(f'Q{i}: missing ti')
              elif not isinstance(q.get('ti'), int) or q['ti'] < 0 or q['ti'] > 23:
                  errors.append(f'Q{i}: ti={q.get("ti")} out of range')
              if not q.get('t'): errors.append(f'Q{i}: missing year t')
          if errors:
              for e in errors: print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)
          print(f'OK: All {len(qs)} questions valid')
          PYEOF

      # ── Conflicting Duplicates ──
      - name: Check for conflicting duplicate questions
        run: |
          python3 << 'PYEOF'
          import json, sys
          qs = json.load(open('data/questions.json'))
          seen = {}
          conflicts = []
          for i, q in enumerate(qs):
              key = q['q'].strip()[:80]
              if key in seen:
                  j = seen[key]
                  if qs[i]['o'] == qs[j]['o'] and qs[i]['c'] != qs[j]['c']:
                      conflicts.append((j, i, key[:60]))
              else:
                  seen[key] = i
          if conflicts:
              print(f'CRITICAL: {len(conflicts)} conflicting duplicates', file=sys.stderr)
              for j, i, k in conflicts:
                  print(f'  Q{j} vs Q{i}: {k}...', file=sys.stderr)
              sys.exit(1)
          print('OK: No conflicting duplicates')
          PYEOF

      # ── Notes / Drugs / Flashcards Schema ──
      - name: Validate notes, drugs, flashcards schema
        run: |
          python3 << 'PYEOF'
          import json, sys
          errors = []
          for i, n in enumerate(json.load(open('data/notes.json'))):
              if not n.get('topic'): errors.append(f'Note {i}: missing topic')
              if not n.get('notes'): errors.append(f'Note {i}: missing notes')
          for i, d in enumerate(json.load(open('data/drugs.json'))):
              for k in ['name','heb','acb','beers','cat','risk']:
                  if k not in d: errors.append(f'Drug {i} ({d.get("name","?")}): missing {k}')
          for i, c in enumerate(json.load(open('data/flashcards.json'))):
              if not c.get('f'): errors.append(f'FC {i}: missing front')
              if not c.get('b'): errors.append(f'FC {i}: missing back')
          if errors:
              for e in errors: print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)
          print('OK: Notes, drugs, flashcards all valid')
          PYEOF

      # ── SW Version Sync ──
      - name: Check SW version matches APP_VERSION
        run: |
          python3 << 'PYEOF'
          import re, sys
          constants = open('src/core/constants.js').read()
          sw = open('sw.js').read()
          m_app = re.search(r"APP_VERSION\s*=\s*['\"]([^'\"]+)['\"]", constants)
          m_sw = re.search(r"CACHE\s*=\s*['\"]pnimit-v([^'\"]+)['\"]", sw)
          if not m_app: print('ERROR: APP_VERSION not found', file=sys.stderr); sys.exit(1)
          if not m_sw: print('ERROR: CACHE not found in sw.js', file=sys.stderr); sys.exit(1)
          if m_app.group(1) != m_sw.group(1):
              print(f'ERROR: mismatch app={m_app.group(1)} sw={m_sw.group(1)}', file=sys.stderr); sys.exit(1)
          print(f'OK: v{m_app.group(1)}')
          PYEOF

      # ── Topic Coverage ──
      - name: Check topic coverage (min 5 per topic)
        run: |
          python3 << 'PYEOF'
          import json, sys
          qs = json.load(open('data/questions.json'))
          counts = {}
          for q in qs: counts[q.get('ti',-1)] = counts.get(q.get('ti',-1),0)+1
          thin = [f'ti={ti}: {counts.get(ti,0)}' for ti in range(24) if counts.get(ti,0) < 5]
          if thin:
              print(f'ERROR: {len(thin)} topics < 5 questions: {thin}', file=sys.stderr); sys.exit(1)
          print(f'OK: All 24 topics covered, {len(qs)} total')
          PYEOF

      # ── HTML Shell Validity ──
      - name: Validate HTML shell parses
        run: |
          python3 -c "
          from html.parser import HTMLParser
          c = HTMLParser()
          c.feed(open('pnimit-mega.html').read())
          print('OK: HTML shell parses')
          "

      # ── innerHTML Audit (all source modules) ──
      - name: Audit innerHTML for unsanitized interpolation
        run: |
          python3 << 'PYEOF'
          import glob
          warnings = []
          for f in sorted(glob.glob('src/**/*.js', recursive=True)):
              for i, line in enumerate(open(f).readlines(), 1):
                  if '.innerHTML=' in line or '.innerHTML =' in line:
                      after = line.split('innerHTML')[1]
                      if ('+' in after or '${' in after) and 'sanitize(' not in after:
                          warnings.append(f'{f}:{i}')
          if warnings:
              print(f'WARNING: {len(warnings)} unsanitized innerHTML assignments')
              for w in warnings[:5]: print(f'  {w}')
          else:
              print('OK: No unsanitized innerHTML')
          PYEOF

      # ── No Geriatrics-Only Content ──
      - name: Check no geriatrics-only content
        run: |
          python3 << 'PYEOF'
          import sys, glob
          banned = ['GRS', "Hazzard's", 'CGA', 'Elder Abuse', 'Driving Fitness',
                    'siud murkav', 'BPSD', 'Dysphagia', 'FIM']
          found = []
          for f in sorted(glob.glob('src/**/*.js', recursive=True)):
              content = open(f).read()
              for term in banned:
                  if term in content: found.append(f'{f}: "{term}"')
          if found:
              for f in found: print(f'ERROR: {f}', file=sys.stderr)
              sys.exit(1)
          print('OK: Clean of geriatrics content')
          PYEOF

      # ── Install + Test + Build ──
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npx vitest run
      - name: Verify production build
        run: npx vite build
