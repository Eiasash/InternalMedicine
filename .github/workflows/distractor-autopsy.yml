name: Distractor Autopsy Generator

# Autonomous bulk-run generator for data/distractors.json.
# Runs on cowork/distractor-autopsy branch; commits+force-pushes progress each run.
# Exits no-op if distractors.json is already at 100% coverage.

on:
  workflow_dispatch:
  schedule:
    # Every 2 hours; GHA free tier supports ~6h per job, we cap at 50min
    - cron: '0 */2 * * *'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout distractor-autopsy branch
        uses: actions/checkout@v4
        with:
          ref: cowork/distractor-autopsy
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check coverage — exit early if complete
        id: coverage
        run: |
          TOTAL=$(node -e "const q=require('./data/questions.json'); console.log(q.filter(x=>x&&Array.isArray(x.o)&&typeof x.c==='number').length)")
          HAVE=$(node -e "try{const d=require('./data/distractors.json'); console.log(Object.keys(d).length)}catch{console.log(0)}")
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "have=$HAVE" >> $GITHUB_OUTPUT
          echo "Have $HAVE / $TOTAL distractor entries"
          if [ "$HAVE" -ge "$TOTAL" ]; then
            echo "complete=true" >> $GITHUB_OUTPUT
            echo "Already at 100% — nothing to do."
          else
            echo "complete=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate distractors (50-minute budget)
        if: steps.coverage.outputs.complete == 'false'
        run: |
          # Cap node runtime at 50 minutes (3000s). Generator writes checkpoints every 25 entries.
          timeout 3000 node scripts/generate_distractors.cjs --batch 4 --delay 300 || true
          HAVE=$(node -e "try{const d=require('./data/distractors.json'); console.log(Object.keys(d).length)}catch{console.log(0)}")
          echo "After run: $HAVE entries"

      - name: Commit and force-push snapshot
        if: steps.coverage.outputs.complete == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TOTAL=${{ steps.coverage.outputs.total }}
          HAVE=$(node -e "try{const d=require('./data/distractors.json'); console.log(Object.keys(d).length)}catch{console.log(0)}")
          PREV=${{ steps.coverage.outputs.have }}
          if [ "$HAVE" -le "$PREV" ]; then
            echo "No new entries (had $PREV, now $HAVE). Skipping commit."
            exit 0
          fi
          git add data/distractors.json
          STATUS_LINE="Bulk run in progress; more batches will follow."
          if [ "$HAVE" -ge "$TOTAL" ]; then
            STATUS_LINE="Bulk run COMPLETE."
          fi
          # Amend the most-recent data commit if it's ours; otherwise create a new one.
          LAST_MSG=$(git log -1 --pretty=%s)
          case "$LAST_MSG" in
            "data: distractor autopsy snapshot"*)
              git commit --amend --no-edit -m "data: distractor autopsy snapshot ($HAVE/$TOTAL entries)

          Auto-generated by .github/workflows/distractor-autopsy.yml via scripts/generate_distractors.cjs (Claude Haiku 4.5 through toranot proxy).
          $STATUS_LINE

          Co-Authored-By: Claude Opus 4.7 <noreply@anthropic.com>"
              git push --force origin cowork/distractor-autopsy
              ;;
            *)
              git commit -m "data: distractor autopsy snapshot ($HAVE/$TOTAL entries)

          Auto-generated by .github/workflows/distractor-autopsy.yml via scripts/generate_distractors.cjs (Claude Haiku 4.5 through toranot proxy).
          $STATUS_LINE

          Co-Authored-By: Claude Opus 4.7 <noreply@anthropic.com>"
              git push origin cowork/distractor-autopsy
              ;;
          esac
          echo "Pushed $HAVE/$TOTAL entries."
